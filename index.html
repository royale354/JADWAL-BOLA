<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jadwal Bola — Generator PNG TikTok PRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --col-green: #00ff87;
      --col-cyan: #00e5ff;
      --col-gold: #ffd700;
      --col-red: #ff3c5a;
      --col-purple: #bf5fff;
      --col-dark: #06080f;
      --col-card: rgba(255,255,255,0.04);
      --col-border: rgba(255,255,255,0.09);
      --radius: 16px;
    }

    body {
      font-family: 'Rajdhani', 'Segoe UI', sans-serif;
      background: #08090f;
      color: #f1f5f9;
      min-height: 100vh;
      padding: 20px 16px 60px;
    }

    .app-layout {
      display: grid;
      grid-template-columns: minmax(300px, 360px) 1fr;
      gap: 28px;
      max-width: 1300px;
      margin: 0 auto;
      align-items: start;
    }

    @media (max-width: 960px) {
      .app-layout { grid-template-columns: 1fr; }
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: rgba(255,255,255,0.03);
      padding: 22px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      position: sticky;
      top: 16px;
    }

    .sidebar-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      letter-spacing: 3px;
      background: linear-gradient(90deg, var(--col-green), var(--col-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .sidebar > p { font-size: 0.78rem; color: #64748b; margin-bottom: 18px; }

    .field-group {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .field-group label {
      display: flex;
      flex-direction: column;
      font-size: 0.68rem;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: .08em;
      gap: 5px;
      margin-bottom: 10px;
    }
    .field-group label:last-child { margin-bottom: 0; }

    .field-group input[type=text] {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      padding: 8px 10px;
      font-size: 0.85rem;
      font-family: 'Rajdhani', sans-serif;
      outline: none;
      width: 100%;
      transition: border-color .2s;
    }
    .field-group input[type=text]:focus { border-color: var(--col-green); }

    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin: 16px 0 9px;
    }

    /* ── THEME GRID ── */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-bottom: 16px;
    }
    .theme-card {
      cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 11px;
      padding: 9px 6px 7px;
      background: rgba(0,0,0,0.3);
      text-align: center;
      transition: all .2s;
    }
    .theme-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.25); }
    .theme-card.active { border-color: var(--col-green); box-shadow: 0 0 0 1px rgba(0,255,135,0.25); }
    .theme-card input { display: none; }
    .theme-swatch {
      height: 30px;
      border-radius: 7px;
      margin-bottom: 6px;
    }
    .theme-card span { font-size: 0.68rem; font-weight: 700; color: #94a3b8; }

    input[type="date"] {
      background: rgba(255,255,255,0.05);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 9px 12px;
      border-radius: 9px;
      font-size: 0.88rem;
      font-family: 'Rajdhani', sans-serif;
      outline: none;
      color-scheme: dark;
      width: 100%;
      margin-bottom: 10px;
    }
    input[type="file"] { display: none; }

    .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }

    button, .file-label {
      cursor: pointer;
      border: none;
      border-radius: 9px;
      padding: 9px 14px;
      font-size: 0.82rem;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: .05em;
      transition: all .2s;
    }
    button:hover:not(:disabled), .file-label:hover { opacity: .9; transform: translateY(-1px); }
    button:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    .btn-ghost { background: rgba(255,255,255,0.07); color: #cbd5e1; flex: 1; }
    .btn-blue  { background: #1d4ed8; color: #fff; flex: 1; }
    .btn-import { background: rgba(255,255,255,0.07); color: #94a3b8; font-size:.79rem; display:block; text-align:center; }
    .btn-download {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      font-size: 1rem;
      letter-spacing: .12em;
      font-family: 'Bebas Neue', sans-serif;
      background: linear-gradient(135deg, #00ff87 0%, #00b6ff 100%);
      color: #000;
      border-radius: 11px;
      box-shadow: 0 4px 20px rgba(0,255,135,.3);
    }

    .status {
      margin-top: 11px;
      font-size: 0.8rem;
      color: #f59e0b;
      font-weight: 600;
      line-height: 1.4;
    }
    .status.success { color: #22c55e; }
    .status.error { color: #f87171; }

    /* ── PREVIEW PANEL ── */
    .preview-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .preview-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    #export-area {
      width: 100%;
      max-width: 400px;
      aspect-ratio: 9 / 16;
      max-height: min(85vh, 800px);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,.8), 0 0 60px var(--t-glow, transparent);
      border: 1.5px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--t-bg, #06080f);
    }

    /* Watermark */
    .bg-watermark {
      position: absolute;
      inset: -30%;
      pointer-events: none;
      z-index: 0;
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      justify-content: center;
      gap: 32px 40px;
      transform: rotate(-22deg);
    }
    .bg-watermark span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1rem, 3vw, 1.2rem);
      letter-spacing: .12em;
      color: rgba(255,255,255,0.035);
      white-space: nowrap;
      user-select: none;
    }

    #export-area .banner,
    #export-area .match-container,
    #export-area .footer-strip {
      position: relative;
      z-index: 1;
    }

    /* ── BANNER ── */
    .banner {
      flex-shrink: 0;
      padding: 14px 14px 8px;
      text-align: center;
      background: var(--t-header-bg, transparent);
    }

    .brand-logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 10px;
      border: 2px solid var(--t-accent, #00ff87);
      box-shadow: 0 0 28px var(--t-accent-glow, rgba(0,255,135,.4));
    }

    .banner-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.1rem, 3.5vw, 1.5rem);
      letter-spacing: .16em;
      color: var(--t-text, #fff);
      line-height: 1;
      text-shadow: 0 0 30px var(--t-accent-glow, transparent);
    }

    .banner-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 9px 12px 7px;
    }
    .banner-divider::before, .banner-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--t-accent, #00ff87));
    }
    .banner-divider::after {
      background: linear-gradient(90deg, var(--t-accent, #00ff87), transparent);
    }

    .banner-date {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(0.6rem, 2vw, 0.78rem);
      font-weight: 700;
      color: var(--t-sub, #94a3b8);
      letter-spacing: .1em;
      text-transform: uppercase;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 999px;
      padding: 3px 14px;
      display: inline-block;
    }

    /* ── MATCH LIST ── */
    .match-container {
      flex: 1;
      overflow-y: auto;
      padding: 5px 9px 9px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sim-card {
      background: var(--t-card, rgba(255,255,255,0.04));
      border: 1px solid var(--t-border, rgba(255,255,255,0.08));
      border-radius: 13px;
      padding: 7px 9px;
      display: grid;
      grid-template-columns: 68px 1fr;
      grid-template-rows: auto auto;
      gap: 4px 8px;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .sim-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--t-stripe, #00ff87);
      border-radius: 3px 0 0 3px;
    }

    .sim-card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.015));
      pointer-events: none;
    }

    .sim-time {
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px;
      padding: 6px 4px;
      gap: 1px;
    }
    .sim-time .kick {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.6rem, 2.2vw, 0.82rem);
      font-weight: 700;
      color: var(--t-accent, #00ff87);
      letter-spacing: .04em;
      line-height: 1;
    }
    .sim-time .wib {
      font-size: clamp(0.42rem, 1.5vw, 0.55rem);
      font-weight: 700;
      color: var(--t-sub, #64748b);
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .sim-teams {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .team-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 0;
    }

    .team-block img {
      width: clamp(22px, 5vw, 30px);
      height: clamp(22px, 5vw, 30px);
      object-fit: contain;
    }

    .team-name {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: clamp(0.52rem, 1.9vw, 0.72rem);
      color: var(--t-text, #fff);
      text-align: center;
      line-height: 1.15;
      word-break: break-word;
    }

    .vs-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      gap: 1px;
    }
    .vs-badge .vs-line {
      width: 1px;
      height: 10px;
      background: var(--t-border, rgba(255,255,255,.12));
    }
    .vs-badge .vs-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(0.55rem, 1.8vw, 0.72rem);
      color: var(--t-sub, #64748b);
      letter-spacing: .06em;
    }

    .sim-tv {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(0.48rem, 1.7vw, 0.65rem);
      font-weight: 700;
      color: var(--t-tv, #fbbf24);
      border-top: 1px solid rgba(255,255,255,.06);
      padding-top: 3px;
      text-align: center;
      line-height: 1.3;
    }

    /* ── FOOTER ── */
    .footer-strip {
      flex-shrink: 0;
      padding: 8px 12px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,.06);
      background: var(--t-footer-bg, rgba(0,0,0,.5));
    }
    .footer-logo-sm {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 5px;
      border: 1px solid rgba(255,255,255,.12);
      display: block;
    }
    .footer-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(0.5rem, 1.6vw, 0.62rem);
      font-weight: 700;
      letter-spacing: .08em;
      color: var(--t-sub, #64748b);
    }

    /* ── PREVIEW MSG ── */
    .preview-msg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 8px;
      color: rgba(255,255,255,0.02);
      pointer-events: none;
    }

    /* ── THEME BACKGROUNDS ── */
    .bg-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">⚽ JADWAL BOLA PRO</div>
    <p>Design premium · TikTok 9:16 · Export PNG</p>

    <div class="field-group">
      <label>JUDUL HEADER
        <input type="text" id="input-header" value="JADWAL BOLA MALAM INI" />

      <!-- BG Layer (rendered by JS) -->
      <canvas class="bg-layer" id="bg-canvas" aria-hidden="true"></canvas>

      <div class="bg-watermark" id="bg-watermark" aria-hidden="true"></div>

        <div class="footer-text" id="view-footer">🎵 CORNERKIICK  |  📸 CORNERKIICK  |  📺 CORNERKIICK</div>
      </div>
    </div>
  </main>
</div>

<script>
/* ─── CONSTANTS ─── */
const BULAN_ID = ["","Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
const HARI_ID  = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];

/* ─── THEMES ─── */
const THEMES = {
  neonGreen: {
    name:"🟢 Neon Pitch",
    swatch:"linear-gradient(145deg,#06080f,#00ff87)",
    bg:"#06080f", bg2:"#0a1a12",
    accent:"#00ff87", accentGlow:"rgba(0,255,135,.55)",
    sub:"#34d399", text:"#f0fff4",
    card:"rgba(0,255,135,.05)", border:"rgba(0,255,135,.15)",
    tv:"#fde047", timeBg:"#0a1810",
    footerBg:"rgba(0,0,0,.7)",
    glow:"rgba(0,255,135,.35)",
    stripes:["#00ff87","#00e5ff","#ffd700","#00c96b"],
    wm:"rgba(0,255,135,.03)",
    decoFn:"stadium",
  },
  cyberPurple: {
    name:"🟣 Cyber Violet",
    swatch:"linear-gradient(145deg,#060213,#bf5fff,#00e5ff)",
    bg:"#06020f", bg2:"#12063a",
    accent:"#bf5fff", accentGlow:"rgba(191,95,255,.55)",
    sub:"#a78bfa", text:"#faf5ff",
    card:"rgba(191,95,255,.05)", border:"rgba(191,95,255,.15)",
    tv:"#f0abfc", timeBg:"#0d0620",
    footerBg:"rgba(0,0,0,.7)",
    glow:"rgba(191,95,255,.35)",
    stripes:["#bf5fff","#00e5ff","#f472b6","#818cf8"],
    wm:"rgba(191,95,255,.03)",
    decoFn:"cyber",
  },
  goldCup: {
    name:"🏆 Gold Cup",
    swatch:"linear-gradient(145deg,#0f0b00,#ffd700,#ff8c00)",
    bg:"#0a0700", bg2:"#1c1200",
    accent:"#ffd700", accentGlow:"rgba(255,215,0,.55)",
    sub:"#fbbf24", text:"#fffbeb",
    card:"rgba(255,215,0,.05)", border:"rgba(255,215,0,.15)",
    tv:"#fde68a", timeBg:"#120e00",
    footerBg:"rgba(0,0,0,.75)",
    glow:"rgba(255,215,0,.35)",
    stripes:["#ffd700","#ff8c00","#fbbf24","#f59e0b"],
    wm:"rgba(255,215,0,.03)",
    decoFn:"gold",
  },
  champRed: {
    name:"🔴 Champions",
    swatch:"linear-gradient(145deg,#0a0202,#ff3c5a,#ff6b00)",
    bg:"#080101", bg2:"#1a0505",
    accent:"#ff3c5a", accentGlow:"rgba(255,60,90,.55)",
    sub:"#fca5a5", text:"#fff5f5",
    card:"rgba(255,60,90,.05)", border:"rgba(255,60,90,.15)",
    tv:"#fde047", timeBg:"#150303",
    footerBg:"rgba(0,0,0,.75)",
    glow:"rgba(255,60,90,.4)",
    stripes:["#ff3c5a","#ff6b00","#ffd700","#ff0040"],
    wm:"rgba(255,60,90,.035)",
    decoFn:"inferno",
  },
  iceCyan: {
    name:"❄️ Ice Arena",
    swatch:"linear-gradient(145deg,#020d18,#00e5ff,#4fd9ff)",
    bg:"#020b14", bg2:"#061822",
    accent:"#00e5ff", accentGlow:"rgba(0,229,255,.55)",
    sub:"#67e8f9", text:"#f0fdff",
    card:"rgba(0,229,255,.05)", border:"rgba(0,229,255,.15)",
    tv:"#fde047", timeBg:"#030e18",
    footerBg:"rgba(0,0,0,.72)",
    glow:"rgba(0,229,255,.35)",
    stripes:["#00e5ff","#38bdf8","#67e8f9","#0ea5e9"],
    wm:"rgba(0,229,255,.03)",
    decoFn:"ice",
  },
  darkBlaze: {
    name:"🌙 Dark Blaze",
    swatch:"linear-gradient(145deg,#020206,#2563eb,#7c3aed)",
    bg:"#020206", bg2:"#0a0a1a",
    accent:"#6366f1", accentGlow:"rgba(99,102,241,.55)",
    sub:"#818cf8", text:"#f8faff",
    card:"rgba(99,102,241,.05)", border:"rgba(99,102,241,.15)",
    tv:"#fbbf24", timeBg:"#060618",
    footerBg:"rgba(0,0,0,.75)",
    glow:"rgba(99,102,241,.35)",
    stripes:["#6366f1","#8b5cf6","#38bdf8","#4f46e5"],
    wm:"rgba(99,102,241,.03)",
    decoFn:"blaze",
  },
};

let currentTheme = "neonGreen";

/* ─── STATE ─── */
const SETTINGS_KEY = "jadwal-bola-pro-settings";
let allSchedules = {};
let selectedDate = todayISO();
let staticLogos = null;
const logoCache = {};
let brandLogoImg = null;

const $ = s => document.querySelector(s);
const datePicker = $("#date-picker");
const statusEl   = $("#status");
const matchList  = $("#match-list");
const displayDate = $("#display-date");
const btnDownload = $("#btn-download");
const inputHeader = $("#input-header");
const inputTiktok = $("#input-tiktok");
const inputFooter = $("#input-footer");
const exportArea  = $("#export-area");

const BRAND_PATHS = ["assets/branding/CORNERKIICK.png","CORNERKIICK.png"];

/* ─── HELPERS ─── */
function todayISO() {
  return new Date().toLocaleDateString("en-CA", {timeZone:"Asia/Jakarta"});
}
function formatDateID(iso) {
  if (!iso) return "—";
  const [y,m,d] = iso.split("-").map(Number);
  return `${HARI_ID[new Date(y,m-1,d).getDay()]}, ${d} ${BULAN_ID[m]} ${y}`;
}
function escapeHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function getTheme() { return THEMES[currentTheme] || THEMES.neonGreen; }
function normalizeName(n) { return n.toLowerCase().trim().replace(/[^a-z0-9]+/g," ").replace(/\s+/g," "); }
function slugify(name) { return name.toLowerCase().trim().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||"unknown"; }
function isRemote(p) { return /^https?:\/\//i.test(p||""); }
function assetPath(p) {
  const path = location.pathname;
  const base = path.endsWith("/") ? path : path.slice(0,path.lastIndexOf("/")+1)||"/";
  return base + p.replace(/^\//,"");
}

/* ─── THEME PICKER ─── */
function buildThemePicker() {
  const grid = $("#theme-grid");
  grid.innerHTML = Object.entries(THEMES).map(([id,t])=>`
    <label class="theme-card${id===currentTheme?" active":""}" data-theme="${id}">
      <input type="radio" name="theme" value="${id}" ${id===currentTheme?"checked":""} />
      <div class="theme-swatch" style="background:${t.swatch}"></div>

  grid.querySelectorAll(".theme-card").forEach(card=>{
    card.addEventListener("click",()=>{

      grid.querySelectorAll(".theme-card").forEach(c=>c.classList.toggle("active",c.dataset.theme===currentTheme));
      applyTheme(currentTheme);
      saveSettings();

function applyTheme(id) {
  const t = THEMES[id]||THEMES.neonGreen;
  const ea = exportArea;
  const set = (k,v) => ea.style.setProperty(k,v);
  set("--t-bg", t.bg);
  set("--t-card", t.card);
  set("--t-border", t.border);
  set("--t-text", t.text);
  set("--t-sub", t.sub);
  set("--t-accent", t.accent);
  set("--t-accent-glow", t.accentGlow);
  set("--t-tv", t.tv);
  set("--t-footer-bg", t.footerBg);
  set("--t-glow", t.glow);
  // draw BG canvas
  const canvas = $("#bg-canvas");
  drawBgCanvas(canvas, t);
  // re-render match borders
  const cards = exportArea.querySelectorAll(".sim-card");
  cards.forEach((card,i)=>{ card.style.setProperty("--t-stripe", t.stripes[i%t.stripes.length]); });
}

function drawBgCanvas(canvas, t) {
  const ea = exportArea;
  const W = ea.offsetWidth || 400;
  const H = ea.offsetHeight || 711;
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext("2d");
  // base
  ctx.fillStyle = t.bg;
  ctx.fillRect(0,0,W,H);
  // deco
  switch(t.decoFn) {
    case "cyber":   drawDecoCyber(ctx,W,H,t); break;
    case "gold":    drawDecoGold(ctx,W,H,t); break;
    case "inferno": drawDecoInferno(ctx,W,H,t); break;
    case "ice":     drawDecoIce(ctx,W,H,t); break;
    case "blaze":   drawDecoBlaze(ctx,W,H,t); break;
    default:        drawDecoStadium(ctx,W,H,t);
  }
  // top glow
  const tg = ctx.createRadialGradient(W/2,0,0,W/2,0,H*0.5);
  tg.addColorStop(0, t.accentGlow.replace(/[\d.]+\)$/,"0.18)"));
  tg.addColorStop(1,"transparent");
  ctx.fillStyle = tg; ctx.fillRect(0,0,W,H*0.5);
}

function drawDecoStadium(ctx,W,H,t) {
  // pitch lines
  ctx.strokeStyle = "rgba(255,255,255,0.05)"; ctx.lineWidth = 1.5;
  for(let i=0;i<7;i++) { ctx.beginPath(); ctx.moveTo(0,i*(H/7)); ctx.lineTo(W,i*(H/7)); ctx.stroke(); }
  ctx.beginPath(); ctx.arc(W/2,H*0.38,W*0.26,0,Math.PI*2); ctx.stroke();
  ctx.strokeRect(W*0.1,H*0.2,W*0.8,H*0.36);
  ctx.beginPath(); ctx.moveTo(W/2,H*0.2); ctx.lineTo(W/2,H*0.56); ctx.stroke();
}
function drawDecoCyber(ctx,W,H,t) {
  ctx.strokeStyle="rgba(191,95,255,0.07)"; ctx.lineWidth=1;
  for(let x=0;x<W;x+=44){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0;y<H;y+=44){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  [[0.1,0.1],[0.9,0.85]].forEach(([px,py])=>{
    const rg=ctx.createRadialGradient(px*W,py*H,0,px*W,py*H,W*0.4);
    rg.addColorStop(0,"rgba(191,95,255,0.18)"); rg.addColorStop(1,"transparent");
    ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
  });
}
function drawDecoGold(ctx,W,H,t) {
  ctx.strokeStyle="rgba(255,215,0,0.07)"; ctx.lineWidth=1.5;
  for(let i=-H;i<W+H;i+=54){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i+H,H); ctx.stroke(); }
  const rg=ctx.createRadialGradient(W/2,0,0,W/2,0,H*0.55);
  rg.addColorStop(0,"rgba(255,215,0,0.18)"); rg.addColorStop(1,"transparent");
  ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
}
function drawDecoInferno(ctx,W,H,t) {
  const g=ctx.createLinearGradient(0,H,0,0);
  g.addColorStop(0,"rgba(255,60,90,0.25)"); g.addColorStop(0.5,t.bg); g.addColorStop(1,t.bg2);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const rg=ctx.createRadialGradient(W*0.3,H*0.1,0,W*0.3,H*0.1,W*0.55);
  rg.addColorStop(0,"rgba(255,107,0,0.2)"); rg.addColorStop(1,"transparent");
  ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
}
function drawDecoIce(ctx,W,H,t) {
  ctx.strokeStyle="rgba(0,229,255,0.06)"; ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0;y<H;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  const rg=ctx.createRadialGradient(W/2,0,0,W/2,0,W*0.7);
  rg.addColorStop(0,"rgba(0,229,255,0.15)"); rg.addColorStop(1,"transparent");
  ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
}
function drawDecoBlaze(ctx,W,H,t) {
  const g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,"rgba(37,99,235,0.2)"); g.addColorStop(1,"rgba(124,58,237,0.2)");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="rgba(99,102,241,0.08)"; ctx.lineWidth=1;
  for(let i=-H;i<W+H;i+=50){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i+H*0.5,H); ctx.stroke(); }
}

/* ─── LOGOS ─── */
async function loadStaticLogos() {
  if(staticLogos) return staticLogos;
  try {
    const r = await fetch(assetPath("logos.json?v=3"));
    staticLogos = r.ok ? await r.json() : {teams:{},leagues:{}};
  } catch(e) { staticLogos={teams:{},leagues:{}}; }
  return staticLogos;
}
function findBadge(map,name) {
  if(!map||!name) return null;
  if(map[name]&&!isRemote(map[name])) return map[name];
  const norm=normalizeName(name);
  let best=null, bestLen=0;
  for(const[k,url] of Object.entries(map)){
    if(isRemote(url)) continue;
    const kn=normalizeName(k);
    if(norm===kn) return url;
    if((norm.includes(kn)||kn.includes(norm))&&k.length>bestLen){ best=url; bestLen=k.length; }
  }
  return best;
}
function resolveTeamLogo(name) {
  const m = staticLogos ? findBadge(staticLogos.teams,name) : null;
  const base = m && !isRemote(m) ? m.replace(/\.(png|svg|jpg|webp)$/i,"") : `assets/logos/teams/${slugify(name)}`;
  return base;
}
function localCandidates(base) {
  if(!base||isRemote(base)) return [];
  const b = base.replace(/\.(png|svg|jpg|webp)$/i,"");
  return [".png",".svg",".jpg",".webp"].map(e=>b+e);
}
function getCached(p) { if(!p) return null; const k=p.replace(/\.(png|svg|jpg|webp)$/i,""); return logoCache[p]||logoCache[k]||null; }
async function tryLoad(p) {
  if(!p) return null;
  const src = isRemote(p) ? p : assetPath(p);
  const cached = getCached(p); if(cached) return cached;
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{ logoCache[p]=img; logoCache[p.replace(/\.(png|svg|jpg|webp)$/i,"")]=img; res(img); };
    img.onerror=()=>res(null);
    img.src=src;
  });
}
async function loadImage(base) {
  if(!base) return null;
  const c=getCached(base); if(c) return c;
  for(const cand of localCandidates(base)){ const img=await tryLoad(cand); if(img) return img; }
  return null;
}
async function loadBrandLogo() {
  if(brandLogoImg) return brandLogoImg;
  for(const p of BRAND_PATHS){ const img=await tryLoad(p); if(img){ brandLogoImg=img; return img; }}
  return null;
}
function setupBrandPreviews() {
  const url = assetPath(BRAND_PATHS[0]);
  ["#brand-logo","#footer-logo"].forEach(id=>{
    const el=$(id); if(!el) return;
    el.src=url;
    el.onerror=()=>{ el.src=assetPath(BRAND_PATHS[1]); };
  });
}

/* ─── LOGO TAG ─── */
function logoTag(base,alt) {
  const cands = localCandidates(base).map(c=>assetPath(c));
  if(!cands.length) return "";
  return `<img src="${escapeHtml(cands[0])}" alt="${escapeHtml(alt)}" loading="lazy"
    data-logos='${JSON.stringify(cands).replace(/'/g,"&#39;")}'
    onerror="(function(el){var u=JSON.parse(el.dataset.logos),n=+(el.dataset.i||0)+1;el.dataset.i=n;if(n<u.length)el.src=u[n];else el.style.visibility='hidden'})(this)">`;
}

          ${logoTag(resolveTeamLogo(m.home),m.home)}
          <span class="team-name">${escapeHtml(m.home)}</span>
        </div>
        <div class="vs-badge">
          <div class="vs-line"></div>
          <div class="vs-text">VS</div>
          <div class="vs-line"></div>
        </div>
        <div class="team-block">
          ${logoTag(resolveTeamLogo(m.away),m.away)}
          <span class="team-name">${escapeHtml(m.away)}</span>
        </div>
      </div>
      <div class="sim-tv">${escapeHtml(tvStr)}</div>

/* ─── FETCH DATA ─── */
async function fetchSchedule() {
  setStatus("Memuat jadwal...");
  try {
    const r = await fetch(assetPath("data/jadwal.json"));
    if(!r.ok) throw new Error(`HTTP ${r.status}`);

/* ─── IMPORT HTML ─── */
function importHtmlFile(file) {
  const reader=new FileReader();
  reader.onload=async e=>{
    try {
      const doc=new DOMParser().parseFromString(e.target.result,"text/html");
      const rows=doc.querySelectorAll("table tr");
      if(!rows.length) throw new Error("Tabel tidak ditemukan.");
      let count=0;
      rows.forEach(tr=>{
        const cells=[...tr.querySelectorAll("td")].map(td=>td.textContent.trim());
        if(cells.length<4) return;
        const[kickoff,matchup,competition,tv]=cells;
        if(/kick-off/i.test(kickoff)||!/vs/i.test(matchup)) return;
        const parts=matchup.split(/\s+vs\s+/i);
        if(!allSchedules[selectedDate]) allSchedules[selectedDate]=[];
        allSchedules[selectedDate].push({kickoff,matchup,home:(parts[0]||"").trim(),away:(parts[1]||"").trim(),competition,tv,tvFree:[],tvPaid:[]});
        count++;
      });
      await loadStaticLogos();
      setStatus(`✓ Import ${count} pertandingan.`,"success");
      renderMatches(selectedDate);
    } catch(err){ setStatus(`Gagal import: ${err.message}`,"error"); }
  };
  reader.readAsText(file,"UTF-8");
}

/* ═══ PNG EXPORT ═══ */
const PNG_W = 1080, PNG_H = 1920;

function rrect(ctx,x,y,w,h,r,fill,stroke,sw) {
  const rad=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+rad,y); ctx.lineTo(x+w-rad,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+rad); ctx.lineTo(x+w,y+h-rad);
  ctx.quadraticCurveTo(x+w,y+h,x+w-rad,y+h); ctx.lineTo(x+rad,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-rad); ctx.lineTo(x,y+rad);
  ctx.quadraticCurveTo(x,y,x+rad,y); ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||2;ctx.stroke();}
}

function wrapText(ctx,text,maxW,maxLines) {
  const words=text.split(/\s+/), lines=[];
  let line="";
  for(const w of words){
    const test=line?line+" "+w:w;
    if(ctx.measureText(test).width<=maxW) line=test;
    else { if(line)lines.push(line); line=w; }
  }
  if(line)lines.push(line);
  return lines.slice(0,maxLines);
}

function drawPngBackground(ctx,W,H,t) {
  ctx.fillStyle=t.bg; ctx.fillRect(0,0,W,H);
  switch(t.decoFn) {
    case "cyber":   drawDecoCyber(ctx,W,H,t); break;
    case "gold":    drawDecoGold(ctx,W,H,t); break;
    case "inferno": drawDecoInferno(ctx,W,H,t); break;
    case "ice":     drawDecoIce(ctx,W,H,t); break;
    case "blaze":   drawDecoBlaze(ctx,W,H,t); break;
    default:        drawDecoStadium(ctx,W,H,t);
  }
  // top glow
  const rg=ctx.createRadialGradient(W/2,0,0,W/2,0,H*0.55);
  rg.addColorStop(0,t.accentGlow.replace(/[\d.]+\)$/,"0.22)")); rg.addColorStop(1,"transparent");
  ctx.fillStyle=rg; ctx.fillRect(0,0,W,H*0.55);
  // bottom gradient
  const bg2=ctx.createLinearGradient(0,H*0.6,0,H);
  bg2.addColorStop(0,"transparent"); bg2.addColorStop(1,"rgba(0,0,0,0.6)");
  ctx.fillStyle=bg2; ctx.fillRect(0,H*0.6,W,H*0.4);
}

function drawPngWm(ctx,W,H,t) {
  const text=wmText(); if(!text) return;
  ctx.save();
  ctx.translate(W/2,H/2); ctx.rotate(-Math.PI/7);
  ctx.fillStyle=`rgba(255,255,255,0.03)`;
  ctx.font="900 80px 'Bebas Neue',Impact,sans-serif";
  ctx.textAlign="center";
  for(let dy=-H*0.5;dy<H*0.5;dy+=160) ctx.fillText(text,0,dy);
  ctx.restore();
}

function drawPngHeader(ctx,W,t,brandImg,title,dateStr) {
  let titleY = 140;
  if(brandImg) {
    const sz=110, cx=W/2, cy=60+sz/2;
    // glow ring
    const rg=ctx.createRadialGradient(cx,cy,sz*0.3,cx,cy,sz*0.8);
    rg.addColorStop(0,t.accentGlow); rg.addColorStop(1,"transparent");
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(cx,cy,sz*0.9,0,Math.PI*2); ctx.fill();
    // clip + draw
    ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,sz/2,0,Math.PI*2); ctx.clip();
    ctx.drawImage(brandImg,cx-sz/2,cy-sz/2,sz,sz);
    ctx.restore();
    // border
    ctx.beginPath(); ctx.arc(cx,cy,sz/2,0,Math.PI*2);
    ctx.strokeStyle=t.accent; ctx.lineWidth=4; ctx.globalAlpha=0.9; ctx.stroke(); ctx.globalAlpha=1;
    titleY = 60+sz+36;
  }

  // title glow
  ctx.save();
  ctx.shadowColor=t.accent; ctx.shadowBlur=60;
  ctx.fillStyle=t.text;
  ctx.font="900 76px 'Bebas Neue',Impact,sans-serif";
  ctx.textAlign="center";
  ctx.letterSpacing="12px";
  ctx.fillText(title.toUpperCase(), W/2, titleY);
  ctx.restore();

  // divider line
  const lineY=titleY+22;
  const grad=ctx.createLinearGradient(W*0.1,0,W*0.9,0);
  grad.addColorStop(0,"transparent"); grad.addColorStop(0.5,t.accent); grad.addColorStop(1,"transparent");
  ctx.strokeStyle=grad; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(W*0.1,lineY); ctx.lineTo(W*0.9,lineY); ctx.stroke();

  // date pill
  ctx.font="bold 32px 'Rajdhani',sans-serif";
  const dW=ctx.measureText(dateStr).width+64;
  rrect(ctx,W/2-dW/2,lineY+14,dW,52,26,"rgba(0,0,0,0.4)",t.border,1.5);
  ctx.fillStyle=t.sub; ctx.textAlign="center";
  ctx.fillText(dateStr.toUpperCase(), W/2, lineY+14+37);

  return lineY+14+52+30; // returns next Y
}

function drawPngMatchRow(ctx,m,y,rowH,t,stripe) {
  const W=PNG_W;
  const cardX=28, cardW=W-56;

  // card shadow + base
  ctx.save();
  ctx.shadowColor="rgba(0,0,0,0.55)"; ctx.shadowBlur=24; ctx.shadowOffsetY=10;
  rrect(ctx,cardX,y,cardW,rowH,28,"rgba(255,255,255,0.04)",null);
  ctx.restore();

  // card border
  rrect(ctx,cardX,y,cardW,rowH,28,null,t.border,1.5);

  // accent stripe (left edge)
  ctx.fillStyle=stripe;
  ctx.beginPath(); ctx.roundRect(cardX,y+14,7,rowH-28,4); ctx.fill();

  // right shimmer
  const shimmer=ctx.createLinearGradient(cardX+cardW*0.55,0,cardX+cardW,0);
  shimmer.addColorStop(0,"transparent"); shimmer.addColorStop(1,"rgba(255,255,255,0.02)");
  rrect(ctx,cardX,y,cardW,rowH,28,null,null);
  ctx.clip(); ctx.fillStyle=shimmer; ctx.fillRect(cardX,y,cardW,rowH);
  ctx.restore();

  // TIME BOX
  const timeX=cardX+16, timeW=106, timeH=rowH-22;
  rrect(ctx,timeX,y+11,timeW,timeH,18,"rgba(0,0,0,0.45)",t.border+",1",1.5);

  ctx.save();
  ctx.shadowColor=t.accent; ctx.shadowBlur=20;
  ctx.fillStyle=t.accent;
  ctx.font="900 42px 'Orbitron',monospace";
  ctx.textAlign="center";
  ctx.fillText(m.kickoff,timeX+timeW/2,y+rowH*0.42);
  ctx.restore();

  ctx.fillStyle=t.sub;
  ctx.font="700 19px 'Rajdhani',sans-serif";
  ctx.textAlign="center";
  ctx.fillText("WIB",timeX+timeW/2,y+rowH*0.62);

  // TEAMS
  const contentX=cardX+134, contentW=cardW-142;
  const homeCx=contentX+contentW*0.22, awayCx=contentX+contentW*0.78, midCx=contentX+contentW/2;
  const teamTop=y+12;
  const logoSz=Math.min(78,Math.max(52,rowH-120));
  const nameFontPx=Math.round(logoSz*0.44);
  const nameGap=Math.round(logoSz*0.32);

  [{ cx:homeCx, name:m.home, img:getCached(resolveTeamLogo(m.home)) },
   { cx:awayCx, name:m.away, img:getCached(resolveTeamLogo(m.away)) }].forEach(({cx,name,img})=>{
    // ring
    const rg=ctx.createRadialGradient(cx,teamTop+logoSz/2,logoSz*0.2,cx,teamTop+logoSz/2,logoSz*0.65);
    rg.addColorStop(0,"rgba(255,255,255,0.05)"); rg.addColorStop(1,"transparent");
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(cx,teamTop+logoSz/2,logoSz*0.65,0,Math.PI*2); ctx.fill();
    if(img) ctx.drawImage(img,cx-logoSz/2,teamTop,logoSz,logoSz);
    // name
    ctx.fillStyle=t.text;
    ctx.font=`700 ${nameFontPx}px 'Rajdhani',sans-serif`;
    ctx.textAlign="center";
    const lines=wrapText(ctx,name,contentW*0.42,2);
    lines.forEach((ln,i)=>ctx.fillText(ln,cx,teamTop+logoSz+nameGap+i*nameFontPx*1.2));
  });

  // VS badge
  ctx.fillStyle=t.accent;
  ctx.font="900 26px 'Bebas Neue',sans-serif";
  ctx.textAlign="center";
  ctx.fillText("VS",midCx,teamTop+logoSz/2+10);

  // TV divider
  const divY=y+rowH-58;
  const dg=ctx.createLinearGradient(contentX,0,contentX+contentW,0);
  dg.addColorStop(0,"transparent"); dg.addColorStop(0.5,t.border); dg.addColorStop(1,"transparent");
  ctx.strokeStyle=dg; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(contentX+8,divY); ctx.lineTo(contentX+contentW-8,divY); ctx.stroke();

  // TV text
  const tvStr=shortTv(m);
  ctx.fillStyle=t.tv;
  ctx.font="700 28px 'Rajdhani',sans-serif";
  ctx.textAlign="center";
  const tvLines=wrapText(ctx,tvStr,contentW-16,2);
  tvLines.forEach((ln,j)=>ctx.fillText(ln,midCx,divY+32+j*30));
}

function drawPngFooter(ctx,W,H,t,brandImg,footerText,footerY) {
  // bar
  const grad=ctx.createLinearGradient(0,footerY,0,H);
  grad.addColorStop(0,"rgba(0,0,0,0)"); grad.addColorStop(0.3,t.footerBg); grad.addColorStop(1,"#000");
  ctx.fillStyle=grad; ctx.fillRect(0,footerY-30,W,H-footerY+30);

  // accent top line
  const lg=ctx.createLinearGradient(0,0,W,0);
  lg.addColorStop(0,"transparent"); lg.addColorStop(0.5,t.accent); lg.addColorStop(1,"transparent");
  ctx.strokeStyle=lg; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(48,footerY); ctx.lineTo(W-48,footerY); ctx.stroke();

  let textY=footerY+44;
  if(brandImg) {
    const sz=60, cx=W/2, cy=footerY+sz/2+10;
    ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,sz/2,0,Math.PI*2); ctx.clip();
    ctx.drawImage(brandImg,cx-sz/2,cy-sz/2,sz,sz);
    ctx.restore();
    ctx.beginPath(); ctx.arc(cx,cy,sz/2,0,Math.PI*2);
    ctx.strokeStyle=t.accent; ctx.lineWidth=2.5; ctx.globalAlpha=0.7; ctx.stroke(); ctx.globalAlpha=1;
    textY=cy+sz/2+22;
  }
  ctx.fillStyle=t.sub;
  ctx.font="700 26px 'Rajdhani',sans-serif";
  ctx.textAlign="center";
  const lines=wrapText(ctx,footerText,W-100,2);
  lines.forEach((ln,i)=>ctx.fillText(ln,W/2,textY+i*32));
}

async function downloadPNG() {
  const matches=allSchedules[selectedDate]||[];
  if(!matches.length) return;
  btnDownload.disabled=true;
  setStatus("Memproses PNG...");
  try {
    await loadStaticLogos();
    const t=getTheme();
    const urls=[...new Set(matches.flatMap(m=>[resolveTeamLogo(m.home),resolveTeamLogo(m.away)]).filter(Boolean))];
    await Promise.all(urls.map(loadImage));
    const brandImg=await loadBrandLogo();

    const canvas=document.createElement("canvas");
    canvas.width=PNG_W*2; canvas.height=PNG_H*2;
    const ctx=canvas.getContext("2d");
    ctx.scale(2,2);
    ctx.textBaseline="alphabetic";

    drawPngBackground(ctx,PNG_W,PNG_H,t);
    drawPngWm(ctx,PNG_W,PNG_H,t);

    const title=inputHeader.value||"JADWAL BOLA MALAM INI";
    const dateStr=formatDateID(selectedDate);
    let y0=drawPngHeader(ctx,PNG_W,t,brandImg,title,dateStr);

    const footerH=brandImg?120:90;
    const gap=12;
    const n=Math.min(matches.length,10);
    const avail=PNG_H-footerH-y0-16;
    const rowH=Math.max(160,Math.min(230,Math.floor((avail-gap*(n-1))/n)));

    for(let i=0;i<n;i++) {
      const m=matches[i];
      const y=y0+i*(rowH+gap);
      drawPngMatchRow(ctx,m,y,rowH,t,t.stripes[i%t.stripes.length]);
    }

    const footerY=y0+n*(rowH+gap);
    drawPngFooter(ctx,PNG_W,PNG_H,t,brandImg,inputFooter.value||"",footerY);

    // export at PNG_W x PNG_H
    const out=document.createElement("canvas");
    out.width=PNG_W; out.height=PNG_H;
    out.getContext("2d").drawImage(canvas,0,0,PNG_W,PNG_H);
    const link=document.createElement("a");
    link.download=`jadwal-${currentTheme}-${selectedDate}.png`;
    link.href=out.toDataURL("image/png");
    link.click();
    const loaded=urls.filter(u=>getCached(u)).length;
    setStatus(`✓ PNG "${t.name}" diunduh (${loaded}/${urls.length} logo).`,"success");
  } catch(err) {
    setStatus(`Gagal: ${err.message}`,"error"); console.error(err);
  } finally { btnDownload.disabled=false; }
}

function setStatus(msg,cls="") {
  statusEl.className="status"+(cls?" "+cls:"");
  statusEl.textContent=msg;
}

/* ─── EVENTS ─── */
$("#btn-refresh").addEventListener("click",fetchSchedule);
$("#btn-download").addEventListener("click",downloadPNG);
$("#btn-today").addEventListener("click",()=>{ selectedDate=todayISO(); datePicker.value=selectedDate; renderMatches(selectedDate); saveSettings(); });
datePicker.addEventListener("change",e=>{ selectedDate=e.target.value; renderMatches(selectedDate); saveSettings(); });
$("#file-import").addEventListener("change",e=>{ const f=e.target.files[0]; if(f)importHtmlFile(f); e.target.value=""; });

/* ─── INIT ─── */
loadSettings();
setupBrandPreviews();
datePicker.value=selectedDate;
$("#view-header").textContent=inputHeader.value;
$("#view-footer").textContent=inputFooter.value;
buildThemePicker();
applyTheme(currentTheme);
updateWm();
fetchSchedule();

// Redraw bg canvas on resize
const ro=new ResizeObserver(()=>applyTheme(currentTheme));
ro.observe(exportArea);
</script>
