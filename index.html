const HARI=["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
const FREE_KW=["sctv","indosiar","rcti","mnctv","gtv","antv","tvone","tv one","kompas tv","inews","inews tv","tvri","trans tv","trans7","trans 7","metro tv","net tv","net."];
const PAID_KW=["vidio","bein","bein sports","vision+","vision plus","mola","spotv","apple tv","disney","netflix","prime video","hbo","espn","dazn"];

function classifyTv(stations){
  if(!stations||stations==="-"||stations==="TBC")return{tvFree:[],tvPaid:[],tv:stations||""};
  const parts=stations.split("/").map(p=>p.trim()).filter(Boolean);
  const tvFree=[],tvPaid=[];
  for(const part of parts){
    const lower=part.toLowerCase();
    if(PAID_KW.some(k=>lower.includes(k)))tvPaid.push(part);
    else if(FREE_KW.some(k=>lower.includes(k)||k===lower))tvFree.push(part);
    else if(/sport/i.test(lower)||/\d/.test(lower))tvPaid.push(part);
    else tvFree.push(part);
  }
  return{tvFree,tvPaid,tv:stations};
}

function getTvDisplay(m){
  const raw=(m.tv||"").trim();
  if(raw&&raw!=="-"&&raw!=="TBC"){
    const c=classifyTv(raw);
    return{...c,tv:raw};
  }
  const free=m.tvFree||[],paid=m.tvPaid||[];
  const tv=[...free,...paid].join(" / ")||"-";
  return{tvFree:free,tvPaid:paid,tv};
}

function todayISO(){return new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Jakarta"})}
function fmtDate(iso){if(!iso)return"—";const[y,m,d]=iso.split("-").map(Number);return`${HARI[new Date(y,m-1,d).getDay()]}, ${d} ${BULAN[m]} ${y}`}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function slug(n){return n.toLowerCase().trim().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||"x"}
function normN(n){return n.toLowerCase().trim().replace(/[^a-z0-9]+/g," ").trim()}
function isRemote(p){return/^https?:\/\//i.test(p||"")}
function getBase(){const p=location.pathname;if(p.endsWith("/"))return p;const i=p.lastIndexOf("/");return i>0?p.slice(0,i+1):"/"}
const BASE=getBase();
function asset(p){return BASE+p.replace(/^\//,"")}
function shortTv(m){return getTvDisplay(m).tv}
function isFreeTV(m){const d=getTvDisplay(m);return d.tvFree.length>0||FREE_KW.some(k=>d.tv.toLowerCase().includes(k))}
function getT(){return THEMES[currentTheme]||THEMES.purple}
function perPage(){return parseInt($("#sel-perpage").value)||7}
function setStatus(msg,cls=""){statusEl.className="sbar"+(cls?" "+cls:"");statusEl.textContent=msg}
function easeOut(t){return 1-Math.pow(1-t,3)}

const VIDEO_PRESETS={
  dramatic:{dur:"4",anim:"drop",sound:"whistle",volume:"75",bgm:"anthem",bgmVolume:"38"},
  energetic:{dur:"3",anim:"slide",sound:"drumhit",volume:"78",bgm:"trap",bgmVolume:"42"},
  minimal:{dur:"2",anim:"fade",sound:"swoosh_tick",volume:"58",bgm:"ambient",bgmVolume:"30"},
};

function applyVideoPreset(id){
  const p=VIDEO_PRESETS[id];
  if(!p) return;
  $("#sel-dur").value=p.dur;
  $("#sel-anim").value=p.anim;
  $("#sel-sound").value=p.sound;
  $("#sel-volume").value=p.volume;
  $("#sel-bgm").value=p.bgm;
  $("#sel-bgm-volume").value=p.bgmVolume;
}

// LOGO LOADING
// ═══════════════════════════════════════════
async function loadStaticLogos(){
  if(staticLogos)return staticLogos;
  try{const r=await fetch(asset("logos.json?v=6"));if(!r.ok)throw 0;staticLogos=await r.json();}
  catch{staticLogos={teams:{},leagues:{}};}
  return staticLogos;
}
function findBadge(map,name){
  if(!map||!name)return null;
  if(map[name]&&!isRemote(map[name]))return map[name];
  const norm=normN(name);let best=null,bl=0;
  for(const[k,v]of Object.entries(map)){
    if(isRemote(v))continue;const kn=normN(k);
    if(norm===kn)return v;
    if((norm.includes(kn)||kn.includes(norm))&&k.length>bl){best=v;bl=k.length;}
  }
  return best;
}
function teamBase(name){const m=staticLogos?findBadge(staticLogos.teams,name):null;return(m&&!isRemote(m))?m.replace(/\.(png|svg|jpg|webp)$/i,""):`assets/logos/teams/${slug(name)}`}
function leagueBase(comp){const m=staticLogos?findBadge(staticLogos.leagues,comp):null;return(m&&!isRemote(m))?m.replace(/\.(png|svg|jpg|webp)$/i,""):`assets/logos/leagues/${slug(comp)}`}
function tryLoad(path){
  const src=asset(path);if(logoCache[src])return Promise.resolve(logoCache[src]);
  return new Promise(res=>{const img=new Image();img.onload=()=>{logoCache[src]=img;res(img);};img.onerror=()=>res(null);img.src=src;});
}
async function loadLogo(base){
  if(!base)return null;if(logoCache[base])return logoCache[base];
  for(const ext of[".png",".svg",".jpg",".webp"]){const img=await tryLoad(base+ext);if(img){logoCache[base]=img;return img;}}
  return null;
}
function getCached(base){
  if(!base)return null;if(logoCache[base])return logoCache[base];
  for(const ext of[".png",".svg",".jpg",".webp"]){const k=asset(base+ext);if(logoCache[k])return logoCache[k];}
  return null;
}
async function preloadAll(matches){
  const paths=[...new Set(matches.flatMap(m=>[teamBase(m.home),teamBase(m.away),leagueBase(m.competition)]).filter(Boolean))];
  await Promise.all(paths.map(loadLogo));
}
async function loadBrand(){
  for(const p of["assets/branding/CORNERKIICK.png","CORNERKIICK.png"]){const img=await tryLoad(p);if(img)return img;}
  return null;
}

// ═══════════════════════════════════════════
// CANVAS UTILS
// ═══════════════════════════════════════════
function rr(c,x,y,w,h,r,fill,stroke,sw){
  if(w<=0||h<=0)return;
  const rad=Math.min(r,w/2,h/2);
  c.beginPath();c.moveTo(x+rad,y);c.lineTo(x+w-rad,y);c.quadraticCurveTo(x+w,y,x+w,y+rad);
  c.lineTo(x+w,y+h-rad);c.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);
  c.lineTo(x+rad,y+h);c.quadraticCurveTo(x,y+h,x,y+h-rad);c.lineTo(x,y+rad);c.quadraticCurveTo(x,y,x+rad,y);c.closePath();
  if(fill){c.fillStyle=fill;c.fill();}
  if(stroke){c.strokeStyle=stroke;c.lineWidth=sw||2;c.stroke();}
}
function wrapTxt(c,text,maxW,maxL){
  const words=String(text||"").split(/\s+/);const lines=[];let line="";
  for(const w of words){const t=line?line+" "+w:w;if(c.measureText(t).width<=maxW){line=t;}else{if(line)lines.push(line);line=w;}}
  if(line)lines.push(line);return lines.slice(0,maxL);
}
function drawImg(c,img,x,y,w,h,radius=0){
  if(!img)return;
  if(radius>0){c.save();rr(c,x,y,w,h,radius,null);c.clip();}
  c.drawImage(img,x,y,w,h);
  if(radius>0)c.restore();
}
function circleImg(c,img,cx,cy,r,border,borderW=3){
  if(!img)return;
  c.save();c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.clip();c.drawImage(img,cx-r,cy-r,r*2,r*2);c.restore();
  if(border){c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.strokeStyle=border;c.lineWidth=borderW;c.stroke();}
}

// ═══════════════════════════════════════════
// DRAW BACKGROUND
// ═══════════════════════════════════════════
function drawBg(c,t){
  // Main gradient
  const g=c.createLinearGradient(0,0,0,H);
  g.addColorStop(0,t.bgTop);g.addColorStop(0.5,t.bgMid);g.addColorStop(1,t.bgBot);
  c.fillStyle=g;c.fillRect(0,0,W,H);

  // Diagonal light sweep (like the reference image)
  c.save();
  const sweep=c.createLinearGradient(0,0,W,H*0.6);
  sweep.addColorStop(0,"rgba(255,255,255,0)");
  sweep.addColorStop(0.4,"rgba(255,255,255,0.04)");
  sweep.addColorStop(0.6,"rgba(255,255,255,0.07)");
  sweep.addColorStop(1,"rgba(255,255,255,0)");
  c.fillStyle=sweep;c.fillRect(0,0,W,H);
  c.restore();

  // Radial glow top-right (like reference)
  const gr=c.createRadialGradient(W*0.85,H*0.08,0,W*0.85,H*0.08,W*0.7);
  gr.addColorStop(0,t.accentGlow);gr.addColorStop(1,"transparent");
  c.fillStyle=gr;c.fillRect(0,0,W,H);

  // Radial glow bottom-left
  const gl=c.createRadialGradient(W*0.15,H*0.92,0,W*0.15,H*0.92,W*0.6);
  gl.addColorStop(0,t.accentGlow.replace("0.4","0.25"));gl.addColorStop(1,"transparent");
  c.fillStyle=gl;c.fillRect(0,0,W,H);

  // Watermark
  const wm=(inpTiktok.value||"").trim().replace(/^@+/,"");
  if(wm){
    c.save();c.translate(W/2,H/2);c.rotate(-Math.PI/8);
    c.font="900 90px 'Bebas Neue','Arial Black',sans-serif";
    c.fillStyle=t.wmColor;c.textAlign="center";
    for(let dy=-700;dy<=700;dy+=240)c.fillText("@"+wm.toUpperCase(),0,dy);
    c.restore();
  }
}

// ═══════════════════════════════════════════
// PNG LAYOUT — referensi style
// Row layout: [liga logo] [tim home + logo] [WAKTU] [logo tim away + nama] [TV logo]
// ═══════════════════════════════════════════
const ROW_GAP = 12;
const PAD_X = 28;
const HEADER_H = 220;
const DATE_ROW_H = 58;
const FOOTER_H = 92;

function rowAreaHeight(matchCount){
  return H-HEADER_H-16-DATE_ROW_H-6-FOOTER_H;
}

function rowHeightForCount(n){
  if(!n)return 120;
  const avail=rowAreaHeight(n);
  return Math.max(100,Math.min(138,Math.floor((avail-ROW_GAP*(n-1))/n)));
}

function getPages(){
  const pp=perPage();
  const pages=[];
  for(let i=0;i<allMatches.length;i+=pp)pages.push(allMatches.slice(i,i+pp));
  return pages.length?pages:[[]];
}

async function showPNGPreview(){
  const pages=getPages();
  const tp=Math.max(1,pages.length);
  previewPage=Math.max(0,Math.min(previewPage,tp-1));
  navPrev.disabled=previewPage<=0;
  navNext.disabled=previewPage>=tp-1;
  plbl.textContent=`${previewPage+1} / ${tp}`;
  const chunk=pages[previewPage]||[];
  if(!chunk.length){
    ctx.clearRect(0,0,W,H);
    drawBg(ctx,getT());
    return;
  }
  await renderPNGPage(ctx,chunk,previewPage+1,tp);
}

async function renderPNGPage(c,matches,pageNum,totalPages){
  const t=getT();
  c.clearRect(0,0,W,H);
  drawBg(c,t);

  const brand=await loadBrand();
  const rowH=rowHeightForCount(matches.length);
  const rowW=W-PAD_X*2;

  await drawHeader(c,t,brand,pageNum,totalPages);

  let curY=HEADER_H+16;
  // Tanggal sudah ada di header — tidak perlu drawDateRow lagi

  for(let i=0;i<matches.length;i++){
    await drawMatchRow(c,t,matches[i],PAD_X,curY,rowW,rowH);
    curY+=rowH+ROW_GAP;
  }

  drawFooter(c,t,brand);
}

async function drawHeader(c,t,brand,pageNum,totalPages){
  const cx=W/2;
  // Header background card
  c.save();
  c.shadowColor="rgba(0,0,0,0.5)";c.shadowBlur=30;c.shadowOffsetY=10;
  const hg=c.createLinearGradient(PAD_X,20,W-PAD_X,HEADER_H);
  hg.addColorStop(0,t.headerBg1);hg.addColorStop(1,t.headerBg2);
  rr(c,PAD_X,20,W-PAD_X*2,HEADER_H-20,24,hg,t.accent+"66",2);
  c.restore();

  // Shine line on top of header card
  const shine=c.createLinearGradient(PAD_X,20,W-PAD_X,20);
  shine.addColorStop(0,"transparent");shine.addColorStop(0.5,"rgba(255,255,255,0.35)");shine.addColorStop(1,"transparent");
  c.strokeStyle=shine;c.lineWidth=2;
  c.beginPath();c.moveTo(PAD_X+24,22);c.lineTo(W-PAD_X-24,22);c.stroke();

  // Brand logo LEFT
  if(brand){
    circleImg(c,brand,PAD_X+70,20+HEADER_H/2-10,52,t.accent,3);
  }

  // Brand logo RIGHT (second logo or same)
  if(brand){
    circleImg(c,brand,W-PAD_X-70,20+HEADER_H/2-10,52,t.accent,3);
  }

  // Title — BIG center
  c.save();
  c.shadowColor=t.accentGlow;c.shadowBlur=30;
  c.fillStyle=t.headerText;
  c.font="900 96px 'Bebas Neue','Arial Black',sans-serif";
  c.textAlign="center";c.textBaseline="middle";
  c.fillText((inpHeader.value||"TODAY MATCH").toUpperCase(),cx,20+HEADER_H/2-28);
  c.restore();

  // Date pill below title
  const ds=fmtDate(selectedDate);
  c.font="700 34px 'Inter','Segoe UI',sans-serif";
  const dw=c.measureText(ds).width;
  const pillW=dw+60,pillH=52,pillX=cx-pillW/2,pillY=20+HEADER_H/2+14;
  rr(c,pillX,pillY,pillW,pillH,pillH/2,"rgba(255,255,255,0.12)","rgba(255,255,255,0.3)",1.5);
  c.fillStyle=t.headerText;c.textAlign="center";c.textBaseline="middle";
  c.fillText(ds,cx,pillY+pillH/2);
  c.textBaseline="alphabetic";

  // Page indicator
  if(totalPages>1){
    c.font="600 24px 'Inter','Segoe UI',sans-serif";
    c.fillStyle=t.headerSub;c.textAlign="center";
    c.fillText(`Halaman ${pageNum} / ${totalPages}`,cx,20+HEADER_H-8);
  }
}

function drawDateRow(c,t,dateStr,y){
  const cx=W/2;
  const tw=c.measureText(dateStr).width;
  c.font="700 30px 'Inter','Segoe UI',sans-serif";
  const pillW=Math.min(tw+80,W-PAD_X*2),pillH=DATE_ROW_H-10;
  rr(c,cx-pillW/2,y,pillW,pillH,pillH/2,t.dateBg,t.dateBorder,1.5);
  c.fillStyle=t.dateText;c.textAlign="center";c.textBaseline="middle";
  c.fillText(dateStr,cx,y+pillH/2);
  c.textBaseline="alphabetic";
}

async function drawMatchRow(c,t,m,x,y,rowW,rowH){
  const cy = y + rowH/2;

  // ── KOLOM (kiri ke kanan) ──
  // [TIME 90px] [HOME team] [LIGA center] [AWAY team] [TV 150px]
  const TIME_W  = 90;
  const TV_W    = 150;
  const LIGA_W  = 100;  // kolom logo liga di tengah
  const TEAM_W  = (rowW - TIME_W - LIGA_W - TV_W) / 2;

  const xTime  = x;
  const xHome  = x + TIME_W;
  const xLiga  = xHome + TEAM_W;
  const xAway  = xLiga + LIGA_W;
  const xTV    = xAway + TEAM_W;

  const LOGO_SZ = Math.min(62, Math.max(50, rowH - 24));
  const LIGA_SZ = Math.min(60, rowH - 28);

  const tvInfo = getTvDisplay(m);

  // ── ROW BACKGROUND ──
  rr(c, x, y, rowW, rowH, 14, t.rowBg, t.rowBorder, 1);

  // ══════════════════════════════
  // 1. JAM — kiri
  // ══════════════════════════════
  const tcx = xTime + TIME_W/2;
  const tbW = 78, tbH = Math.min(56, rowH-16);
  rr(c, tcx-tbW/2, cy-tbH/2, tbW, tbH, 12, t.timeBg, t.timeBorder, 2);
  c.fillStyle = t.timeText;
  c.font = `900 ${Math.min(32,tbH*0.52)}px 'Bebas Neue','Arial Black',sans-serif`;
  c.textAlign = "center"; c.textBaseline = "middle";
  c.fillText(m.kickoff, tcx, cy - tbH*0.1);
  c.font = `600 14px 'Inter','Segoe UI',sans-serif`;
  c.fillText("WIB", tcx, cy + tbH*0.3);
  c.textBaseline = "alphabetic";

  // ══════════════════════════════
  // 2. TIM HOME — kiri tengah
  // Logo di kanan kolom (dekat liga), nama di kiri
  // ══════════════════════════════
  const hImg = getCached(teamBase(m.home));
  const hLogoCX = xLiga - LOGO_SZ/2 - 6;  // logo menempel di kiri logo liga
  const hNameMaxW = TEAM_W - LOGO_SZ - 10;
  const hNameCX   = xHome + hNameMaxW/2 + 4;

  if(hImg){
    c.save();
    c.shadowColor="rgba(0,0,0,0.4)"; c.shadowBlur=8;
    c.drawImage(hImg, hLogoCX - LOGO_SZ/2, cy - LOGO_SZ/2, LOGO_SZ, LOGO_SZ);
    c.restore();
  } else {
    rr(c, hLogoCX-LOGO_SZ/2, cy-LOGO_SZ/2, LOGO_SZ, LOGO_SZ, 8, "rgba(255,255,255,0.08)", "rgba(255,255,255,0.2)", 1);
    c.fillStyle="rgba(255,255,255,0.4)"; c.font="700 18px sans-serif";
    c.textAlign="center"; c.textBaseline="middle"; c.fillText("?", hLogoCX, cy); c.textBaseline="alphabetic";
  }

  c.fillStyle = t.teamText;
  c.font = `700 ${Math.min(24,Math.max(18,Math.floor(hNameMaxW/6)))}px 'Inter','Segoe UI',sans-serif`;
  c.textAlign = "center";
  const hLines = wrapTxt(c, m.home, hNameMaxW, 2);
  const hLH = Math.min(26, rowH/4);
  const hStartY = cy - (hLines.length * hLH)/2 + hLH*0.8;
  hLines.forEach((ln,i) => c.fillText(ln, hNameCX, hStartY + i*hLH));

  // ══════════════════════════════
  // 3. LOGO LIGA — tengah
  // Lingkaran logo + nama liga di bawah
  // ══════════════════════════════
  const lcx = xLiga + LIGA_W/2;
  // Nama liga di bawah logo — hitung posisi logo agar ada ruang teks
  const compName = (m.competition||"").toUpperCase();
  const hasComp  = compName.length > 0;
  const ligaLogoY = hasComp ? cy - 8 : cy;  // geser sedikit ke atas jika ada nama

  // Shadow + lingkaran background
  c.save();
  c.shadowColor = "rgba(0,0,0,0.5)"; c.shadowBlur = 12;
  c.beginPath(); c.arc(lcx, ligaLogoY, LIGA_SZ/2, 0, Math.PI*2);
  c.fillStyle = "rgba(255,255,255,0.18)"; c.fill();
  c.restore();
  c.beginPath(); c.arc(lcx, ligaLogoY, LIGA_SZ/2, 0, Math.PI*2);
  c.strokeStyle = "rgba(255,255,255,0.4)"; c.lineWidth = 2; c.stroke();

  const lImg = getCached(leagueBase(m.competition));
  if(lImg){
    c.save();
    c.beginPath(); c.arc(lcx, ligaLogoY, LIGA_SZ/2 - 2, 0, Math.PI*2); c.clip();
    c.drawImage(lImg, lcx-LIGA_SZ/2+2, ligaLogoY-LIGA_SZ/2+2, LIGA_SZ-4, LIGA_SZ-4);
    c.restore();
  } else {
    const abbr = compName.split(" ").map(w=>w[0]).join("").slice(0,3);
    c.fillStyle = "rgba(255,255,255,0.85)";
    c.font = `800 ${Math.max(13,Math.floor(LIGA_SZ*0.26))}px 'Bebas Neue',sans-serif`;
    c.textAlign = "center"; c.textBaseline = "middle";
    c.fillText(abbr, lcx, ligaLogoY); c.textBaseline = "alphabetic";
  }

  // Nama liga di bawah lingkaran
  if(hasComp){
    const compY = ligaLogoY + LIGA_SZ/2 + 4;
    const compMaxW = LIGA_W + 20;
    c.fillStyle = "rgba(255,255,255,0.65)";
    c.font = `600 ${Math.min(16,Math.max(12,Math.floor(LIGA_W/8)))}px 'Inter','Segoe UI',sans-serif`;
    c.textAlign = "center";
    const cLines = wrapTxt(c, compName, compMaxW, 2);
    cLines.forEach((ln,i) => c.fillText(ln, lcx, compY + 14 + i*15));
  }

  // ══════════════════════════════
  // 4. TIM AWAY — kanan tengah
  // Logo di kiri kolom (dekat liga), nama di kanan
  // ══════════════════════════════
  const aImg = getCached(teamBase(m.away));
  const aLogoCX = xAway + LOGO_SZ/2 + 6;  // logo menempel di kanan logo liga
  const aNameMaxW = TEAM_W - LOGO_SZ - 10;
  const aNameCX   = xAway + LOGO_SZ + 10 + aNameMaxW/2;

  if(aImg){
    c.save();
    c.shadowColor="rgba(0,0,0,0.4)"; c.shadowBlur=8;
    c.drawImage(aImg, aLogoCX - LOGO_SZ/2, cy - LOGO_SZ/2, LOGO_SZ, LOGO_SZ);
    c.restore();
  } else {
    rr(c, aLogoCX-LOGO_SZ/2, cy-LOGO_SZ/2, LOGO_SZ, LOGO_SZ, 8, "rgba(255,255,255,0.08)", "rgba(255,255,255,0.2)", 1);
    c.fillStyle="rgba(255,255,255,0.4)"; c.font="700 18px sans-serif";
    c.textAlign="center"; c.textBaseline="middle"; c.fillText("?", aLogoCX, cy); c.textBaseline="alphabetic";
  }

  c.fillStyle = t.teamText;
  c.font = `700 ${Math.min(24,Math.max(18,Math.floor(aNameMaxW/6)))}px 'Inter','Segoe UI',sans-serif`;
  c.textAlign = "center";
  const aLines = wrapTxt(c, m.away, aNameMaxW, 2);
  const aLH = Math.min(26, rowH/4);
  const aStartY = cy - (aLines.length * aLH)/2 + aLH*0.8;
  aLines.forEach((ln,i) => c.fillText(ln, aNameCX, aStartY + i*aLH));

  // ══════════════════════════════
  // 5. TV — kanan
  // ══════════════════════════════
  const tvcx  = xTV + TV_W/2;
  const boxH  = Math.min(rowH-12, 80);
  const boxY  = cy - boxH/2;
  const hasFree = tvInfo.tvFree.length > 0;

  if(hasFree){
    rr(c, xTV+6, boxY, TV_W-12, boxH, 12, "rgba(34,197,94,0.18)", "#22c55e", 1.5);
    // Badge GRATIS
    const bw=70, bh=20;
    rr(c, tvcx-bw/2, boxY+4, bw, bh, 10, "#22c55e", null);
    c.fillStyle="#fff"; c.font="800 12px 'Inter',sans-serif";
    c.textAlign="center"; c.textBaseline="middle";
    c.fillText("✓ GRATIS", tvcx, boxY+4+bh/2);
    c.textBaseline="alphabetic";
    // Nama TV lokal
    c.fillStyle="#4ade80"; c.font="700 15px 'Inter',sans-serif"; c.textAlign="center";
    wrapTxt(c, tvInfo.tvFree.join(" · "), TV_W-16, 2).forEach((ln,i)=>{
      c.fillText(ln, tvcx, boxY+30+i*17);
    });
    // TV berbayar kecil
    if(tvInfo.tvPaid.length){
      c.fillStyle="#fbbf24"; c.font="600 13px 'Inter',sans-serif";
      wrapTxt(c, tvInfo.tvPaid.join(" · "), TV_W-14, 2).forEach((ln,i)=>{
        c.fillText(ln, tvcx, boxY+boxH-20+i*15);
      });
    }
  } else {
    rr(c, xTV+6, boxY, TV_W-12, boxH, 12, t.tvBg, null);
    c.fillStyle="#fbbf24"; c.font="700 16px 'Inter',sans-serif";
    c.textAlign="center"; c.textBaseline="middle";
    const tvLines = wrapTxt(c, tvInfo.tv||"-", TV_W-16, 3);
    tvLines.forEach((ln,i)=>c.fillText(ln, tvcx, boxY+boxH/2 - ((tvLines.length-1)*18)/2 + i*18));
    c.textBaseline="alphabetic";
  }
}

function drawFooter(c,t,brand){

  c.strokeStyle=fl;c.lineWidth=1;

// ═══════════════════════════════════════════
// VIDEO SLIDE — 1 pertandingan full screen
// ═══════════════════════════════════════════
// VIDEO — BUILD-UP REVEAL
// Pertandingan muncul 1 per 1 dari atas ke bawah.
// Yang sudah muncul TETAP di layar.
// ═══════════════════════════════════════════

// Render frame video build-up.
// visibleCount = berapa baris yang sudah fully visible
// animIdx      = indeks baris yang sedang animasi masuk (visibleCount)
// animProg     = 0..1 progress animasi baris animIdx
async function renderBuildUp(c, t, brand, visibleCount, animIdx, animProg) {
  c.clearRect(0,0,W,H);
  drawBg(c,t);

  // ── HEADER ──
  await drawHeader(c, t, brand, 1, 1);

  // Tanggal sudah ada di header — tidak perlu drawDateRow
  let curY = HEADER_H + 16;
  const anim = $("#sel-anim").value;
  const rowW = W - PAD_X*2;
  const rowH = rowHeightForCount(allMatches.length);

  for (let i = 0; i < visibleCount; i++) {
    await drawMatchRow(c, t, allMatches[i], PAD_X, curY, rowW, rowH);
    curY += rowH + ROW_GAP;
  }

  if (animIdx < allMatches.length && animProg > 0) {
    const p = easeOut(animProg);
    c.save();

    if (anim === "slide") {
      c.translate((1-p) * W, 0);
    } else if (anim === "fade") {
      c.globalAlpha = p;
    } else if (anim === "wipe") {
      c.beginPath();
      c.rect(PAD_X, curY, rowW * p, rowH);
      c.clip();
    } else if (anim === "drop") {
      c.translate(0, -(1-p) * (rowH + 40));
      c.globalAlpha = Math.min(1, p * 1.5);
    }

    await drawMatchRow(c, t, allMatches[animIdx], PAD_X, curY, rowW, rowH);
    c.restore();
  }

  drawFooter(c, t, brand);
}

// ═══════════════════════════════════════════
// PREVIEW — VIDEO (live build-up loop)
// ═══════════════════════════════════════════
const ANIM_DUR = 0.4; // detik animasi masuk per baris

async function startVideoPreview() {
  if (vidAF) cancelAnimationFrame(vidAF);
  stopPreviewBgm();
  vidPlaying = true;
  vidFrameStart = null;
  vidBrand = await loadBrand();
  await startPreviewBgm($("#sel-bgm").value, parseInt($("#sel-bgm-volume").value) || 35);
  const t = getT();
  const holdDur = parseInt($("#sel-dur").value) || 3; // detik tiap baris ditahan
  const n = allMatches.length;
  if (!n) return;

  // Total durasi: setiap baris = ANIM_DUR + holdDur, lalu hold akhir 2 detik, lalu loop
  const totalDur = n * (ANIM_DUR + holdDur) + 2.0;
  let lastSoundIdx = -1;

  function frame(ts) {
    if (!vidPlaying) return;
    if (!vidFrameStart) vidFrameStart = ts;
    const elapsed = ((ts - vidFrameStart) / 1000) % totalDur;

    // Hitung state: berapa baris visible, baris mana animasi, progress
    let t2 = elapsed;
    let visibleCount = 0;
    let animIdx = 0;
    let animProg = 0;

    for (let i = 0; i < n; i++) {
      const slotDur = ANIM_DUR + holdDur;
      if (t2 <= 0) break;
      if (t2 < ANIM_DUR) {
        animIdx = i;
        animProg = t2 / ANIM_DUR;
        break;
      }
      t2 -= ANIM_DUR;
      if (t2 < holdDur) {
        visibleCount = i + 1;
        animIdx = i + 1;
        animProg = 0;
        break;
      }
      t2 -= holdDur;
      visibleCount = i + 1;
      animIdx = i + 1;
      animProg = 0;
    }

    if (visibleCount >= n) { visibleCount = n; animIdx = n; animProg = 0; }

    // Play sound saat baris baru mulai animasi masuk
    if (animIdx !== lastSoundIdx && animProg < 0.08 && animIdx < n) {
      lastSoundIdx = animIdx;
      const sType = $("#sel-sound").value;
      const sVol  = parseInt($("#sel-volume").value) || 70;
      playPreviewSound(sType, sVol);
    }
    // Reset lastSoundIdx saat loop ulang
    if (elapsed < 0.1) lastSoundIdx = -1;

    vidSlideIdx = Math.max(0, visibleCount - 1);

    renderBuildUp(ctx, t, vidBrand, visibleCount, animIdx, animProg).then(() => {
      vidAF = requestAnimationFrame(frame);
    });
  }
  vidAF = requestAnimationFrame(frame);
}

function stopVideoPreview(){
  vidPlaying=false;
  stopPreviewBgm();
  if(vidAF){cancelAnimationFrame(vidAF);vidAF=null;}
}

function importHtmlFile(file){
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const doc=new DOMParser().parseFromString(e.target.result,"text/html");
      const rows=doc.querySelectorAll("table tr");
      if(!rows.length)throw new Error("Tabel tidak ditemukan");
      let count=0;
      if(!allSchedules[selectedDate])allSchedules[selectedDate]=[];
      rows.forEach(tr=>{
        const cells=[...tr.querySelectorAll("td")].map(td=>td.textContent.trim());
        if(cells.length<4)return;
        const[kickoff,matchup,competition,tv]=cells;
        if(/kick-off/i.test(kickoff)||!/vs/i.test(matchup))return;
        const parts=matchup.split(/\s+vs\s+/i);
        const tvData=classifyTv(tv);
        allSchedules[selectedDate].push({
          kickoff,matchup,
          home:(parts[0]||"").trim(),
          away:(parts[1]||"").trim(),
          competition,
          tv:tvData.tv,
          tvFree:tvData.tvFree,
          tvPaid:tvData.tvPaid,
        });
        count++;
      });
      setStatus(`✓ Import ${count} pertandingan`,"ok");
      await applyDate(selectedDate);
    }catch(err){setStatus(`Gagal import: ${err.message}`,"err");}
  };
  reader.readAsText(file,"UTF-8");
}

// ═══════════════════════════════════════════
// AUDIO ENGINE — Web Audio API
// Generate sound efek tanpa file eksternal
// ═══════════════════════════════════════════

let _audioCtx = null;
function getAudioCtx(){
  if(!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return _audioCtx;
}

// Render sound ke AudioBuffer (offline, untuk mixing ke video)
async function renderSoundBuffer(type, volume=0.7, sampleRate=44100){
  const dur = 0.6; // detik
  const frames = Math.ceil(sampleRate * dur);
  const offCtx = new OfflineAudioContext(2, frames, sampleRate);
  const vol = volume / 100;

  if(type === "whoosh"){
    // Whoosh: noise + highpass sweep
    const buf = offCtx.createBuffer(1, frames, sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<frames;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/frames,1.5);
    const src = offCtx.createBufferSource(); src.buffer = buf;
    const hp = offCtx.createBiquadFilter(); hp.type="highpass";
    hp.frequency.setValueAtTime(200, 0);
    hp.frequency.linearRampToValueAtTime(3000, 0.25);
    const gain = offCtx.createGain(); gain.gain.setValueAtTime(vol*1.2,0); gain.gain.linearRampToValueAtTime(0,dur);
    src.connect(hp); hp.connect(gain); gain.connect(offCtx.destination);
    src.start(0);

  } else if(type === "drumhit"){
    // Kick drum: sine sweep down + noise transient
    const osc = offCtx.createOscillator(); osc.type="sine";
    osc.frequency.setValueAtTime(180,0); osc.frequency.exponentialRampToValueAtTime(40,0.15);
    const g1 = offCtx.createGain(); g1.gain.setValueAtTime(vol*1.5,0); g1.gain.exponentialRampToValueAtTime(0.001,0.35);
    osc.connect(g1); g1.connect(offCtx.destination); osc.start(0); osc.stop(0.35);
    // Snare transient
    const nbuf = offCtx.createBuffer(1,Math.ceil(sampleRate*0.08),sampleRate);
    const nd = nbuf.getChannelData(0);
    for(let i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1);
    const nsrc = offCtx.createBufferSource(); nsrc.buffer=nbuf;
    const nhp = offCtx.createBiquadFilter(); nhp.type="bandpass"; nhp.frequency.value=2000; nhp.Q.value=0.8;
    const ng = offCtx.createGain(); ng.gain.setValueAtTime(vol*0.6,0); ng.gain.exponentialRampToValueAtTime(0.001,0.08);
    nsrc.connect(nhp); nhp.connect(ng); ng.connect(offCtx.destination); nsrc.start(0);

  } else if(type === "whistle"){
    // Peluit: sine wave pitch up-down
    const osc = offCtx.createOscillator(); osc.type="sine";
    osc.frequency.setValueAtTime(1800,0);
    osc.frequency.linearRampToValueAtTime(2400,0.1);
    osc.frequency.linearRampToValueAtTime(2000,0.3);
    osc.frequency.linearRampToValueAtTime(1600,0.5);
    const g = offCtx.createGain(); g.gain.setValueAtTime(0,0); g.gain.linearRampToValueAtTime(vol*0.8,0.02);
    g.gain.setValueAtTime(vol*0.8,0.4); g.gain.linearRampToValueAtTime(0,0.55);
    // Vibrato
    const vib = offCtx.createOscillator(); vib.frequency.value=8;
    const vibG = offCtx.createGain(); vibG.gain.value=30;
    vib.connect(vibG); vibG.connect(osc.frequency);
    osc.connect(g); g.connect(offCtx.destination);
    osc.start(0); osc.stop(0.55); vib.start(0); vib.stop(0.55);

  } else if(type === "swoosh_tick"){
    // Swoosh singkat
    const nbuf = offCtx.createBuffer(1,Math.ceil(sampleRate*0.25),sampleRate);
    const nd = nbuf.getChannelData(0);
    for(let i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1)*Math.pow(1-i/nd.length,2);
    const nsrc = offCtx.createBufferSource(); nsrc.buffer=nbuf;
    const hp = offCtx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=800;
    const ng = offCtx.createGain(); ng.gain.setValueAtTime(vol*0.9,0); ng.gain.linearRampToValueAtTime(0,0.25);
    nsrc.connect(hp); hp.connect(ng); ng.connect(offCtx.destination); nsrc.start(0);
    // Tick klik
    const osc2 = offCtx.createOscillator(); osc2.type="square"; osc2.frequency.value=1200;
    const g2 = offCtx.createGain(); g2.gain.setValueAtTime(vol*0.5,0.22); g2.gain.exponentialRampToValueAtTime(0.001,0.28);
    osc2.connect(g2); g2.connect(offCtx.destination); osc2.start(0.22); osc2.stop(0.28);

  } else if(type === "stadium"){
    // Stadium crowd: filtered noise burst
    const nbuf = offCtx.createBuffer(2, frames, sampleRate);
    for(let ch=0;ch<2;ch++){
      const d=nbuf.getChannelData(ch);
      for(let i=0;i<frames;i++) d[i]=(Math.random()*2-1);
    }
    const nsrc = offCtx.createBufferSource(); nsrc.buffer=nbuf;
    const lp = offCtx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=800;
    const bp = offCtx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=400; bp.Q.value=0.5;
    const g = offCtx.createGain();
    g.gain.setValueAtTime(0,0); g.gain.linearRampToValueAtTime(vol*0.6,0.1);
    g.gain.setValueAtTime(vol*0.6,0.3); g.gain.linearRampToValueAtTime(0,dur);
    nsrc.connect(lp); lp.connect(bp); bp.connect(g); g.connect(offCtx.destination); nsrc.start(0);

  } else {
    return null; // none
  }

  const rendered = await offCtx.startRendering();
  return rendered;
}

// Play sound di preview (real-time)
async function playPreviewSound(type, volume){
  if(type==="none") return;
  try{
    const actx = getAudioCtx();
    if(actx.state==="suspended") await actx.resume();
    const buf = await renderSoundBuffer(type, volume, actx.sampleRate);
    if(!buf) return;
    const src = actx.createBufferSource();
    src.buffer = buf;
    src.connect(actx.destination);
    src.start();
  } catch(e){ console.warn("Audio preview error:", e); }
}

async function renderBgmLoopBuffer(type, volume=35, sampleRate=44100){
  if(type==="none") return null;
  const dur=8.0;
  const frames=Math.ceil(sampleRate*dur);
  const offCtx=new OfflineAudioContext(2,frames,sampleRate);
  const vol=Math.max(0,Math.min(1,volume/100));

  const mix=offCtx.createGain();
  const comp=offCtx.createDynamicsCompressor();
  comp.threshold.value=-18;
  comp.knee.value=18;
  comp.ratio.value=3;
  comp.attack.value=0.01;
  comp.release.value=0.2;
  mix.gain.value=1.0;
  mix.connect(comp);
  comp.connect(offCtx.destination);

  const delay=offCtx.createDelay(0.45);
  delay.delayTime.value=0.22;
  const dGain=offCtx.createGain();
  dGain.gain.value=0.24;
  delay.connect(dGain);
  dGain.connect(delay);
  dGain.connect(mix);

  function addNote(freq,start,len,gainMul=1,wave="sine",useDelay=true){
    const osc=offCtx.createOscillator();
    const vcf=offCtx.createBiquadFilter();
    const g=offCtx.createGain();
    osc.type=wave;
    osc.frequency.value=freq;
    vcf.type="lowpass";
    vcf.frequency.value=Math.min(3600,freq*12);
    g.gain.setValueAtTime(0.0001,start);
    g.gain.linearRampToValueAtTime(vol*gainMul,start+Math.min(0.05,len*0.35));
    g.gain.exponentialRampToValueAtTime(0.0001,start+len);
    osc.connect(vcf); vcf.connect(g); g.connect(mix);
    if(useDelay) g.connect(delay);
    osc.start(start); osc.stop(start+len+0.02);
  }

  function addKick(start){
    const o=offCtx.createOscillator();
    const g=offCtx.createGain();
    o.type="sine";
    o.frequency.setValueAtTime(160,start);
    o.frequency.exponentialRampToValueAtTime(44,start+0.13);
    g.gain.setValueAtTime(vol*0.24,start);
    g.gain.exponentialRampToValueAtTime(0.0001,start+0.18);
    o.connect(g); g.connect(mix);
    o.start(start); o.stop(start+0.2);
  }

  function addHat(start,len=0.06){
    const nbuf=offCtx.createBuffer(1,Math.ceil(sampleRate*len),sampleRate);
    const nd=nbuf.getChannelData(0);
    for(let i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1)*(1-i/nd.length);
    const src=offCtx.createBufferSource(); src.buffer=nbuf;
    const hp=offCtx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=5200;
    const g=offCtx.createGain();
    g.gain.setValueAtTime(vol*0.08,start);
    g.gain.exponentialRampToValueAtTime(0.0001,start+len);
    src.connect(hp); hp.connect(g); g.connect(mix);
    src.start(start);
  }

  function addSnare(start){
    const len=0.14;
    const nbuf=offCtx.createBuffer(1,Math.ceil(sampleRate*len),sampleRate);
    const nd=nbuf.getChannelData(0);
    for(let i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1);
    const src=offCtx.createBufferSource(); src.buffer=nbuf;
    const bp=offCtx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=1800; bp.Q.value=0.9;
    const g=offCtx.createGain();
    g.gain.setValueAtTime(vol*0.12,start);
    g.gain.exponentialRampToValueAtTime(0.0001,start+len);
    src.connect(bp); bp.connect(g); g.connect(mix);
    src.start(start);
  }

  if(type==="anthem"){
    const chords=[[220,277,330],[196,247,294],[247,311,370],[220,277,330]];
    for(let bar=0;bar<4;bar++){
      const t0=bar*2.0;
      addKick(t0); addKick(t0+1.0);
      addSnare(t0+0.5); addSnare(t0+1.5);
      for(let k=0;k<8;k++) addHat(t0+k*0.25,0.045);
      for(const f of chords[bar]) addNote(f,t0,1.85,0.09,"triangle");
      addNote(chords[bar][0]/2,t0,0.95,0.1,"sine",false);
      addNote(chords[bar][0]/2,t0+1.0,0.95,0.1,"sine",false);
      const arp=[chords[bar][0],chords[bar][1],chords[bar][2],chords[bar][1]];
      for(let i=0;i<8;i++) addNote(arp[i%4]*2,t0+i*0.25,0.18,0.038,"sawtooth");
    }
  }else if(type==="trap"){
    const bass=[55,55,62,49,55,55,73,62];
    for(let i=0;i<32;i++){
      const t0=i*0.25;
      if(i%4===0) addKick(t0);
      if(i%8===4) addKick(t0+0.06);
      if(i%4===2) addSnare(t0);
      addHat(t0+0.125,(i%2===0)?0.03:0.05);
      if(i%2===0){
        const b=bass[Math.floor(i/4)%bass.length];
        addNote(b,t0,0.22,0.16,"sine",false);
        addNote(b*2,t0+0.02,0.12,0.03,"square");
      }
      if(i%2===1){
        const top=[220,247,262,294][Math.floor(i/4)%4];
        addNote(top,t0,0.11,0.03,"square");
      }
    }
  }else if(type==="ambient"){
    const pads=[[196,247,294],[174,220,262],[185,233,277],[165,208,247]];
    for(let bar=0;bar<4;bar++){
      const t0=bar*2.0;
      for(const f of pads[bar]){
        addNote(f,t0,1.95,0.06,"sine");
        addNote(f*2,t0+0.06,1.8,0.024,"triangle");
      }
      addNote(pads[bar][0]/2,t0,1.95,0.07,"sine",false);
      for(let i=0;i<4;i++) addHat(t0+i*0.5+0.18,0.08);
    }
  }

  return offCtx.startRendering();
}

async function startPreviewBgm(type,volume){
  stopPreviewBgm();
  if(type==="none") return;
  try{
    const actx=getAudioCtx();
    if(actx.state==="suspended") await actx.resume();
    const buf=await renderBgmLoopBuffer(type,volume,actx.sampleRate);
    if(!buf) return;
    const src=actx.createBufferSource();
    src.buffer=buf; src.loop=true;
    const gain=actx.createGain(); gain.gain.value=1;
    src.connect(gain); gain.connect(actx.destination);
    src.start();
    previewBgmNode={src,gain};
  }catch(e){console.warn("BGM preview error:",e);}
}

function stopPreviewBgm(){
  if(!previewBgmNode) return;
  try{previewBgmNode.src.stop();}catch(e){}
  previewBgmNode=null;
}

// Mix AudioBuffer ke canvas stream (untuk video export)
// Returns: { audioStream, stopAudio }
async function createAudioStream(type, volume, sampleRate=44100, bgmType="none", bgmVolume=35){
  if(type==="none"&&bgmType==="none") return null;
  try{
    const actx = new AudioContext({sampleRate});
    const dest = actx.createMediaStreamDestination();
    const sfxBus=actx.createGain();
    const bgmBus=actx.createGain();
    sfxBus.connect(dest);
    bgmBus.connect(dest);
    let buf=null;
    if(type!=="none") buf=await renderSoundBuffer(type, volume, sampleRate);

    let bgmSrc=null;
    if(bgmType!=="none"){
      const bgmBuf=await renderBgmLoopBuffer(bgmType,bgmVolume,sampleRate);
      if(bgmBuf){
        bgmSrc=actx.createBufferSource();
        bgmSrc.buffer=bgmBuf;
        bgmSrc.loop=true;
        bgmSrc.connect(bgmBus);
        bgmSrc.start(0);
      }
    }
    if(actx.state==="suspended") await actx.resume();
    return { actx, dest, sfxBus, bgmSrc, buf, stream: dest.stream };
  } catch(e){ console.warn("Audio stream error:", e); return null; }
}

// Putar 1x sound di AudioContext yang sudah ada
function playSoundOnce(actx, buf, bus, when=0){
  if(!buf||!actx||!bus) return;
  try{
    const src = actx.createBufferSource();
    src.buffer = buf;
    src.connect(bus);
    src.start(when);
  } catch(e){}
}

async function fixWebmBlobDuration(blob, durationMs){
  if(!blob || !/webm/i.test(blob.type||"")) return blob;
  if(typeof window.ysFixWebmDuration!=="function") return blob;
  try{
    return await new Promise(resolve=>{
      window.ysFixWebmDuration(blob, durationMs, fixedBlob=>{
        resolve(fixedBlob||blob);
      });
    });
  }catch(e){
    console.warn("Fix WebM duration gagal:", e);
    return blob;
  }
}

let _ffmpeg=null;
let _ffmpegFetchFile=null;
async function ensureFFmpegReady(){
  if(_ffmpeg) return _ffmpeg;
  if(!window.FFmpeg || typeof window.FFmpeg.createFFmpeg!=="function"){
    throw new Error("FFmpeg belum termuat. Refresh halaman lalu coba lagi.");
  }
  const { createFFmpeg, fetchFile } = window.FFmpeg;
  _ffmpegFetchFile=fetchFile;
  _ffmpeg=createFFmpeg({
    log:false,
    corePath:"https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js"
  });
  await _ffmpeg.load();
  return _ffmpeg;
}

async function transcodeWebmToTikTokMp4(webmBlob){
  const ffmpeg=await ensureFFmpegReady();
  const inName="input.webm";
  const outName="output.mp4";
  ffmpeg.FS("writeFile",inName,await _ffmpegFetchFile(webmBlob));
  try{
    await ffmpeg.run(
      "-i", inName,
      "-c:v", "libx264",
      "-pix_fmt", "yuv420p",
      "-profile:v", "baseline",
      "-level", "3.1",
      "-preset", "veryfast",
      "-movflags", "+faststart",
      "-c:a", "aac",
      "-b:a", "128k",
      "-ar", "44100",
      "-ac", "2",
      outName
    );
  }catch(err){
    // Fallback jika AAC gagal: hasil tanpa audio masih lebih baik daripada gagal total
    await ffmpeg.run(
      "-i", inName,
      "-c:v", "libx264",
      "-pix_fmt", "yuv420p",
      "-profile:v", "baseline",
      "-level", "3.1",
      "-preset", "veryfast",
      "-movflags", "+faststart",
      "-an",
      outName
    );
  }
  const data=ffmpeg.FS("readFile",outName);
  try{ffmpeg.FS("unlink",inName);}catch(e){}
  try{ffmpeg.FS("unlink",outName);}catch(e){}
  return new Blob([data.buffer],{type:"video/mp4"});
}

// ═══════════════════════════════════════════
// DOWNLOAD VIDEO — build-up reveal
// ═══════════════════════════════════════════
async function downloadVideo(){
  if(!allMatches.length)return;
  if(!window.MediaRecorder){setStatus("Browser tidak support MediaRecorder. Gunakan Chrome/Edge.","err");return;}

  // Pilih mime type terbaik yang tersedia
  const fmtPref = $("#sel-fmt").value;
  let mimes;
  if(fmtPref==="mp4try"){
    // TikTok paling aman di H.264/AAC; jangan fallback otomatis ke WebM agar jelas hasilnya
    mimes=[
      "video/mp4;codecs=avc1.42E01E,mp4a.40.2",
      "video/mp4;codecs=avc1.4D401E,mp4a.40.2",
      "video/mp4"
    ];
  } else if(fmtPref==="tiktoksafe"){
    // Rekam dulu sebagai WebM VP8 lalu transcode ke MP4 via ffmpeg.wasm
    mimes=[
      "video/webm;codecs=vp8,opus",
      "video/webm;codecs=vp8",
      "video/webm"
    ];
  } else {
    // Prioritaskan VP8 dibanding VP9 untuk kompatibilitas decode lebih luas
    mimes=[
      "video/webm;codecs=vp8,opus",
      "video/webm;codecs=vp8",
      "video/webm"
    ];
  }
  const mime = mimes.find(m=>MediaRecorder.isTypeSupported(m));
  if(!mime){
    if(fmtPref==="mp4try"){
      setStatus("MP4 native tidak didukung browser ini. Pilih WebM VP8 atau pakai Chrome/Edge terbaru.","err");
    }else if(fmtPref==="tiktoksafe"){
      setStatus("Codec WebM untuk mode TikTok Safe tidak didukung browser ini.","err");
    }else{
      setStatus("Codec WebM tidak didukung browser ini.","err");
    }
    return;
  }

  stopVideoPreview();
  btnDlVideo.disabled=true; btnDlPng.disabled=true;
  vprog.classList.add("show");
  setStatus("Merender video build-up...","loading");

  try{
    const t=getT(), brand=await loadBrand();
    // Gunakan FPS rendah agar MediaRecorder punya waktu cukup capture tiap frame
    // FPS=15 → interval 67ms per frame, cukup untuk browser
    const FPS=15;
    const MS_PER_FRAME = Math.ceil(1000/FPS); // ~67ms
    const holdDur=parseInt($("#sel-dur").value)||3;
    const animFrames=Math.round(ANIM_DUR*FPS);
    const holdFrames=Math.round(holdDur*FPS);
    const holdEndFrames=Math.round(2.5*FPS);
    const n=allMatches.length;
    const totalFrames = n*(animFrames+holdFrames) + holdEndFrames;

    const vc=document.createElement("canvas"); vc.width=W; vc.height=H;
    const vctx=vc.getContext("2d");

    // ── AUDIO SETUP ──
    const soundType = $("#sel-sound").value;
    const soundVol  = parseInt($("#sel-volume").value)||70;
    const bgmType = $("#sel-bgm").value;
    const bgmVol = parseInt($("#sel-bgm-volume").value)||35;
    const audioInfo = await createAudioStream(soundType, soundVol, 44100, bgmType, bgmVol);

    // Gabungkan stream video + audio
    const videoStream = vc.captureStream(FPS);
    let combinedStream = videoStream;
    if(audioInfo){
      const allTracks = [
        ...videoStream.getVideoTracks(),
        ...audioInfo.stream.getAudioTracks()
      ];
      combinedStream = new MediaStream(allTracks);
    }

    const rec=new MediaRecorder(combinedStream,{
      mimeType:mime,
      videoBitsPerSecond:4_500_000,
      audioBitsPerSecond:128_000
    });
    const chunks=[];
    rec.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks.push(e.data);};
    const recDone = new Promise((resolve,reject)=>{
      rec.onstop=resolve;
      rec.onerror=e=>reject(e?.error||new Error("MediaRecorder gagal"));
    });
    // Pakai timeslice agar chunk keluar periodik (menghindari file 00:00 pada beberapa browser)
    rec.start(250);

    // Helper: render 1 frame lalu tunggu interval agar recorder sempat capture
    async function renderFrame(visCount, animIdx, animProg){
      await renderBuildUp(vctx, t, brand, visCount, animIdx, animProg);
      await new Promise(r=>setTimeout(r, MS_PER_FRAME));
    }

    let frame=0;

    for(let i=0; i<n; i++){
      // Animasi masuk baris ke-i — putar sound di awal animasi
      if(audioInfo && i < n && audioInfo.buf){
        const when = audioInfo.actx.currentTime;
        playSoundOnce(audioInfo.actx, audioInfo.buf, audioInfo.sfxBus, when);
      }
      for(let f=0; f<animFrames; f++){
        await renderFrame(i, i, f/animFrames);
        frame++;
        if(frame%3===0){
          const pct=Math.round(frame/totalFrames*100);
          vpbar.style.width=pct+"%";
          vplbl.textContent=`Baris ${i+1}/${n} masuk · ${pct}%`;
          setStatus(`Merender... ${pct}%`,"loading");
        }
      }
      // Hold — baris ke-i fully visible
      for(let f=0; f<holdFrames; f++){
        await renderFrame(i+1, i+1, 0);
        frame++;
        if(frame%3===0){
          const pct=Math.round(frame/totalFrames*100);
          vpbar.style.width=pct+"%";
          vplbl.textContent=`Baris ${i+1}/${n} · ${pct}%`;
        }
      }
    }

    // Hold akhir semua baris
    for(let f=0; f<holdEndFrames; f++){
      await renderFrame(n, n, 0);
      frame++;
    }

    // Flush data terakhir sebelum stop
    if(rec.state==="recording") rec.requestData();
    await new Promise(r=>setTimeout(r,220));
    rec.stop();
    await recDone;
    if(audioInfo){
      try{if(audioInfo.bgmSrc)audioInfo.bgmSrc.stop();}catch(e){}
      audioInfo.actx.close();
    }

    const blobRaw=new Blob(chunks,{type:mime});
    let blob=blobRaw;
    const expectedMs=Math.round((n*(ANIM_DUR+holdDur)+2.5)*1000);
    if(/webm/i.test(mime)){
      setStatus("Memperbaiki metadata durasi video...","loading");
      blob = await fixWebmBlobDuration(blobRaw, expectedMs);
    }
    if(fmtPref==="tiktoksafe"){
      setStatus("Transcode ke MP4 TikTok-safe... (butuh waktu lebih lama)","loading");
      blob = await transcodeWebmToTikTokMp4(blob);
    }
    if(!blob.size){
      throw new Error("Recorder tidak menghasilkan data video (blob kosong). Coba ulangi render.");
    }
    const ext=(fmtPref==="tiktoksafe"||mime.startsWith("video/mp4"))?"mp4":"webm";
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.download=`jadwal-buildup-${currentTheme}-${selectedDate}.${ext}`;
    a.href=url; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),8000);

    const durSec=((n*(ANIM_DUR+holdDur)+2.5)).toFixed(1);
    const soundLabel = soundType!=="none" ? ` · 🔊 ${soundType}` : "";
    const bgmLabel = bgmType!=="none" ? ` · 🎵 ${bgmType}` : "";
    setStatus(`✓ Video ${ext.toUpperCase()} · ${n} pertandingan · ~${durSec}s${soundLabel}${bgmLabel} didownload`,"ok");
  }catch(e){
    setStatus(`Gagal render video: ${e.message}`,"err"); console.error(e);
  }finally{
    btnDlVideo.disabled=false; btnDlPng.disabled=!allMatches.length;
    vprog.classList.remove("show"); vpbar.style.width="0%";
    if(previewMode==="video") startVideoPreview();
  }
}

// THEME PICKER

function buildThemePicker(){
  const grid=$("#theme-grid");
  grid.innerHTML=Object.entries(THEMES).map(([id,t])=>`
    <div class="tcard${id===currentTheme?" on":""}" data-id="${id}">
      <div class="tswatch" style="background:${t.swatch}"></div>
      <div class="tname">${t.name}</div>
    </div>`).join("");
  grid.querySelectorAll(".tcard").forEach(card=>{
    card.addEventListener("click",()=>{
      currentTheme=card.dataset.id;
      grid.querySelectorAll(".tcard").forEach(x=>x.classList.toggle("on",x.dataset.id===currentTheme));
      saveSettings();
      if(previewMode==="png")showPNGPreview();else startVideoPreview();
    });
  });
}

// SETTINGS
// ═══════════════════════════════════════════
const SK="ck-v4";
function saveSettings(){
  localStorage.setItem(SK,JSON.stringify({
    header:inpHeader.value,
    tiktok:inpTiktok.value,
    footer:inpFooter.value,
    theme:currentTheme,
    date:selectedDate,
    videoPreset:$("#sel-preset").value,
    videoDur:$("#sel-dur").value,
    videoAnim:$("#sel-anim").value,
    videoSound:$("#sel-sound").value,
    videoVolume:$("#sel-volume").value,
    videoBgm:$("#sel-bgm").value,
    videoBgmVolume:$("#sel-bgm-volume").value,
  }));
}
function loadSettings(){
  try{
    const s=JSON.parse(localStorage.getItem(SK)||"{}");
    if(s.header)inpHeader.value=s.header;if(s.tiktok)inpTiktok.value=s.tiktok;
    if(s.footer)inpFooter.value=s.footer;if(s.theme&&THEMES[s.theme])currentTheme=s.theme;
    if(s.date&&/^\d{4}-\d{2}-\d{2}$/.test(s.date))selectedDate=s.date;
    if(s.videoDur) $("#sel-dur").value=s.videoDur;
    if(s.videoAnim) $("#sel-anim").value=s.videoAnim;
    if(s.videoSound) $("#sel-sound").value=s.videoSound;
    if(s.videoVolume) $("#sel-volume").value=s.videoVolume;
    if(s.videoBgm) $("#sel-bgm").value=s.videoBgm;
    if(s.videoBgmVolume) $("#sel-bgm-volume").value=s.videoBgmVolume;
    if(s.videoPreset&&($("#sel-preset").querySelector(`option[value="${s.videoPreset}"]`))){
      $("#sel-preset").value=s.videoPreset;
      if(s.videoPreset!=="custom") applyVideoPreset(s.videoPreset);
    }
  }catch{}
}
