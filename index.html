<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Jadwal Bola — Generator PNG TikTok</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --app-bg: #05080f;
      --sidebar-bg: #0b0f1a;
      --card-bg: #111828;
      --border: #1e2942;
      --accent: #22c55e;
      --accent-glow: rgba(34,197,94,0.4);
      --text: #f1f5f9;
      --sub: #64748b;
      --radius: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: "Barlow", "Segoe UI", system-ui, sans-serif;
      background: var(--app-bg);
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }

    /* ── DESKTOP LAYOUT ───────────────────────────────── */
    .app-layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 0;
      min-height: 100vh;
    }

    /* ── SIDEBAR ──────────────────────────────────────── */
    .sidebar {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 20px 18px calc(20px + var(--safe-bottom));
      overflow-y: auto;
      height: 100vh;
      position: sticky;
      top: 0;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .sidebar-header .icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(34,197,94,0.35);
    }
    .sidebar-header h1 {
      font-family: "Oswald", sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.03em;
      line-height: 1.2;
    }
    .sidebar-header p {
      font-size: 0.7rem;
      color: var(--sub);
      margin-top: 1px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    .section-label {
      font-size: 0.65rem;
      font-weight: 800;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    /* Branding inputs */
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 10px;
    }
    .field label {
      font-size: 0.67rem;
      font-weight: 700;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .field input {
      background: var(--app-bg);
      border: 1.5px solid var(--border);
      color: #fff;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-family: "Barlow", sans-serif;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); }

    /* Theme grid */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-bottom: 14px;
    }
    .theme-card {
      cursor: pointer;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 8px 6px;
      background: var(--app-bg);
      transition: border-color 0.2s, transform 0.15s;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .theme-card:active { transform: scale(0.96); }
    .theme-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(34,197,94,0.3); }
    .theme-card input { display: none; }
    .theme-swatch {
      height: 22px;
      border-radius: 5px;
      margin-bottom: 5px;
    }
    .theme-card span {
      font-size: 0.62rem;
      font-weight: 700;
      color: #cbd5e1;
      line-height: 1.2;
    }

    /* Date controls */
    .date-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }
    input[type="date"] {
      background: var(--app-bg);
      color: #fff;
      border: 1.5px solid var(--border);
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-family: "Barlow", sans-serif;
      outline: none;
      color-scheme: dark;
      -webkit-appearance: none;
    }
    input[type="date"]:focus { border-color: var(--accent); }
    input[type="file"] { display: none; }

    /* Buttons */
    .btn {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 0.82rem;
      font-family: "Barlow", sans-serif;
      font-weight: 700;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .btn-today { background: #1e293b; color: #e2e8f0; }
    .btn-refresh { background: #2563eb; color: #fff; }
    .btn-import { background: #374151; color: #fff; display: block; text-align: center; margin-top: 8px; padding: 9px; font-size: 0.8rem; }
    .btn-download {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(34,197,94,0.35);
    }

    .status {
      margin-top: 10px;
      font-size: 0.78rem;
      color: #eab308;
      font-weight: 600;
      line-height: 1.4;
      min-height: 20px;
    }
    .status.success { color: #22c55e; }
    .status.error { color: #f87171; }

    /* ── PREVIEW PANEL ────────────────────────────────── */
    .preview-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px;
      background: #08090f;
      overflow-y: auto;
    }

    .preview-label {
      font-size: 0.65rem;
      font-weight: 800;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 12px;
      align-self: flex-start;
    }

    #export-area {
      width: 100%;
      max-width: 380px;
      aspect-ratio: 9 / 16;
      background-color: var(--t-bg, #070a13);
      background-image: var(--t-preview-bg, none);
      background-size: cover;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7), 0 0 40px var(--t-glow, transparent);
      border: 2px solid var(--t-border, #1e2942);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #export-area::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--t-deco-overlay, none);
      background-size: var(--t-deco-size, auto);
      pointer-events: none;
      z-index: 0;
    }

    .bg-watermark {
      position: absolute;
      inset: -20%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      justify-content: center;
      gap: 24px 32px;
      transform: rotate(-24deg);
    }
    .bg-watermark span {
      font-size: clamp(0.7rem, 2.8vw, 1rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--t-wm-fg, rgba(255,255,255,0.045));
      white-space: nowrap;
      user-select: none;
    }

    #export-area .banner,
    #export-area .match-container,
    #export-area .watermark-footer {
      position: relative;
      z-index: 1;
    }

    .banner {
      padding: 12px 14px 8px;
      text-align: center;
      flex-shrink: 0;
      background: linear-gradient(180deg, var(--t-glow-top, rgba(34,197,94,0.12)) 0%, transparent 100%);
    }
    .brand-logo {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 8px;
      border: 2px solid var(--t-accent, #22c55e);
      box-shadow: 0 4px 20px var(--t-accent-glow, rgba(34,197,94,0.4));
    }
    .brand-logo-footer {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 4px;
      border: 1px solid var(--t-border, #334155);
    }
    .banner h2 {
      font-family: "Oswald", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--t-text, #fff);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      line-height: 1.2;
      text-shadow: 0 0 20px var(--t-accent-glow, transparent);
    }
    .title-bar {
      width: 48px;
      height: 2px;
      margin: 6px auto 0;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, var(--t-accent, #22c55e), transparent);
    }
    .banner .date-label {
      font-size: 0.72rem;
      color: var(--t-sub, #94a3b8);
      margin-top: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .match-container {
      padding: 6px 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .sim-card {
      background: var(--t-card, #111625);
      border-radius: 10px;
      border: 1px solid var(--t-border, #1e2942);
      border-left: 3px solid var(--t-accent, #22c55e);
      padding: 7px 9px 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 0.7rem;
    }
    .sim-main {
      display: flex;
      align-items: stretch;
      gap: 8px;
      min-width: 0;
    }
    .sim-time {
      flex-shrink: 0;
      font-weight: 800;
      color: var(--t-accent, #22c55e);
      background: var(--t-time-bg, #070a13);
      border: 1px solid var(--t-border, #1e2942);
      padding: 5px 7px;
      border-radius: 7px;
      font-size: 0.72rem;
      line-height: 1.2;
      text-align: center;
      min-width: 42px;
      font-family: "Oswald", sans-serif;
    }
    .sim-time small {
      display: block;
      font-size: 0.5rem;
      color: var(--t-sub, #64748b);
      font-weight: 700;
      font-family: "Barlow", sans-serif;
    }
    .sim-teams {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 0;
    }
    .team-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex: 1;
      min-width: 0;
      max-width: 40%;
    }
    .team-block img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }
    .team-name {
      font-weight: 700;
      font-size: 0.55rem;
      line-height: 1.2;
      word-break: break-word;
      color: var(--t-text, #fff);
      text-align: center;
    }
    .vs-label {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--t-accent, #22c55e);
      color: #fff;
      font-size: 0.5rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Oswald", sans-serif;
    }
    .sim-tv {
      color: var(--t-tv, #fbbf24);
      font-weight: 700;
      font-size: 0.58rem;
      text-align: center;
      background: rgba(0,0,0,0.3);
      border-radius: 5px;
      padding: 4px 6px;
    }
    .sim-league {
      font-size: 0.5rem;
      font-weight: 800;
      color: var(--t-sub, #94a3b8);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .watermark-footer {
      background: var(--t-footer-bg, #000);
      padding: 7px 10px;
      text-align: center;
      font-size: 0.55rem;
      color: var(--t-sub, #94a3b8);
      font-weight: 700;
      border-top: 1px solid var(--t-border, #111625);
      flex-shrink: 0;
      line-height: 1.4;
    }

    /* ── MOBILE OVERRIDES ─────────────────────────────── */
    @media (max-width: 800px) {
      .app-layout {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* Mobile: tabs at top */
      .mobile-tabs {
        display: flex;
        background: var(--sidebar-bg);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
        padding-top: var(--safe-top);
      }
      .mobile-tab {
        flex: 1;
        padding: 13px 10px;
        text-align: center;
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--sub);
        cursor: pointer;
        border-bottom: 3px solid transparent;
        transition: all 0.2s;
        -webkit-tap-highlight-color: transparent;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .mobile-tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 16px 16px calc(16px + var(--safe-bottom));
        display: none;
      }
      .sidebar.active { display: block; }

      .preview-panel {
        display: none;
        padding: 14px 14px calc(80px + var(--safe-bottom));
      }
      .preview-panel.active { display: flex; }

      #export-area {
        max-width: 320px;
      }

      /* Floating download bar on mobile */
      .mobile-download-bar {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 10px 14px calc(10px + var(--safe-bottom));
        background: var(--sidebar-bg);
        border-top: 1px solid var(--border);
        z-index: 200;
        gap: 10px;
        align-items: center;
      }
      .mobile-download-bar .btn-download {
        margin: 0;
        flex: 1;
        padding: 12px;
        font-size: 0.88rem;
      }
      .status-inline {
        display: none;
      }
    }

    @media (min-width: 801px) {
      .mobile-tabs { display: none; }
      .mobile-download-bar { display: none; }
    }

    /* Smooth scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  </style>
</head>

  <!-- Mobile tab bar -->
  <div class="mobile-tabs" id="mobile-tabs">

    <div class="mobile-tab" data-panel="preview" onclick="switchTab('preview')">📱 Preview</div>
  </div>

  <div class="app-layout">
    <aside class="sidebar active" id="panel-settings">
      <div class="sidebar-header">
        <div class="icon">⚽</div>
        <div>
          <h1>Generator Jadwal</h1>
          <p>TikTok PNG 9:16 · 1080×1920</p>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-label">Branding</div>
      <div class="field">
        <label>Judul Header</label>
        <input type="text" id="input-header" value="JADWAL BOLA HARI INI" />
      </div>
      <div class="field">
        <label>TikTok / Watermark</label>
        <input type="text" id="input-tiktok" value="@CORNERKIICK" placeholder="@username" />

      <div class="field">

        <input type="text" id="input-footer" value="🎵 CORNERKIICK  |  📸 CORNERKIICK  |  📺 CORNERKIICK" />

      <div class="divider"></div>

      <div class="section-label">Tema PNG</div>
      <div class="theme-grid" id="theme-grid"></div>

      <div class="divider"></div>

      <div class="section-label">Tanggal</div>
      <div class="date-row">
        <input type="date" id="date-picker" />
        <button class="btn btn-today" id="btn-today" type="button">Hari Ini</button>
        <button class="btn btn-refresh" id="btn-refresh" type="button">↻</button>
      </div>

      <input type="file" id="file-import" accept=".html,.htm,text/html" />
      <label class="btn btn-import" for="file-import">📂 Import HTML Jadwal</label>

      <!-- Desktop download button -->
      <button class="btn btn-download" id="btn-download-desk" type="button" disabled>⚡ DOWNLOAD PNG 9:16</button>
      <div class="status" id="status">Memuat data...</div>

    <main class="preview-panel" id="panel-preview">
      <span class="preview-label">Preview Live</span>
      <div id="export-area" data-theme="stadium">
        <div class="bg-watermark" id="bg-watermark" aria-hidden="true"></div>
        <div class="banner">
          <img class="brand-logo" id="brand-logo" src="" alt="Logo" />
          <h2 id="view-header">JADWAL BOLA HARI INI</h2>
          <div class="title-bar"></div>
          <div class="date-label" id="display-date">—</div>
        </div>
        <div id="match-list" class="match-container"></div>
        <div class="watermark-footer">
          <img class="brand-logo-footer" id="brand-logo-footer" src="" alt="Logo" />
          <div id="view-footer">🎵 CORNERKIICK  |  📸 CORNERKIICK  |  📺 CORNERKIICK</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Mobile floating download bar -->
  <div class="mobile-download-bar" id="mobile-dl-bar">
    <button class="btn btn-download" id="btn-download-mob" type="button" disabled>⚡ DOWNLOAD PNG</button>
  </div>

  <script>
    // ── MOBILE TAB SWITCHING ──────────────────────────
    function switchTab(panel) {
      document.getElementById('panel-settings').classList.toggle('active', panel === 'settings');
      document.getElementById('panel-preview').classList.toggle('active', panel === 'preview');
      document.querySelectorAll('.mobile-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.panel === panel);
      });
    }

    // ── CONSTANTS & UTILS ────────────────────────────

    const THEMES = {

        accent:"#4ade80",accentGlow:"rgba(74,222,128,0.55)",tv:"#fde047",
        footerBg:"#040a06",glow:"rgba(74,222,128,0.35)",glowTop:"rgba(74,222,128,0.28)",glowBottom:"rgba(34,197,94,0.12)",
        borders:["#4ade80","#22d3ee","#facc15","#34d399"],wm:"rgba(255,255,255,0.03)",deco:"stadium",
      },
      cyber: {
        name:"🌐 Cyber", swatch:"linear-gradient(145deg,#0a0a1a 30%,#22d3ee 50%,#e879f9 100%)",
        previewBg:"radial-gradient(circle at 20% 20%,rgba(34,211,238,0.25),transparent 45%),radial-gradient(circle at 80% 80%,rgba(232,121,249,0.2),transparent 45%),linear-gradient(180deg,#0a0a1a,#050510)",
        decoOverlay:"linear-gradient(rgba(34,211,238,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,0.04) 1px,transparent 1px)",
        bg:"#050510",bg2:"#0f1030",card:"rgba(12,14,40,0.92)",cardHi:"rgba(18,22,55,0.98)",

        accent:"#22d3ee",accentGlow:"rgba(34,211,238,0.6)",tv:"#f0abfc",
        footerBg:"#030308",glow:"rgba(34,211,238,0.4)",glowTop:"rgba(34,211,238,0.3)",glowBottom:"rgba(232,121,249,0.2)",
        borders:["#22d3ee","#e879f9","#818cf8","#38bdf8"],wm:"rgba(255,255,255,0.035)",deco:"cyber",
      },
      goldcup: {
        name:"🏆 Trofi", swatch:"linear-gradient(145deg,#1a1208 30%,#fbbf24 100%)",
        previewBg:"radial-gradient(ellipse at 50% 0%,rgba(251,191,36,0.25),transparent 55%),linear-gradient(160deg,#1a1208,#0c0804)",

    let currentTheme = "stadium";

    function loadSettings() {

        if (s.tiktok) inputTiktok.value = s.tiktok;
        if (s.footer) inputFooter.value = s.footer;

    // ── HELPERS ───────────────────────────────────────

    function normalizeName(n) {

    // ── LOGOS ─────────────────────────────────────────
    async function loadStaticLogos() {
      if (staticLogos) return staticLogos;
      try {
        const res = await fetch(asset("logos.json?v=3"));
        if (!res.ok) throw 0;
        staticLogos = await res.json();
      } catch {
        staticLogos = { teams: {}, leagues: {} };
      }
      return staticLogos;
    }

    function slugify(n) { return n.toLowerCase().trim().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"") || "unknown"; }
    function isRemote(p) { return /^https?:\/\//i.test(p||""); }
    function basePath(mapped, folder, name) {
      if (mapped && !isRemote(mapped)) return mapped.replace(/\.(png|svg|jpg|jpeg|webp)$/i,"");
      return `assets/logos/${folder}/${slugify(name)}`;
    }

    function findBadge(map, name) {
      if (!map || !name) return null;
      if (map[name] && !isRemote(map[name])) return map[name];
      const norm = normalizeName(name);
      let best = null, bestLen = 0;
      for (const [k,v] of Object.entries(map)) {
        if (isRemote(v)) continue;
        const kn = normalizeName(k);
        if (norm === kn) return v;
        if ((norm.includes(kn) || kn.includes(norm)) && k.length > bestLen) { best = v; bestLen = k.length; }
      }
      return best;
    }

    function resolveTeamLogo(n) { return basePath(staticLogos ? findBadge(staticLogos.teams, n) : null, "teams", n); }
    function resolveLeagueLogo(c) { return basePath(staticLogos ? findBadge(staticLogos.leagues, c) : null, "leagues", c); }
    function resolvePath(p) { return (!p || isRemote(p)) ? null : asset(p); }

    function localCandidates(p) {
      if (!p || isRemote(p)) return [];
      const base = p.replace(/\.(png|svg|jpg|jpeg|webp)$/i,"");
      return [".png",".svg",".jpg",".webp"].map(e => base+e);
    }

    function logoKey(p) { return (p||"").replace(/\.(png|svg|jpg|jpeg|webp)$/i,""); }
    function getCachedLogo(p) {
      if (!p) return null;
      const k = logoKey(p);
      return logoCache[p] || logoCache[k] || logoCache[resolvePath(p)] || logoCache[resolvePath(k)] || null;
    }

    async function tryLoad(p) {
      const src = resolvePath(p);
      if (!src) return null;
      const cached = getCachedLogo(p);
      if (cached) return cached;
      return new Promise(res => {
        const img = new Image();
        img.onload = () => { logoCache[p] = logoCache[logoKey(p)] = img; res(img); };
        img.onerror = () => res(null);
        img.src = src;
      });
    }

    async function loadImage(p) {
      if (!p) return null;
      const cached = getCachedLogo(p);
      if (cached) return cached;
      for (const c of localCandidates(p)) { const img = await tryLoad(c); if (img) return img; }
      return null;
    }

    function logoTag(basePath, alt) {
      const urls = localCandidates(basePath).map(c => resolvePath(c)).filter(Boolean);
      if (!urls.length) return "";
      const list = JSON.stringify(urls);
      return `<img src="${escapeHtml(urls[0])}" alt="${escapeHtml(alt)}" loading="lazy" data-logos='${list.replace(/'/g,"&#39;")}' onerror="(function(el){var u=JSON.parse(el.dataset.logos);var n=+(el.dataset.i||0)+1;el.dataset.i=n;if(n<u.length)el.src=u[n];else el.style.visibility='hidden'})(this)">`;
    }

    function setupBrandLogo() {
      const url = asset(BRAND_LOGO_PATHS[0]);
      ["#brand-logo","#brand-logo-footer"].forEach(sel => {
        const el = $(sel);
        if (el) { el.src = url; el.onerror = () => { el.src = asset(BRAND_LOGO_PATHS[1]); }; }
      });
    }

    async function loadBrandLogo() {
      if (brandLogoImg) return brandLogoImg;
      for (const p of BRAND_LOGO_PATHS) {
        for (const c of localCandidates(p)) {
          const img = await tryLoad(c);
          if (img) { brandLogoImg = img; return img; }
        }
      }
      return null;
    }

    // ── RENDER PREVIEW ────────────────────────────────
    function shortTv(m) {
      const parts = (m.tvFree || []).concat(m.tvPaid || []);
      return parts.length ? parts.join(" · ") : (m.tv || "-");
    }

    function getMatchesForDate(iso) {
      const raw = allSchedules[iso];
      if (Array.isArray(raw)) return raw;
      if (raw && typeof raw === "object") return [raw];
      return [];

    async function renderMatches(iso) {
      selectedDate = iso;

      displayDate.textContent = formatDateID(iso);
      if (!matches.length) {
        matchList.innerHTML = `<div style="text-align:center;padding:20px 8px;color:var(--t-sub);font-size:0.75rem;opacity:0.7">Tidak ada jadwal untuk tanggal ini.</div>`;

      }
      setBtnsDisabled(false);
      await loadStaticLogos();
      matchList.innerHTML = matches.map(m => {
        const tvStr = shortTv(m);
        return `<div class="sim-card">
          ${m.competition ? `<div class="sim-league">${escapeHtml(m.competition)}</div>` : ""}
          <div class="sim-main">
            <span class="sim-time">${escapeHtml(m.kickoff)}<small>WIB</small></span>
            <span class="sim-teams">
              <span class="team-block">${logoTag(resolveTeamLogo(m.home),m.home)}<span class="team-name">${escapeHtml(m.home)}</span></span>
              <span class="vs-label">VS</span>
              <span class="team-block">${logoTag(resolveTeamLogo(m.away),m.away)}<span class="team-name">${escapeHtml(m.away)}</span></span>
            </span>
          </div>
          <span class="sim-tv">📺 ${escapeHtml(tvStr)}</span>
        </div>`;
      }).join("");
      const urls = [...new Set(matches.flatMap(m => [resolveTeamLogo(m.home), resolveTeamLogo(m.away), resolveLeagueLogo(m.competition)]).filter(Boolean))];
      Promise.all(urls.map(loadImage));

    async function fetchSchedule() {
      setStatus("Memuat jadwal...");
      try {
        const res = await fetch(asset("data/jadwal.json"));
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        allSchedules = data.schedules || {};
        await loadStaticLogos();
        const total = Object.values(allSchedules).flat().length;
        setStatus(`✓ ${total} pertandingan dimuat.`, "success");
        renderMatches(selectedDate);
      } catch(e) {
        setStatus("Gagal memuat jadwal. Import HTML atau cek data/jadwal.json.", "error");
      }
    }

    function importHtmlFile(file) {
      const reader = new FileReader();
      reader.onload = async e => {
        try {
          const doc = new DOMParser().parseFromString(e.target.result, "text/html");
          const rows = doc.querySelectorAll("table tr");
          if (!rows.length) throw new Error("Tabel tidak ditemukan.");
          let count = 0;
          rows.forEach(tr => {
            const cells = [...tr.querySelectorAll("td")].map(td => td.textContent.trim());
            if (cells.length < 4) return;
            const [kickoff, matchup, competition, tv] = cells;
            if (/kick-off/i.test(kickoff) || !/vs/i.test(matchup)) return;
            const parts = matchup.split(/\s+vs\s+/i);
            if (!allSchedules[selectedDate]) allSchedules[selectedDate] = [];
            allSchedules[selectedDate].push({ kickoff, matchup, home:(parts[0]||"").trim(), away:(parts[1]||"").trim(), competition, tv, tvFree:[], tvPaid:[] });
            count++;
          });
          await loadStaticLogos();
          setStatus(`✓ Import ${count} pertandingan.`, "success");
          renderMatches(selectedDate);
        } catch(err) {
          setStatus(`Gagal import: ${err.message}`, "error");
        }
      };
      reader.readAsText(file, "UTF-8");
    }

    // ══════════════════════════════════════════════════
    // PNG EXPORT — REDESIGNED
    // ══════════════════════════════════════════════════
    const PNG_W = 1080;
    const PNG_H = 1920;
    const PNG_MAX = 6;
    const PAD = 28; // horizontal page padding

    // ── Utility: rounded rect ─────────────────────────
    function drawRR(ctx, x, y, w, h, r, fill, stroke, sw) {
      const rad = Math.min(r, w/2, h/2);
      ctx.beginPath();
      ctx.moveTo(x+rad,y); ctx.lineTo(x+w-rad,y); ctx.quadraticCurveTo(x+w,y,x+w,y+rad);
      ctx.lineTo(x+w,y+h-rad); ctx.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);
      ctx.lineTo(x+rad,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-rad);
      ctx.lineTo(x,y+rad); ctx.quadraticCurveTo(x,y,x+rad,y);
      ctx.closePath();
      if (fill) { ctx.fillStyle=fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=sw||2; ctx.stroke(); }
    }

    // ── Utility: clip-circle image ────────────────────
    function drawCircleImg(ctx, img, cx, cy, r) {
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip();
      ctx.drawImage(img, cx-r, cy-r, r*2, r*2);
      ctx.restore();
    }

    // ── Utility: text wrap ────────────────────────────
    function wrapText(ctx, text, maxW, maxLines) {
      const words = text.split(/\s+/);
      const lines = []; let line = "";
      for(const w of words) {
        const test = line ? line+" "+w : w;
        if(ctx.measureText(test).width <= maxW) line=test;
        else { if(line) lines.push(line); line=w; }
      }
      if(line) lines.push(line);
      return lines.slice(0, maxLines);
    }

    // ── BACKGROUND ────────────────────────────────────
    function drawBg(ctx, W, H, t) {
      // Base fill
      const g = ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0, t.bg2||t.bg); g.addColorStop(0.55, t.bg); g.addColorStop(1, t.bg2||t.bg);
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

      // Deco patterns
      if (t.deco==="stadium") {
        ctx.fillStyle="rgba(74,222,128,0.022)";
        for(let i=0;i<H;i+=80) ctx.fillRect(0,i,W,36);
      } else if (t.deco==="cyber") {
        ctx.strokeStyle="rgba(34,211,238,0.06)"; ctx.lineWidth=1;
        for(let x=0;x<W;x+=54){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
        for(let y=0;y<H;y+=54){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
        [[0.15,0.12,"rgba(34,211,238,0.3)"],[0.85,0.88,"rgba(232,121,249,0.25)"]].forEach(([px,py,col])=>{
          const rg=ctx.createRadialGradient(px*W,py*H,0,px*W,py*H,420);
          rg.addColorStop(0,col);rg.addColorStop(1,"transparent");
          ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
        });
      } else if (t.deco==="gold") {
        ctx.strokeStyle="rgba(251,191,36,0.06)"; ctx.lineWidth=2;
        for(let i=-H;i<W+H;i+=70){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+H,H);ctx.stroke();}
      } else if (t.deco==="inferno") {
        const rg=ctx.createRadialGradient(W/2,H*1.1,80,W/2,H*1.1,850);
        rg.addColorStop(0,"rgba(239,68,68,0.5)");rg.addColorStop(0.5,"rgba(249,115,22,0.15)");rg.addColorStop(1,"transparent");
        ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
      } else if (t.deco==="studio") {
        ctx.fillStyle="rgba(59,130,246,0.045)";
        for(let i=0;i<H;i+=100) ctx.fillRect(0,i,W,50);
      }

      // Ambient glow top
      const g1=ctx.createRadialGradient(W/2,0,0,W/2,0,680);
      g1.addColorStop(0,t.glowTop);g1.addColorStop(1,"transparent");
      ctx.fillStyle=g1;ctx.fillRect(0,0,W,680);
      // Ambient glow bottom
      const g2=ctx.createRadialGradient(W/2,H,0,W/2,H,600);
      g2.addColorStop(0,t.glowBottom);g2.addColorStop(1,"transparent");
      ctx.fillStyle=g2;ctx.fillRect(0,H-600,W,600);
    }

    // ── WATERMARK BACKGROUND ──────────────────────────
    function drawWatermarkBg(ctx, W, H, t) {
      const text = getTiktokWmText();
      if (!text) return;
      ctx.save();
      ctx.translate(W/2, H/2); ctx.rotate(-Math.PI/6.5);
      ctx.font=`900 80px Impact, Arial, sans-serif`;
      ctx.textAlign="center"; ctx.fillStyle=t.wm||"rgba(255,255,255,0.028)";
      const spacing = 175;
      const count = Math.ceil(H/spacing)+4;
      for(let i=-Math.floor(count/2); i<=Math.floor(count/2); i++)
        ctx.fillText(text, 0, i*spacing);
      ctx.restore();
    }

    // ── HEADER ────────────────────────────────────────
    // Returns the Y coordinate where match list should start
    function drawHeader(ctx, W, t, brandImg) {
      const cx = W/2;
      const cX = PAD, cW = W - PAD*2;
      let y = 28;

      // — Card shadow
      ctx.save();
      ctx.shadowColor="rgba(0,0,0,0.65)"; ctx.shadowBlur=36; ctx.shadowOffsetY=14;
      const logoR = brandImg ? 52 : 0;
      // height: logo(dia) + gap + title + gap + date-pill + vertical padding
      const cardH = brandImg
        ? logoR*2 + 22 + 64 + 14 + 60 + 36   // with logo
        : 64 + 14 + 60 + 48;                   // without logo
      const hg = ctx.createLinearGradient(cX,y,cX,y+cardH);
      hg.addColorStop(0, t.cardHi||t.card); hg.addColorStop(1, t.card);
      drawRR(ctx, cX, y, cW, cardH, 26, hg, t.accent, 3);
      ctx.restore();

      // Top gradient shimmer inside card
      const shimG = ctx.createLinearGradient(cX,y,cX+cW,y);
      shimG.addColorStop(0,"transparent"); shimG.addColorStop(0.5,t.accent+"44"); shimG.addColorStop(1,"transparent");
      ctx.fillStyle=shimG; ctx.fillRect(cX+26, y, cW-52, 3);

      let iy = y + 20; // inner content Y

      // — Brand logo
      if (brandImg) {
        const logoY = iy + logoR;
        // glow halo
        ctx.save();
        ctx.shadowColor=t.accent; ctx.shadowBlur=36;
        ctx.beginPath(); ctx.arc(cx, logoY, logoR, 0, Math.PI*2);
        ctx.strokeStyle=t.accent; ctx.lineWidth=3; ctx.stroke();
        ctx.restore();
        // outer ring subtle
        ctx.beginPath(); ctx.arc(cx, logoY, logoR+9, 0, Math.PI*2);
        ctx.strokeStyle=t.accent+"30"; ctx.lineWidth=2; ctx.stroke();
        drawCircleImg(ctx, brandImg, cx, logoY, logoR);
        iy += logoR*2 + 18;
      }

      // — Title text
      ctx.save();
      ctx.shadowColor=t.accent; ctx.shadowBlur=24;
      ctx.fillStyle=t.text;
      ctx.font=`900 58px Impact, Arial Black, sans-serif`;
      ctx.textAlign="center"; ctx.textBaseline="alphabetic";
      ctx.fillText((inputHeader.value||"JADWAL BOLA").toUpperCase(), cx, iy + 56);
      ctx.restore();
      iy += 64 + 12;

      // — Date pill (wider, more prominent)
      const dateStr = formatDateID(selectedDate).toUpperCase();
      ctx.font=`700 32px Arial, sans-serif`;
      const dW = Math.min(ctx.measureText(dateStr).width + 64, cW - 80);
      const pillH = 58;
      const pillX = cx - dW/2;
      // pill bg with subtle gradient
      const pillG = ctx.createLinearGradient(pillX,iy,pillX+dW,iy);
      pillG.addColorStop(0, t.timeBg||t.bg);
      pillG.addColorStop(0.5, (t.timeBg||t.bg)+"ee");
      pillG.addColorStop(1, t.timeBg||t.bg);
      drawRR(ctx, pillX, iy, dW, pillH, pillH/2, pillG, t.accent, 2);
      ctx.fillStyle=t.text;
      ctx.font=`800 30px Arial Black, Arial, sans-serif`;
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(dateStr, cx, iy+pillH/2);
      ctx.textBaseline="alphabetic";

      return y + cardH + 18;
    }

    // ── SINGLE MATCH CARD ─────────────────────────────
    // Layout per card (from top):
    //  [league label row — 34px if present]
    //  [time box | team-logo home | VS | team-logo away]  — main body
    //  [TV bar — 52px]
    function drawMatchRow(ctx, m, cardY, cardH, idx, t) {
      const cX = PAD, cW = PNG_W - PAD*2;
      const accentColor = t.borders ? t.borders[idx % t.borders.length] : t.accent;
      const LEAGUE_H = m.competition ? 36 : 0;
      const TV_H = 52;
      const INNER_PAD = 14;
      const mainH = cardH - LEAGUE_H - TV_H - INNER_PAD*2 - 8;

      // ─ Card background
      ctx.save();
      ctx.shadowColor="rgba(0,0,0,0.6)"; ctx.shadowBlur=24; ctx.shadowOffsetY=8;
      const cg = ctx.createLinearGradient(cX,cardY,cX+cW,cardY+cardH);
      cg.addColorStop(0, t.cardHi||t.card); cg.addColorStop(1, t.card);
      drawRR(ctx, cX, cardY, cW, cardH, 22, cg, accentColor, 2.5);
      ctx.restore();

      // Left accent stripe (full height, rounded right side only)
      const STRIPE = 10;
      ctx.fillStyle = accentColor;
      ctx.beginPath();
      ctx.moveTo(cX, cardY+22);
      ctx.lineTo(cX+STRIPE-4, cardY+22); ctx.quadraticCurveTo(cX+STRIPE, cardY+22, cX+STRIPE, cardY+22+4);
      ctx.lineTo(cX+STRIPE, cardY+cardH-22-4); ctx.quadraticCurveTo(cX+STRIPE, cardY+cardH-22, cX+STRIPE-4, cardY+cardH-22);
      ctx.lineTo(cX, cardY+cardH-22);
      ctx.closePath(); ctx.fill();

      // ─ League label
      if (m.competition) {
        // League badge pill
        ctx.font=`700 22px Arial, sans-serif`;
        const labW = Math.min(ctx.measureText(m.competition.toUpperCase()).width+36, cW-60);
        const labX = cX+STRIPE+16, labY = cardY+INNER_PAD-4;
        drawRR(ctx, labX, labY, labW, 28, 6, accentColor+"22", accentColor+"55", 1);
        ctx.fillStyle=t.sub;
        ctx.font=`700 22px Arial, sans-serif`;
        ctx.textAlign="left"; ctx.textBaseline="middle";
        ctx.fillText(m.competition.toUpperCase().slice(0,38), labX+10, labY+14);
        ctx.textBaseline="alphabetic";
      }

      // ─ Main body Y start (below league label)
      const bodyY = cardY + INNER_PAD + LEAGUE_H;

      // ─ Time box
      const TIME_W = 116;
      const timeX = cX + STRIPE + 14;
      const timeBoxH = Math.min(mainH - 8, 108);
      const timeBoxY = bodyY + (mainH - timeBoxH)/2;

      ctx.save();
      ctx.shadowColor=accentColor; ctx.shadowBlur=20;
      const timeBg = ctx.createLinearGradient(timeX, timeBoxY, timeX, timeBoxY+timeBoxH);
      timeBg.addColorStop(0, (t.timeBg||t.bg)+"ff");
      timeBg.addColorStop(1, (t.timeBg||t.bg)+"cc");
      drawRR(ctx, timeX, timeBoxY, TIME_W, timeBoxH, 16, timeBg, accentColor, 2.5);
      ctx.restore();
      // Kickoff time
      ctx.fillStyle=accentColor;
      ctx.font=`900 40px Impact, Arial Black, sans-serif`;
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(m.kickoff, timeX+TIME_W/2, timeBoxY + timeBoxH*0.46);
      // WIB label
      ctx.fillStyle=t.sub;
      ctx.font=`700 19px Arial, sans-serif`;
      ctx.fillText("WIB", timeX+TIME_W/2, timeBoxY + timeBoxH*0.78);
      ctx.textBaseline="alphabetic";

      // ─ Teams area
      const teamsX = timeX + TIME_W + 12;
      const teamsW = cX + cW - teamsX - 14;
      const VS_R = 26;
      const colW = (teamsW - VS_R*2 - 8) / 2;
      const homeCx = teamsX + colW/2;
      const awayCx = teamsX + teamsW - colW/2;
      const midX = teamsX + teamsW/2;

      const LOGO_SZ = Math.min(86, Math.max(66, Math.floor(mainH * 0.52)));
      const logoTopY = bodyY + 8;
      const nameY = logoTopY + LOGO_SZ + 14;
      const nameFontPx = Math.max(22, Math.min(28, Math.round(colW/6.5)));

      const hImg = getCachedLogo(resolveTeamLogo(m.home));
      const aImg = getCachedLogo(resolveTeamLogo(m.away));

      // Draw each team
      [[hImg, m.home, homeCx], [aImg, m.away, awayCx]].forEach(([img, name, cx]) => {
        if (img) {
          ctx.save(); ctx.shadowColor="rgba(0,0,0,0.45)"; ctx.shadowBlur=12;
          ctx.drawImage(img, cx-LOGO_SZ/2, logoTopY, LOGO_SZ, LOGO_SZ);
          ctx.restore();
        } else {
          // Styled placeholder
          const gr=ctx.createRadialGradient(cx,logoTopY+LOGO_SZ/2,0,cx,logoTopY+LOGO_SZ/2,LOGO_SZ/2);
          gr.addColorStop(0,t.border+"88"); gr.addColorStop(1,t.timeBg||t.bg);
          ctx.beginPath(); ctx.arc(cx, logoTopY+LOGO_SZ/2, LOGO_SZ/2, 0, Math.PI*2);
          ctx.fillStyle=gr; ctx.fill();
          ctx.strokeStyle=accentColor+"55"; ctx.lineWidth=2; ctx.stroke();
          // team initials
          ctx.fillStyle=t.sub; ctx.font=`900 ${Math.round(LOGO_SZ*0.35)}px Impact, Arial, sans-serif`;
          ctx.textAlign="center"; ctx.textBaseline="middle";
          ctx.fillText(name.slice(0,3).toUpperCase(), cx, logoTopY+LOGO_SZ/2);
          ctx.textBaseline="alphabetic";
        }
        // Team name
        ctx.font=`700 ${nameFontPx}px Arial Black, Arial, sans-serif`;
        ctx.fillStyle=t.text; ctx.textAlign="center";
        const lines = wrapText(ctx, name, colW-8, 2);
        lines.forEach((ln,i) => ctx.fillText(ln, cx, nameY + i*(nameFontPx+5)));
      });

      // VS badge
      const vsCY = logoTopY + LOGO_SZ/2 + 4;
      ctx.save(); ctx.shadowColor=accentColor; ctx.shadowBlur=22;
      ctx.beginPath(); ctx.arc(midX, vsCY, VS_R, 0, Math.PI*2);
      ctx.fillStyle=accentColor; ctx.fill();
      ctx.restore();
      // VS inner ring
      ctx.beginPath(); ctx.arc(midX, vsCY, VS_R-5, 0, Math.PI*2);
      ctx.strokeStyle="rgba(255,255,255,0.25)"; ctx.lineWidth=1.5; ctx.stroke();
      ctx.fillStyle="#fff"; ctx.font=`900 22px Impact, Arial, sans-serif`;
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText("VS", midX, vsCY+1);
      ctx.textBaseline="alphabetic";

      // ─ TV bar (full width inside card, at bottom)
      const tvY = cardY + cardH - TV_H - 10;
      const tvX = cX + STRIPE + 10, tvW = cW - STRIPE - 20;
      const tvG = ctx.createLinearGradient(tvX,tvY,tvX+tvW,tvY);
      tvG.addColorStop(0,"rgba(0,0,0,0.55)"); tvG.addColorStop(0.5,"rgba(0,0,0,0.42)"); tvG.addColorStop(1,"rgba(0,0,0,0.55)");
      drawRR(ctx, tvX, tvY, tvW, TV_H, TV_H/2, tvG, accentColor+"88", 1.5);
      const isFree = (m.tvFree||[]).length > 0;
      ctx.fillStyle = isFree ? (t.tvFree||"#4ade80") : (t.tv||"#fbbf24");
      ctx.font=`700 27px Arial, sans-serif`;
      ctx.textAlign="center"; ctx.textBaseline="middle";
      const tvStr = "📺  " + shortTv(m);
      ctx.fillText(tvStr, tvX+tvW/2, tvY+TV_H/2+1);
      ctx.textBaseline="alphabetic";
    }

    // ── FOOTER ────────────────────────────────────────
    function drawFooter(ctx, W, H, footerY, t, brandImg) {
      // Footer bg
      const fg = ctx.createLinearGradient(0,footerY,0,H);
      fg.addColorStop(0,t.footerBg); fg.addColorStop(1,"#000");
      ctx.fillStyle=fg; ctx.fillRect(0,footerY,W,H-footerY);

      // Divider gradient line
      const dg = ctx.createLinearGradient(PAD,footerY,W-PAD,footerY);
      dg.addColorStop(0,"transparent"); dg.addColorStop(0.3,t.accent+"88");
      dg.addColorStop(0.5,t.accent); dg.addColorStop(0.7,t.accent+"88"); dg.addColorStop(1,"transparent");
      ctx.strokeStyle=dg; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(PAD,footerY+1); ctx.lineTo(W-PAD,footerY+1); ctx.stroke();

      const cx = W/2;
      let fy = footerY + 18;

      if (brandImg) {
        const lr = 40;
        ctx.save(); ctx.shadowColor=t.accent; ctx.shadowBlur=20;
        ctx.beginPath(); ctx.arc(cx,fy+lr,lr,0,Math.PI*2);
        ctx.strokeStyle=t.accent; ctx.lineWidth=2.5; ctx.stroke();
        ctx.restore();
        drawCircleImg(ctx, brandImg, cx, fy+lr, lr);
        fy += lr*2 + 14;
      } else { fy += 12; }

      ctx.fillStyle=t.sub; ctx.font=`700 28px Arial, sans-serif`;
      ctx.textAlign="center";
      const lines = wrapText(ctx, inputFooter.value||"", W-80, 2);
      lines.forEach((ln,i) => ctx.fillText(ln, cx, fy+30+i*36));
    }

    // ── DOWNLOAD PNG ──────────────────────────────────
    async function downloadPNG() {
      const matches = getMatchesForDate(selectedDate);
      if (!matches.length) return;
      setBtnsDisabled(true);
      setStatus("Memuat logo...");

      try {
        await loadStaticLogos();
        const t = getTheme();
        const data = matches.slice(0, PNG_MAX);

        // Preload all logos
        const urls = [...new Set(data.flatMap(m=>[
          resolveTeamLogo(m.home), resolveTeamLogo(m.away), resolveLeagueLogo(m.competition)
        ]).filter(Boolean))];
        await Promise.all(urls.map(loadImage));
        const brandImg = await loadBrandLogo();

        const W=PNG_W, H=PNG_H;
        const canvas=document.createElement("canvas");
        canvas.width=W; canvas.height=H;
        const ctx=canvas.getContext("2d");
        ctx.textBaseline="alphabetic";

        drawBg(ctx, W, H, t);
        drawWatermarkBg(ctx, W, H, t);
        const headerEnd = drawHeader(ctx, W, t, brandImg);

        // ── Layout calculation ─────────────────────────
        const FOOTER_H = brandImg ? 118 : 90;
        const listTop = headerEnd;
        const listBottom = H - FOOTER_H;
        const n = data.length;
        const GAP = 14;
        const avail = listBottom - listTop - GAP*(n-1);

        // Dynamic card height: ideal 240-280, shrink to fit
        let cardH = Math.floor(avail / n);
        cardH = Math.min(286, Math.max(158, cardH));
        // Fine-tune to fit
        while(n > 0 && listTop + n*cardH + GAP*(n-1) > listBottom) cardH -= 1;

        data.forEach((m, i) => {
          drawMatchRow(ctx, m, listTop + i*(cardH+GAP), cardH, i, t);
        });

        drawFooter(ctx, W, H, listBottom, t, brandImg);

        // Trigger download
        const a = document.createElement("a");
        a.download = `jadwal-${currentTheme}-${selectedDate}.png`;
        a.href = canvas.toDataURL("image/png");
        a.click();

        const loaded = urls.filter(u=>getCachedLogo(u)).length;
        setStatus(`✓ PNG "${t.name}": ${data.length} pertandingan · logo ${loaded}/${urls.length}`, "success");
      } catch(err) {
        setStatus(`Gagal: ${err.message}`, "error");
        console.error(err);
      } finally {
        setBtnsDisabled(false);
      }
    }

    function setStatus(msg, cls="") {
      statusEl.className = "status" + (cls?" "+cls:"");
      statusEl.textContent = msg;
    }

    // ── EVENT LISTENERS ───────────────────────────────
    $("#btn-refresh").addEventListener("click", fetchSchedule);
    btnDlDesk.addEventListener("click", downloadPNG);
    btnDlMob.addEventListener("click", downloadPNG);
    $("#btn-today").addEventListener("click", () => setSelectedDate(todayISO()));
    datePicker.addEventListener("change", e => setSelectedDate(e.target.value));
    $("#file-import").addEventListener("change", e => {
      const f=e.target.files[0];
      if(f) importHtmlFile(f);
      e.target.value="";
    });

    // ── INIT ──────────────────────────────────────────
    loadSettings();
    setupBrandLogo();
    datePicker.value = selectedDate;
    $("#view-header").textContent = inputHeader.value.toUpperCase();
    $("#view-footer").textContent = inputFooter.value;
    buildThemePicker();
    applyThemePreview(currentTheme);
    updateBgWatermark();
    fetchSchedule();
  </script>
</body>
</html>
