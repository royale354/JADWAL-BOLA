<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Jadwal Bola — Generator PNG TikTok</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --app-bg: #05080f;
      --sidebar-bg: #0b0f1a;
      --card-bg: #111828;
      --border: #1e2942;
      --accent: #22c55e;
      --accent-glow: rgba(34,197,94,0.4);
      --text: #f1f5f9;
      --sub: #64748b;
      --radius: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: "Barlow", "Segoe UI", system-ui, sans-serif;
      background: var(--app-bg);
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }

    /* ── DESKTOP LAYOUT ───────────────────────────────── */
    .app-layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 0;
      min-height: 100vh;
    }

    /* ── SIDEBAR ──────────────────────────────────────── */
    .sidebar {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 20px 18px calc(20px + var(--safe-bottom));
      overflow-y: auto;
      height: 100vh;
      position: sticky;
      top: 0;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .sidebar-header .icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(34,197,94,0.35);
    }
    .sidebar-header h1 {
      font-family: "Oswald", sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.03em;
      line-height: 1.2;
    }
    .sidebar-header p {
      font-size: 0.7rem;
      color: var(--sub);
      margin-top: 1px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    .section-label {
      font-size: 0.65rem;
      font-weight: 800;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    /* Branding inputs */
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 10px;
    }
    .field label {
      font-size: 0.67rem;
      font-weight: 700;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .field input {
      background: var(--app-bg);
      border: 1.5px solid var(--border);
      color: #fff;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-family: "Barlow", sans-serif;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); }

    /* Theme grid */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-bottom: 14px;
    }
    .theme-card {
      cursor: pointer;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 8px 6px;
      background: var(--app-bg);
      transition: border-color 0.2s, transform 0.15s;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .theme-card:active { transform: scale(0.96); }
    .theme-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(34,197,94,0.3); }
    .theme-card input { display: none; }
    .theme-swatch {
      height: 22px;
      border-radius: 5px;
      margin-bottom: 5px;
    }
    .theme-card span {
      font-size: 0.62rem;
      font-weight: 700;
      color: #cbd5e1;
      line-height: 1.2;
    }

    /* Date controls */
    .date-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }
    input[type="date"] {
      background: var(--app-bg);
      color: #fff;
      border: 1.5px solid var(--border);
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-family: "Barlow", sans-serif;
      outline: none;
      color-scheme: dark;
      -webkit-appearance: none;
    }
    input[type="date"]:focus { border-color: var(--accent); }
    input[type="file"] { display: none; }

    /* Buttons */
    .btn {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 0.82rem;
      font-family: "Barlow", sans-serif;
      font-weight: 700;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .btn-today { background: #1e293b; color: #e2e8f0; }
    .btn-refresh { background: #2563eb; color: #fff; }
    .btn-import { background: #374151; color: #fff; display: block; text-align: center; margin-top: 8px; padding: 9px; font-size: 0.8rem; }
    .btn-download {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(34,197,94,0.35);
    }

    .status {
      margin-top: 10px;
      font-size: 0.78rem;
      color: #eab308;
      font-weight: 600;
      line-height: 1.4;
      min-height: 20px;
    }
    .status.success { color: #22c55e; }
    .status.error { color: #f87171; }

    /* ── PREVIEW PANEL ────────────────────────────────── */
    .preview-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px;
      background: #08090f;
      overflow-y: auto;
    }

    .preview-label {
      font-size: 0.65rem;
      font-weight: 800;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 12px;
      align-self: flex-start;
    }

    #export-area {
      width: 100%;
      max-width: 380px;
      aspect-ratio: 9 / 16;
      background-color: var(--t-bg, #070a13);
      background-image: var(--t-preview-bg, none);
      background-size: cover;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7), 0 0 40px var(--t-glow, transparent);
      border: 2px solid var(--t-border, #1e2942);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #export-area::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--t-deco-overlay, none);
      background-size: var(--t-deco-size, auto);
      pointer-events: none;
      z-index: 0;
    }

    .bg-watermark {
      position: absolute;
      inset: -20%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      justify-content: center;
      gap: 24px 32px;
      transform: rotate(-24deg);
    }
    .bg-watermark span {
      font-size: clamp(0.7rem, 2.8vw, 1rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--t-wm-fg, rgba(255,255,255,0.045));
      white-space: nowrap;
      user-select: none;
    }

    #export-area .banner,
    #export-area .match-container,
    #export-area .watermark-footer {
      position: relative;
      z-index: 1;
    }

    .banner {
      padding: 12px 14px 8px;
      text-align: center;
      flex-shrink: 0;
      background: linear-gradient(180deg, var(--t-glow-top, rgba(34,197,94,0.12)) 0%, transparent 100%);
    }
    .brand-logo {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 8px;
      border: 2px solid var(--t-accent, #22c55e);
      box-shadow: 0 4px 20px var(--t-accent-glow, rgba(34,197,94,0.4));
    }
    .brand-logo-footer {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 4px;
      border: 1px solid var(--t-border, #334155);
    }
    .banner h2 {
      font-family: "Oswald", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--t-text, #fff);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      line-height: 1.2;
      text-shadow: 0 0 20px var(--t-accent-glow, transparent);
    }
    .title-bar {
      width: 48px;
      height: 2px;
      margin: 6px auto 0;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, var(--t-accent, #22c55e), transparent);
    }
    .banner .date-label {
      font-size: 0.72rem;
      color: var(--t-sub, #94a3b8);
      margin-top: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .match-container {
      padding: 6px 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .sim-card {
      background: var(--t-card, #111625);
      border-radius: 10px;
      border: 1px solid var(--t-border, #1e2942);
      border-left: 3px solid var(--t-accent, #22c55e);
      padding: 7px 9px 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 0.7rem;
    }
    .sim-main {
      display: flex;
      align-items: stretch;
      gap: 8px;
      min-width: 0;
    }
    .sim-time {
      flex-shrink: 0;
      font-weight: 800;
      color: var(--t-accent, #22c55e);
      background: var(--t-time-bg, #070a13);
      border: 1px solid var(--t-border, #1e2942);
      padding: 5px 7px;
      border-radius: 7px;
      font-size: 0.72rem;
      line-height: 1.2;
      text-align: center;
      min-width: 42px;
      font-family: "Oswald", sans-serif;
    }
    .sim-time small {
      display: block;
      font-size: 0.5rem;
      color: var(--t-sub, #64748b);
      font-weight: 700;
      font-family: "Barlow", sans-serif;
    }
    .sim-teams {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 0;
    }
    .team-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex: 1;
      min-width: 0;
      max-width: 40%;
    }
    .team-block img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }
    .team-name {
      font-weight: 700;
      font-size: 0.55rem;
      line-height: 1.2;
      word-break: break-word;
      color: var(--t-text, #fff);
      text-align: center;
    }
    .vs-label {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--t-accent, #22c55e);
      color: #fff;
      font-size: 0.5rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Oswald", sans-serif;
    }
    .sim-tv {
      color: var(--t-tv, #fbbf24);
      font-weight: 700;
      font-size: 0.58rem;
      text-align: center;
      background: rgba(0,0,0,0.3);
      border-radius: 5px;
      padding: 4px 6px;
    }
    .sim-league {
      font-size: 0.5rem;
      font-weight: 800;
      color: var(--t-sub, #94a3b8);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .watermark-footer {
      background: var(--t-footer-bg, #000);
      padding: 7px 10px;
      text-align: center;
      font-size: 0.55rem;
      color: var(--t-sub, #94a3b8);
      font-weight: 700;
      border-top: 1px solid var(--t-border, #111625);
      flex-shrink: 0;
      line-height: 1.4;
    }

    /* ── MOBILE OVERRIDES ─────────────────────────────── */
    @media (max-width: 800px) {
      .app-layout {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* Mobile: tabs at top */
      .mobile-tabs {
        display: flex;
        background: var(--sidebar-bg);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
        padding-top: var(--safe-top);
      }
      .mobile-tab {
        flex: 1;
        padding: 13px 10px;
        text-align: center;
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--sub);
        cursor: pointer;
        border-bottom: 3px solid transparent;
        transition: all 0.2s;
        -webkit-tap-highlight-color: transparent;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .mobile-tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 16px 16px calc(16px + var(--safe-bottom));
        display: none;
      }
      .sidebar.active { display: block; }

      .preview-panel {
        display: none;
        padding: 14px 14px calc(80px + var(--safe-bottom));
      }
      .preview-panel.active { display: flex; }

      #export-area {
        max-width: 320px;
      }

      /* Floating download bar on mobile */
      .mobile-download-bar {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 10px 14px calc(10px + var(--safe-bottom));
        background: var(--sidebar-bg);
        border-top: 1px solid var(--border);
        z-index: 200;
        gap: 10px;
        align-items: center;
      }
      .mobile-download-bar .btn-download {
        margin: 0;
        flex: 1;
        padding: 12px;
        font-size: 0.88rem;
      }
      .status-inline {
        display: none;
      }
    }

    @media (min-width: 801px) {
      .mobile-tabs { display: none; }
      .mobile-download-bar { display: none; }
    }

    /* Smooth scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  </style>
</head>

  <!-- Mobile tab bar -->
  <div class="mobile-tabs" id="mobile-tabs">

    <div class="mobile-tab" data-panel="preview" onclick="switchTab('preview')">📱 Preview</div>
  </div>

  <div class="app-layout">
    <aside class="sidebar active" id="panel-settings">
      <div class="sidebar-header">
        <div class="icon">⚽</div>
        <div>
          <h1>Generator Jadwal</h1>
          <p>TikTok PNG 9:16 · 1080×1920</p>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-label">Branding</div>
      <div class="field">
        <label>Judul Header</label>
        <input type="text" id="input-header" value="JADWAL BOLA HARI INI" />
      </div>
      <div class="field">
        <label>TikTok / Watermark</label>
        <input type="text" id="input-tiktok" value="@CORNERKIICK" placeholder="@username" />

      <div class="field">

        <input type="text" id="input-footer" value="🎵 CORNERKIICK  |  📸 CORNERKIICK  |  📺 CORNERKIICK" />

      <div class="divider"></div>

      <div class="section-label">Tema PNG</div>
      <div class="theme-grid" id="theme-grid"></div>

      <div class="divider"></div>

      <div class="section-label">Tanggal</div>
      <div class="date-row">
        <input type="date" id="date-picker" />
        <button class="btn btn-today" id="btn-today" type="button">Hari Ini</button>
        <button class="btn btn-refresh" id="btn-refresh" type="button">↻</button>
      </div>

      <input type="file" id="file-import" accept=".html,.htm,text/html" />
      <label class="btn btn-import" for="file-import">📂 Import HTML Jadwal</label>

      <!-- Desktop download button -->
      <button class="btn btn-download" id="btn-download-desk" type="button" disabled>⚡ DOWNLOAD PNG 9:16</button>
      <div class="status" id="status">Memuat data...</div>

    <main class="preview-panel" id="panel-preview">
      <span class="preview-label">Preview Live</span>
      <div id="export-area" data-theme="stadium">
        <div class="bg-watermark" id="bg-watermark" aria-hidden="true"></div>
        <div class="banner">
          <img class="brand-logo" id="brand-logo" src="" alt="Logo" />
          <h2 id="view-header">JADWAL BOLA HARI INI</h2>
          <div class="title-bar"></div>
          <div class="date-label" id="display-date">—</div>
        </div>
        <div id="match-list" class="match-container"></div>
        <div class="watermark-footer">
          <img class="brand-logo-footer" id="brand-logo-footer" src="" alt="Logo" />
          <div id="view-footer">🎵 CORNERKIICK  |  📸 CORNERKIICK  |  📺 CORNERKIICK</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Mobile floating download bar -->
  <div class="mobile-download-bar" id="mobile-dl-bar">
    <button class="btn btn-download" id="btn-download-mob" type="button" disabled>⚡ DOWNLOAD PNG</button>
  </div>

  <script>
    // ── MOBILE TAB SWITCHING ──────────────────────────
    function switchTab(panel) {
      document.getElementById('panel-settings').classList.toggle('active', panel === 'settings');
      document.getElementById('panel-preview').classList.toggle('active', panel === 'preview');
      document.querySelectorAll('.mobile-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.panel === panel);
      });
    }

    // ── CONSTANTS & UTILS ────────────────────────────

    const THEMES = {

        accent:"#4ade80",accentGlow:"rgba(74,222,128,0.55)",tv:"#fde047",
        footerBg:"#040a06",glow:"rgba(74,222,128,0.35)",glowTop:"rgba(74,222,128,0.28)",glowBottom:"rgba(34,197,94,0.12)",
        borders:["#4ade80","#22d3ee","#facc15","#34d399"],wm:"rgba(255,255,255,0.03)",deco:"stadium",
      },
      cyber: {
        name:"🌐 Cyber", swatch:"linear-gradient(145deg,#0a0a1a 30%,#22d3ee 50%,#e879f9 100%)",
        previewBg:"radial-gradient(circle at 20% 20%,rgba(34,211,238,0.25),transparent 45%),radial-gradient(circle at 80% 80%,rgba(232,121,249,0.2),transparent 45%),linear-gradient(180deg,#0a0a1a,#050510)",
        decoOverlay:"linear-gradient(rgba(34,211,238,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,0.04) 1px,transparent 1px)",
        bg:"#050510",bg2:"#0f1030",card:"rgba(12,14,40,0.92)",cardHi:"rgba(18,22,55,0.98)",

        accent:"#22d3ee",accentGlow:"rgba(34,211,238,0.6)",tv:"#f0abfc",
        footerBg:"#030308",glow:"rgba(34,211,238,0.4)",glowTop:"rgba(34,211,238,0.3)",glowBottom:"rgba(232,121,249,0.2)",
        borders:["#22d3ee","#e879f9","#818cf8","#38bdf8"],wm:"rgba(255,255,255,0.035)",deco:"cyber",
      },
      goldcup: {
        name:"🏆 Trofi", swatch:"linear-gradient(145deg,#1a1208 30%,#fbbf24 100%)",
        previewBg:"radial-gradient(ellipse at 50% 0%,rgba(251,191,36,0.25),transparent 55%),linear-gradient(160deg,#1a1208,#0c0804)",

    let currentTheme = "stadium";

    function loadSettings() {

        if (s.tiktok) inputTiktok.value = s.tiktok;
        if (s.footer) inputFooter.value = s.footer;

    // ── HELPERS ───────────────────────────────────────

    // ── LOGOS ─────────────────────────────────────────
    async function loadStaticLogos() {
      if (staticLogos) return staticLogos;
      try {
        const res = await fetch(asset("logos.json?v=3"));
        if (!res.ok) throw 0;
        staticLogos = await res.json();
      } catch {
        staticLogos = { teams: {}, leagues: {} };
      }
      return staticLogos;
    }

    function slugify(n) { return n.toLowerCase().trim().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"") || "unknown"; }
    function isRemote(p) { return /^https?:\/\//i.test(p||""); }
    function basePath(mapped, folder, name) {
      if (mapped && !isRemote(mapped)) return mapped.replace(/\.(png|svg|jpg|jpeg|webp)$/i,"");
      return `assets/logos/${folder}/${slugify(name)}`;
    }

    function findBadge(map, name) {
      if (!map || !name) return null;
      if (map[name] && !isRemote(map[name])) return map[name];
      const norm = normalizeName(name);
      let best = null, bestLen = 0;
      for (const [k,v] of Object.entries(map)) {
        if (isRemote(v)) continue;
        const kn = normalizeName(k);
        if (norm === kn) return v;
        if ((norm.includes(kn) || kn.includes(norm)) && k.length > bestLen) { best = v; bestLen = k.length; }
      }
      return best;
    }

    function resolveTeamLogo(n) { return basePath(staticLogos ? findBadge(staticLogos.teams, n) : null, "teams", n); }
    function resolveLeagueLogo(c) { return basePath(staticLogos ? findBadge(staticLogos.leagues, c) : null, "leagues", c); }
    function resolvePath(p) { return (!p || isRemote(p)) ? null : asset(p); }

    function localCandidates(p) {
      if (!p || isRemote(p)) return [];
      const base = p.replace(/\.(png|svg|jpg|jpeg|webp)$/i,"");
      return [".png",".svg",".jpg",".webp"].map(e => base+e);
    }

    function logoKey(p) { return (p||"").replace(/\.(png|svg|jpg|jpeg|webp)$/i,""); }
    function getCachedLogo(p) {
      if (!p) return null;
      const k = logoKey(p);
      return logoCache[p] || logoCache[k] || logoCache[resolvePath(p)] || logoCache[resolvePath(k)] || null;
    }

    async function tryLoad(p) {
      const src = resolvePath(p);
      if (!src) return null;
      const cached = getCachedLogo(p);
      if (cached) return cached;
      return new Promise(res => {
        const img = new Image();
        img.onload = () => { logoCache[p] = logoCache[logoKey(p)] = img; res(img); };
        img.onerror = () => res(null);
        img.src = src;
      });
    }

    async function loadImage(p) {
      if (!p) return null;
      const cached = getCachedLogo(p);
      if (cached) return cached;
      for (const c of localCandidates(p)) { const img = await tryLoad(c); if (img) return img; }
      return null;
    }

    function logoTag(basePath, alt) {
      const urls = localCandidates(basePath).map(c => resolvePath(c)).filter(Boolean);
      if (!urls.length) return "";
      const list = JSON.stringify(urls);
      return `<img src="${escapeHtml(urls[0])}" alt="${escapeHtml(alt)}" loading="lazy" data-logos='${list.replace(/'/g,"&#39;")}' onerror="(function(el){var u=JSON.parse(el.dataset.logos);var n=+(el.dataset.i||0)+1;el.dataset.i=n;if(n<u.length)el.src=u[n];else el.style.visibility='hidden'})(this)">`;
    }

    function setupBrandLogo() {
      const url = asset(BRAND_LOGO_PATHS[0]);
      ["#brand-logo","#brand-logo-footer"].forEach(sel => {
        const el = $(sel);
        if (el) { el.src = url; el.onerror = () => { el.src = asset(BRAND_LOGO_PATHS[1]); }; }
      });
    }

    async function loadBrandLogo() {
      if (brandLogoImg) return brandLogoImg;
      for (const p of BRAND_LOGO_PATHS) {
        for (const c of localCandidates(p)) {
          const img = await tryLoad(c);
          if (img) { brandLogoImg = img; return img; }
        }
      }
      return null;
    }

    // ── RENDER PREVIEW ────────────────────────────────
    function shortTv(m) {
      const parts = (m.tvFree || []).concat(m.tvPaid || []);
      return parts.length ? parts.join(" · ") : (m.tv || "-");
    }

    function getMatchesForDate(iso) {
      const raw = allSchedules[iso];
      if (Array.isArray(raw)) return raw;
      if (raw && typeof raw === "object") return [raw];
      return [];
    }

    async function renderMatches(iso) {
      selectedDate = iso;
      const matches = getMatchesForDate(iso);
      displayDate.textContent = formatDateID(iso);
      if (!matches.length) {
        matchList.innerHTML = `<div style="text-align:center;padding:20px 8px;color:var(--t-sub);font-size:0.75rem;opacity:0.7">Tidak ada jadwal untuk tanggal ini.</div>`;
        setBtnsDisabled(true);
        return;
      }
      setBtnsDisabled(false);
      await loadStaticLogos();
      matchList.innerHTML = matches.map(m => {
        const tvStr = shortTv(m);
        return `<div class="sim-card">
          ${m.competition ? `<div class="sim-league">${escapeHtml(m.competition)}</div>` : ""}
          <div class="sim-main">
            <span class="sim-time">${escapeHtml(m.kickoff)}<small>WIB</small></span>
            <span class="sim-teams">
              <span class="team-block">${logoTag(resolveTeamLogo(m.home),m.home)}<span class="team-name">${escapeHtml(m.home)}</span></span>
              <span class="vs-label">VS</span>
              <span class="team-block">${logoTag(resolveTeamLogo(m.away),m.away)}<span class="team-name">${escapeHtml(m.away)}</span></span>
            </span>
          </div>
          <span class="sim-tv">📺 ${escapeHtml(tvStr)}</span>
        </div>`;
      }).join("");
      const urls = [...new Set(matches.flatMap(m => [resolveTeamLogo(m.home), resolveTeamLogo(m.away), resolveLeagueLogo(m.competition)]).filter(Boolean))];
      Promise.all(urls.map(loadImage));
    }

    async function fetchSchedule() {
      setStatus("Memuat jadwal...");
      try {
        const res = await fetch(asset("data/jadwal.json"));
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        allSchedules = data.schedules || {};
        await loadStaticLogos();
        const total = Object.values(allSchedules).flat().length;
        setStatus(`✓ ${total} pertandingan dimuat.`, "success");
        renderMatches(selectedDate);
      } catch(e) {
        setStatus("Gagal memuat jadwal. Import HTML atau cek data/jadwal.json.", "error");
      }
    }

    function importHtmlFile(file) {
      const reader = new FileReader();
      reader.onload = async e => {
        try {
          const doc = new DOMParser().parseFromString(e.target.result, "text/html");
          const rows = doc.querySelectorAll("table tr");
          if (!rows.length) throw new Error("Tabel tidak ditemukan.");
          let count = 0;
          rows.forEach(tr => {
            const cells = [...tr.querySelectorAll("td")].map(td => td.textContent.trim());
            if (cells.length < 4) return;
            const [kickoff, matchup, competition, tv] = cells;
            if (/kick-off/i.test(kickoff) || !/vs/i.test(matchup)) return;
            const parts = matchup.split(/\s+vs\s+/i);
            if (!allSchedules[selectedDate]) allSchedules[selectedDate] = [];
            allSchedules[selectedDate].push({ kickoff, matchup, home:(parts[0]||"").trim(), away:(parts[1]||"").trim(), competition, tv, tvFree:[], tvPaid:[] });
            count++;
          });
          await loadStaticLogos();
          setStatus(`✓ Import ${count} pertandingan.`, "success");
          renderMatches(selectedDate);
        } catch(err) {
          setStatus(`Gagal import: ${err.message}`, "error");
        }
      };
      reader.readAsText(file, "UTF-8");
    }

    // ── PNG EXPORT ────────────────────────────────────
    const PNG_W = 1080;
    const PNG_H = 1920;
    const PNG_MAX = 6;

    function drawRR(ctx, x, y, w, h, r, fill, stroke, sw) {
      const rad = Math.min(r, w/2, h/2);
      ctx.beginPath();
      ctx.moveTo(x+rad,y); ctx.lineTo(x+w-rad,y); ctx.quadraticCurveTo(x+w,y,x+w,y+rad);
      ctx.lineTo(x+w,y+h-rad); ctx.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);
      ctx.lineTo(x+rad,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-rad);
      ctx.lineTo(x,y+rad); ctx.quadraticCurveTo(x,y,x+rad,y);
      ctx.closePath();
      if (fill) { ctx.fillStyle=fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=sw||2; ctx.stroke(); }
    }

    function drawBg(ctx, W, H, t) {
      // Base gradient
      const g = ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0, t.bg2||t.bg); g.addColorStop(0.5, t.bg); g.addColorStop(1, t.bg2||t.bg);
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

      if (t.deco==="cyber") {
        ctx.strokeStyle="rgba(34,211,238,0.07)"; ctx.lineWidth=1;
        for(let x=0;x<W;x+=54){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
        for(let y=0;y<H;y+=54){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
        [[0.15,0.12,"rgba(34,211,238,0.35)"],[0.85,0.88,"rgba(232,121,249,0.3)"]].forEach(([px,py,col])=>{
          const rg=ctx.createRadialGradient(px*W,py*H,0,px*W,py*H,380);
          rg.addColorStop(0,col);rg.addColorStop(1,"transparent");
          ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
        });
      } else if (t.deco==="gold") {
        ctx.strokeStyle="rgba(251,191,36,0.07)"; ctx.lineWidth=2;
        for(let i=-H;i<W+H;i+=64){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+H,H);ctx.stroke();}
      } else if (t.deco==="inferno") {
        const rg=ctx.createRadialGradient(W/2,H,80,W/2,H,700);
        rg.addColorStop(0,"rgba(239,68,68,0.4)");rg.addColorStop(1,"transparent");
        ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
      } else if (t.deco==="stadium") {
        ctx.fillStyle="rgba(74,222,128,0.025)";
        for(let i=0;i<24;i++) ctx.fillRect(0,i*(H/24),W,H/48);
      } else if (t.deco==="studio") {
        ctx.fillStyle="rgba(59,130,246,0.05)";
        for(let i=0;i<10;i++) ctx.fillRect(0,i*120,W,60);
      }

      // Top glow
      const gr1=ctx.createRadialGradient(W/2,0,60,W/2,0,750);
      gr1.addColorStop(0,t.glowTop);gr1.addColorStop(1,"transparent");
      ctx.fillStyle=gr1;ctx.fillRect(0,0,W,750);
      // Bottom glow
      const gr2=ctx.createRadialGradient(W/2,H,60,W/2,H,650);
      gr2.addColorStop(0,t.glowBottom);gr2.addColorStop(1,"transparent");
      ctx.fillStyle=gr2;ctx.fillRect(0,H-650,W,650);
    }

    function drawWatermarkBg(ctx, W, H, t) {
      const text = getTiktokWmText();
      if (!text) return;
      ctx.save();
      ctx.translate(W/2, H/2);
      ctx.rotate(-Math.PI/7);
      ctx.fillStyle = t.wm || "rgba(255,255,255,0.03)";
      ctx.font = `900 72px 'Impact', 'Arial Black', sans-serif`;
      ctx.textAlign = "center";
      for(let dy=-500; dy<=500; dy+=160) ctx.fillText(text, 0, dy);
      ctx.restore();
    }

    function drawCircularLogo(ctx, img, cx, cy, r, accent) {
      if (!img) return;
      ctx.save();
      ctx.shadowColor="rgba(0,0,0,0.6)"; ctx.shadowBlur=24;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
      ctx.drawImage(img, cx-r, cy-r, r*2, r*2);
      ctx.restore();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.strokeStyle=accent; ctx.lineWidth=4; ctx.stroke();
      // inner glow ring
      ctx.beginPath(); ctx.arc(cx,cy,r+8,0,Math.PI*2);
      ctx.strokeStyle=accent.replace(")",",0.25)").replace("rgb","rgba"); ctx.lineWidth=3; ctx.stroke();
    }

    function wrapText(ctx, text, maxW, maxLines) {
      const words = text.split(/\s+/);
      const lines = [];
      let line = "";
      for(const w of words) {
        const test = line ? line+" "+w : w;
        if(ctx.measureText(test).width <= maxW) { line=test; }
        else { if(line) lines.push(line); line=w; }
      }
      if(line) lines.push(line);
      return lines.slice(0, maxLines);
    }

    // ── HEADER PNG ────────────────────────────────────
    function drawHeader(ctx, W, t, brandImg) {
      const pad = 32;
      const cx = W/2;
      const barX = pad, barW = W-pad*2;
      let y = 24;

      // Card with gradient
      ctx.save();
      ctx.shadowColor="rgba(0,0,0,0.5)"; ctx.shadowBlur=30; ctx.shadowOffsetY=10;
      const logoSz = brandImg ? 96 : 0;
      const barH = brandImg ? 210 : 130;
      const hg = ctx.createLinearGradient(barX,y,barX+barW,y+barH);
      hg.addColorStop(0, t.cardHi||t.card); hg.addColorStop(1, t.card);
      drawRR(ctx, barX, y, barW, barH, 28, hg, t.accent, 3);
      ctx.restore();

      // Accent border top
      const borderG = ctx.createLinearGradient(barX,y,barX+barW,y);
      borderG.addColorStop(0,"transparent"); borderG.addColorStop(0.5,t.accent); borderG.addColorStop(1,"transparent");
      ctx.strokeStyle=borderG; ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(barX+28,y+2); ctx.lineTo(barX+barW-28,y+2); ctx.stroke();

      let contentY = y + 22;

      if (brandImg) {
        drawCircularLogo(ctx, brandImg, cx, contentY + logoSz/2, logoSz/2, t.accent);
        contentY += logoSz + 18;
      }

      // Title
      ctx.save();
      ctx.shadowColor=t.accentGlow||t.accent; ctx.shadowBlur=28;
      ctx.fillStyle=t.text;
      ctx.font=`900 52px 'Impact', 'Arial Black', sans-serif`;
      ctx.textAlign="center";
      ctx.fillText((inputHeader.value||"JADWAL BOLA").toUpperCase(), cx, contentY + (brandImg?0:20));
      ctx.restore();

      contentY += brandImg ? 46 : 48;

      // Date pill
      const dateStr = formatDateID(selectedDate).toUpperCase();
      ctx.font=`700 30px 'Segoe UI', sans-serif`;
      const dW = Math.min(ctx.measureText(dateStr).width+50, barW-60);
      const pillH = 50;
      drawRR(ctx, cx-dW/2, contentY-4, dW, pillH, 25, t.timeBg||t.bg, t.accent, 1.5);
      ctx.fillStyle=t.sub;
      ctx.textAlign="center";
      ctx.fillText(dateStr, cx, contentY+30);

      return y + barH + 20;
    }

    // ── MATCH ROW PNG ─────────────────────────────────
    function drawMatchRow(ctx, m, y, rowH, idx, t) {
      const padH = 22;
      const cardX = padH, cardW = PNG_W - padH*2;
      const tvBarH = 52;
      const leagueH = m.competition ? 30 : 0;
      const bodyTop = y + 14 + leagueH;
      const mainH = rowH - tvBarH - 18 - leagueH;
      const accentColor = t.borders ? t.borders[idx % t.borders.length] : t.accent;

      // Card shadow & bg
      ctx.save();
      ctx.shadowColor="rgba(0,0,0,0.55)"; ctx.shadowBlur=28; ctx.shadowOffsetY=12;
      const cg = ctx.createLinearGradient(cardX,y,cardX+cardW,y+rowH);
      cg.addColorStop(0, t.cardHi||t.card); cg.addColorStop(1, t.card);
      drawRR(ctx, cardX, y, cardW, rowH, 24, cg, accentColor, 2);
      ctx.restore();

      // Left accent bar
      ctx.fillStyle = accentColor;
      const barRad = 4;
      ctx.beginPath();
      ctx.moveTo(cardX+barRad, y+12); ctx.lineTo(cardX+8-barRad, y+12);
      ctx.quadraticCurveTo(cardX+8, y+12, cardX+8, y+12+barRad);
      ctx.lineTo(cardX+8, y+rowH-12-barRad);
      ctx.quadraticCurveTo(cardX+8, y+rowH-12, cardX+8-barRad, y+rowH-12);
      ctx.lineTo(cardX+barRad, y+rowH-12);
      ctx.quadraticCurveTo(cardX, y+rowH-12, cardX, y+rowH-12-barRad);
      ctx.lineTo(cardX, y+12+barRad);
      ctx.quadraticCurveTo(cardX, y+12, cardX+barRad, y+12);
      ctx.closePath();
      ctx.fill();

      // League label
      if (m.competition) {
        ctx.font=`700 20px 'Segoe UI', sans-serif`;
        ctx.fillStyle=t.sub;
        ctx.textAlign="center";
        ctx.fillText(m.competition.toUpperCase().slice(0,42), cardX+cardW/2, y+28);
      }

      // Time box
      const timeW = 110, timeX = cardX+18;
      const timeBoxH = Math.min(100, mainH-10);
      const timeY = bodyTop + (mainH-timeBoxH)/2;
      ctx.save();
      ctx.shadowColor=accentColor; ctx.shadowBlur=18;
      drawRR(ctx, timeX, timeY, timeW, timeBoxH, 18, t.timeBg||t.bg, accentColor, 2.5);
      ctx.restore();
      ctx.fillStyle=accentColor;
      ctx.font=`900 38px 'Impact', 'Arial Black', sans-serif`;
      ctx.textAlign="center";
      ctx.fillText(m.kickoff, timeX+timeW/2, timeY+timeBoxH*0.5);
      ctx.fillStyle=t.sub;
      ctx.font=`700 18px 'Segoe UI', sans-serif`;
      ctx.fillText("WIB", timeX+timeW/2, timeY+timeBoxH*0.76);

      // Teams area
      const contentX = cardX + timeW + 24;
      const contentW = cardW - timeW - 38;
      const vsBadgeR = 28;
      const colW = (contentW - vsBadgeR*2 - 16) / 2;
      const homeCx = contentX + colW/2;
      const awayCx = contentX + contentW - colW/2;
      const midX = contentX + contentW/2;
      const logoSz = Math.min(72, Math.max(54, Math.floor(mainH*0.48)));
      const teamTop = bodyTop + 6;

      // Team logos + names
      const hImg = getCachedLogo(resolveTeamLogo(m.home));
      const aImg = getCachedLogo(resolveTeamLogo(m.away));

      [{ img:hImg, name:m.home, cx:homeCx }, { img:aImg, name:m.away, cx:awayCx }].forEach(({img,name,cx}) => {
        if (img) {
          ctx.save();
          ctx.shadowColor="rgba(0,0,0,0.4)"; ctx.shadowBlur=10;
          ctx.drawImage(img, cx-logoSz/2, teamTop, logoSz, logoSz);
          ctx.restore();
        } else {
          // Placeholder circle
          ctx.beginPath(); ctx.arc(cx, teamTop+logoSz/2, logoSz/2, 0, Math.PI*2);
          ctx.fillStyle=t.timeBg||t.bg; ctx.fill();
          ctx.strokeStyle=t.border; ctx.lineWidth=1.5; ctx.stroke();
        }
        const nameY = teamTop + logoSz + 12;
        ctx.font=`700 ${Math.max(18,Math.min(24,Math.round(colW/7)))}px 'Segoe UI', sans-serif`;
        ctx.fillStyle=t.text; ctx.textAlign="center";
        const lines = wrapText(ctx, name, colW-6, 2);
        lines.forEach((ln,i) => ctx.fillText(ln, cx, nameY + i*26));
      });

      // VS badge
      const vsCY = teamTop + logoSz/2 + 8;
      ctx.save();
      ctx.shadowColor=accentColor; ctx.shadowBlur=20;
      ctx.beginPath(); ctx.arc(midX, vsCY, vsBadgeR, 0, Math.PI*2);
      ctx.fillStyle=accentColor; ctx.fill();
      ctx.restore();
      ctx.fillStyle="#fff";
      ctx.font=`900 20px 'Impact', 'Arial Black', sans-serif`;
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText("VS", midX, vsCY+1);
      ctx.textBaseline="alphabetic";

      // TV bar
      const tvBarY = y + rowH - tvBarH - 10;
      const tvBarX = cardX + 18, tvBarW = cardW - 36;
      const tvBg = ctx.createLinearGradient(tvBarX, tvBarY, tvBarX+tvBarW, tvBarY);
      tvBg.addColorStop(0,"rgba(0,0,0,0.5)"); tvBg.addColorStop(1,"rgba(0,0,0,0.6)");
      drawRR(ctx, tvBarX, tvBarY, tvBarW, tvBarH, tvBarH/2, tvBg, accentColor, 1.5);
      ctx.fillStyle = (m.tvFree||[]).length ? t.tvFree||"#4ade80" : t.tv||"#fbbf24";
      ctx.font=`700 26px 'Segoe UI', sans-serif`;
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText("📺  " + shortTv(m), tvBarX+tvBarW/2, tvBarY+tvBarH/2+1);
      ctx.textBaseline="alphabetic";
    }

    // ── FOOTER PNG ────────────────────────────────────
    function drawFooter(ctx, W, H, footerY, t, brandImg) {
      const footH = H - footerY;
      const footG = ctx.createLinearGradient(0,footerY,0,H);
      footG.addColorStop(0, t.footerBg); footG.addColorStop(1,"#000");
      ctx.fillStyle=footG; ctx.fillRect(0,footerY,W,footH);

      // Divider line
      const lineG = ctx.createLinearGradient(0,footerY,W,footerY);
      lineG.addColorStop(0,"transparent"); lineG.addColorStop(0.5,t.accent); lineG.addColorStop(1,"transparent");
      ctx.strokeStyle=lineG; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(50,footerY+1); ctx.lineTo(W-50,footerY+1); ctx.stroke();

      const cx = W/2;
      let fy = footerY + 20;

      if (brandImg) {
        drawCircularLogo(ctx, brandImg, cx, fy+36, 36, t.accent);
        fy += 88;
      } else {
        fy += 20;
      }

      // Footer text
      ctx.fillStyle=t.sub;
      ctx.font=`700 28px 'Segoe UI', sans-serif`;
      ctx.textAlign="center";
      const footLines = wrapText(ctx, inputFooter.value||"", W-80, 2);
      footLines.forEach((ln,i) => ctx.fillText(ln, cx, fy + i*34));
    }

    // ── DOWNLOAD ──────────────────────────────────────
    async function downloadPNG() {
      const matches = getMatchesForDate(selectedDate);
      if (!matches.length) return;
      setBtnsDisabled(true);
      setStatus("Memuat logo...");

      try {
        await loadStaticLogos();
        const t = getTheme();
        const data = matches.slice(0, PNG_MAX);
        const urls = [...new Set(data.flatMap(m=>[resolveTeamLogo(m.home),resolveTeamLogo(m.away),resolveLeagueLogo(m.competition)]).filter(Boolean))];
        await Promise.all(urls.map(loadImage));
        const brandImg = await loadBrandLogo();

        const W=PNG_W, H=PNG_H;
        const canvas=document.createElement("canvas");
        canvas.width=W; canvas.height=H;
        const ctx=canvas.getContext("2d");
        ctx.textBaseline="alphabetic";

        // Draw background
        drawBg(ctx, W, H, t);
        drawWatermarkBg(ctx, W, H, t);

        // Header
        const headerEnd = drawHeader(ctx, W, t, brandImg);

        // Match rows
        const footerH = brandImg ? 120 : 95;
        const listTop = headerEnd;
        const listBottom = H - footerH;
        const n = data.length;
        const gap = 16;
        let rowH = Math.floor((listBottom - listTop - gap*(n-1)) / n);
        rowH = Math.min(290, Math.max(155, rowH));
        // Adjust to fit
        while(n>0 && listTop + n*rowH + (n-1)*gap > listBottom) rowH--;

        data.forEach((m,i) => {
          drawMatchRow(ctx, m, listTop + i*(rowH+gap), rowH, i, t);
        });

        // Footer
        drawFooter(ctx, W, H, listBottom, t, brandImg);

        // Download
        const link=document.createElement("a");
        link.download=`jadwal-${currentTheme}-${selectedDate}.png`;
        link.href=canvas.toDataURL("image/png");
        link.click();

        const loaded = urls.filter(u=>getCachedLogo(u)).length;
        setStatus(`✓ PNG "${t.name}": ${data.length} match · logo ${loaded}/${urls.length}`, "success");
      } catch(err) {
        setStatus(`Gagal: ${err.message}`, "error");
        console.error(err);
      } finally {
        setBtnsDisabled(false);
      }
    }

    function setStatus(msg, cls="") {
      statusEl.className = "status" + (cls?" "+cls:"");
      statusEl.textContent = msg;
    }

    // ── EVENT LISTENERS ───────────────────────────────
    $("#btn-refresh").addEventListener("click", fetchSchedule);
    btnDlDesk.addEventListener("click", downloadPNG);
    btnDlMob.addEventListener("click", downloadPNG);
    $("#btn-today").addEventListener("click", () => setSelectedDate(todayISO()));
    datePicker.addEventListener("change", e => setSelectedDate(e.target.value));
    $("#file-import").addEventListener("change", e => {
      const f=e.target.files[0];
      if(f) importHtmlFile(f);
      e.target.value="";
    });

    // ── INIT ──────────────────────────────────────────
    loadSettings();
    setupBrandLogo();
    datePicker.value = selectedDate;
    $("#view-header").textContent = inputHeader.value.toUpperCase();
    $("#view-footer").textContent = inputFooter.value;
    buildThemePicker();
    applyThemePreview(currentTheme);
    updateBgWatermark();
    fetchSchedule();
  </script>
</body>
