<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Oswald:wght@600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #0d1117;
      --panel-bg: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --text: #e6edf3;
      --muted: #8b949e;
      --danger: #f85149;
      --warn: #d29922;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #010409;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LAYOUT ── */
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      max-height: 100vh;
      position: sticky;
      top: 0;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .logo-row img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; }
    .logo-row .brand { font-family: 'Oswald', sans-serif; font-size: 1.1rem; color: #fff; letter-spacing: 1px; }
    .logo-row .brand span { color: var(--accent2); }

    .section-title {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 0.72rem; color: var(--muted); font-weight: 600; }
    .field input, .field select {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 0.84rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    input[type="date"] { color-scheme: dark; }
    input[type="file"] { display: none; }

    /* ── THEME PICKER ── */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .theme-btn {
      cursor: pointer;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 8px 4px 6px;
      background: var(--panel-bg);
      transition: border-color 0.2s, transform 0.15s;
      text-align: center;
    }
    .theme-btn:hover { transform: translateY(-2px); border-color: #484f58; }
    .theme-btn.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent)44; }
    .theme-swatch { height: 22px; border-radius: 5px; margin-bottom: 5px; }
    .theme-btn span { font-size: 0.65rem; font-weight: 700; color: var(--muted); display: block; }

    /* ── BUTTONS ── */
    .btn {
      cursor: pointer; border: none; border-radius: 8px;
      padding: 10px 14px; font-size: 0.84rem; font-weight: 700;
      font-family: inherit; transition: opacity 0.2s, transform 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .btn-green { background: linear-gradient(135deg,#238636,#2ea043); color: #fff; }
    .btn-blue  { background: linear-gradient(135deg,#1f6feb,#388bfd); color: #fff; }
    .btn-purple{ background: linear-gradient(135deg,#6e40c9,#a371f7); color: #fff; }
    .btn-ghost { background: var(--panel-bg); color: var(--text); border: 1px solid var(--border); }
    .btn-warn  { background: #21262d; color: var(--muted); border: 1px solid var(--border); font-size: 0.78rem; }
    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }
    .btn-full { width: 100%; }

    .status-bar {
      font-size: 0.78rem; font-weight: 600; padding: 8px 10px;

    /* ── EXPORT TYPE TABS ── */
    .export-tabs {
      display: flex; gap: 6px; background: var(--panel-bg);
      border: 1px solid var(--border); border-radius: 10px; padding: 4px;
    }
    .export-tab {
      flex: 1; cursor: pointer; border: none; border-radius: 7px;

      font-family: inherit; background: transparent; color: var(--muted);
      transition: background 0.2s, color 0.2s;
    }
    .export-tab.active { background: var(--accent); color: #fff; }

    /* ── MAIN CONTENT ── */
    .main {
      display: flex;
      flex-direction: column;
      background: #0d1117;
      min-height: 100vh;
    }

    .topbar {

    .match-count-badge {

      padding: 3px 10px; font-size: 0.72rem; font-weight: 700;
    }

    /* ── PREVIEW CANVAS AREA ── */
    .preview-wrap {
      flex: 1; display: flex; align-items: flex-start; justify-content: center;
      padding: 24px; gap: 24px; flex-wrap: wrap;
    }

    .canvas-frame {
      position: relative;
      width: 270px;
      flex-shrink: 0;
    }
    .canvas-frame canvas {
      width: 100%; border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      display: block;
    }
    .canvas-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-top: 10px;
    }
    .canvas-nav button {
      background: var(--panel-bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 6px 14px;
      cursor: pointer; font-size: 0.8rem; font-weight: 700;
      font-family: inherit; transition: background 0.2s;
    }
    .canvas-nav button:hover { background: #21262d; }
    .canvas-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
    .canvas-nav .page-info { font-size: 0.78rem; color: var(--muted); font-weight: 600; min-width: 60px; text-align: center; }

    /* ── MATCH LIST PANEL ── */
    .match-panel {
      flex: 1; min-width: 280px; max-width: 480px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .match-panel-title {
      font-size: 0.72rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .match-item {
      background: var(--panel-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
      font-size: 0.8rem; cursor: pointer; transition: border-color 0.2s;

    .match-item:hover { border-color: #484f58; }
    .match-item.active { border-color: var(--accent); background: var(--accent)0d; }
    .match-item .mi-time {

    .match-item .mi-tv { font-size: 0.68rem; color: var(--warn); font-weight: 600; }
    .match-item .mi-logo { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }

// ═══════════════════════════════════════════════════════

const BULAN = ["","Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
const HARI  = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
const W = 1080, H = 1920;
const FREE_KW = ["sctv","indosiar","rcti","mnctv","gtv","antv","tvone","tv one","kompas tv","inews","tvri","trans tv","trans7","trans 7","metro tv","net tv","net."];

let allSchedules = {};
let selectedDate  = todayISO();
let staticLogos   = null;
let logoCache     = {};
let currentTheme  = "dark";
let exportType    = "png";
let previewPage   = 0;   // halaman yang sedang ditampilkan di preview
let allMatches    = [];  // semua match untuk tanggal terpilih

const $ = s => document.querySelector(s);
const inpHeader  = $("#inp-header");
const inpTiktok  = $("#inp-tiktok");
const inpFooter  = $("#inp-footer");
const datePicker = $("#date-picker");
const statusEl   = $("#status");
const matchList  = $("#match-list");
const previewCanvas = $("#preview-canvas");
const ctx        = previewCanvas.getContext("2d");
const btnDlPng   = $("#btn-dl-png");
const btnDlVideo = $("#btn-dl-video");
const navPrev    = $("#nav-prev");
const navNext    = $("#nav-next");
const pageInfo   = $("#page-info");

// ═══════════════════════════════════════════════════════
//  THEMES — 6 tema baru yang lebih premium
// ═══════════════════════════════════════════════════════
const THEMES = {
  dark: {

    bg:"#0d1117", bg2:"#161b22", card:"#161b22", cardBorder:"#30363d",

    bg:"#0c0804", bg2:"#1a1408", card:"#1a1408", cardBorder:"#5a4010",
    accent:"#ffd700", accent2:"#ffa500", accentGlow:"rgba(255,215,0,0.55)",
    text:"#fffbf0", sub:"#c8a060", tv:"#ffd700", tvFree:"#90ee90",

    bg:"#0a0515", bg2:"#130a25", card:"#130a25", cardBorder:"#2d1b55",
    accent:"#a371f7", accent2:"#79c0ff", accentGlow:"rgba(163,113,247,0.55)",
    text:"#f0e8ff", sub:"#9070c0", tv:"#f0883e", tvFree:"#56d364",

    accent:"#00c853", accent2:"#69f0ae", accentGlow:"rgba(0,200,83,0.55)",
    text:"#f0fff4", sub:"#60a878", tv:"#ffd740", tvFree:"#69f0ae",
    time:"#00c853", timeBg:"#061208", footer:"#030804",
    borderLeft:["#00c853","#69f0ae","#ffd740","#40c4ff","#ff6e40"],
  },
};

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function todayISO() {
  return new Date().toLocaleDateString("en-CA", { timeZone: "Asia/Jakarta" });
}
function formatDateID(iso) {
  if (!iso) return "—";
  const [y,m,d] = iso.split("-").map(Number);
  return `${HARI[new Date(y,m-1,d).getDay()]}, ${d} ${BULAN[m]} ${y}`;
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function slug(n) {
  return n.toLowerCase().trim().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
}
function normName(n) {
  return n.toLowerCase().trim().replace(/[^a-z0-9]+/g," ").trim();
}
function isRemote(p) { return /^https?:\/\//i.test(p||""); }
function getBase() {
  const p = location.pathname;
  if (p.endsWith("/")) return p;
  const i = p.lastIndexOf("/");
  return i > 0 ? p.slice(0,i+1) : "/";
}
const BASE = getBase();
function asset(p) { return BASE + p.replace(/^\//,""); }

function shortTv(m) {
  const raw = (m.tv||"").trim();
  if (raw && raw !== "-" && raw !== "TBC") return raw;
  return [...(m.tvFree||[]),...(m.tvPaid||[])].join(" · ") || "-";
}
function isFreeTV(m) {
  if ((m.tvFree||[]).length) return true;
  return FREE_KW.some(k => shortTv(m).toLowerCase().includes(k));
}
function getTheme() { return THEMES[currentTheme] || THEMES.dark; }
function perPage() { return parseInt($("#sel-perpage").value) || 5; }

// ═══════════════════════════════════════════════════════
//  LOGO LOADING
// ═══════════════════════════════════════════════════════
async function loadStaticLogos() {
  if (staticLogos) return staticLogos;
  try {
    const r = await fetch(asset("logos.json?v=4"));
    if (!r.ok) throw new Error();
    staticLogos = await r.json();
  } catch { staticLogos = { teams:{}, leagues:{} }; }
  return staticLogos;
}

function findBadge(map, name) {
  if (!map||!name) return null;
  if (map[name] && !isRemote(map[name])) return map[name];
  const norm = normName(name);
  let best = null, bestLen = 0;
  for (const [k,v] of Object.entries(map)) {
    if (isRemote(v)) continue;
    const kn = normName(k);
    if (norm===kn) return v;
    if ((norm.includes(kn)||kn.includes(norm)) && k.length>bestLen) { best=v; bestLen=k.length; }
  }
  return best;
}

function resolveTeamLogo(name) {
  const mapped = staticLogos ? findBadge(staticLogos.teams, name) : null;
  const base = mapped && !isRemote(mapped) ? mapped.replace(/\.(png|svg|jpg|webp)$/i,"")
                                           : `assets/logos/teams/${slug(name)}`;
  return base;
}
function resolveLeagueLogo(comp) {
  const mapped = staticLogos ? findBadge(staticLogos.leagues, comp) : null;
  const base = mapped && !isRemote(mapped) ? mapped.replace(/\.(png|svg|jpg|webp)$/i,"")
                                           : `assets/logos/leagues/${slug(comp)}`;
  return base;
}

function tryLoad(path) {
  const src = asset(path);
  const cached = logoCache[src];
  if (cached) return Promise.resolve(cached);
  return new Promise(res => {
    const img = new Image();
    img.onload = () => { logoCache[src]=img; res(img); };
    img.onerror = () => res(null);
    img.src = src;
  });
}
async function loadLogo(basePath) {
  if (!basePath) return null;
  const cached = logoCache[basePath];
  if (cached) return cached;
  for (const ext of [".png",".svg",".jpg",".webp"]) {
    const img = await tryLoad(basePath+ext);
    if (img) { logoCache[basePath]=img; return img; }
  }
  return null;
}
async function preloadMatchLogos(matches) {
  const paths = [...new Set(matches.flatMap(m=>[resolveTeamLogo(m.home),resolveTeamLogo(m.away),resolveLeagueLogo(m.competition)]).filter(Boolean))];
  await Promise.all(paths.map(loadLogo));
}
function getCached(basePath) {
  if (!basePath) return null;
  if (logoCache[basePath]) return logoCache[basePath];
  for (const ext of [".png",".svg",".jpg",".webp"]) {
    if (logoCache[asset(basePath+ext)]) return logoCache[asset(basePath+ext)];
  }
  return null;
}

// ═══════════════════════════════════════════════════════
//  CANVAS DRAWING — BACKGROUND
// ═══════════════════════════════════════════════════════
function drawBg(ctx, t) {
  // Gradient background
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, t.bg2);
  g.addColorStop(0.5, t.bg);
  g.addColorStop(1, t.bg2);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  // Glow top
  const gt = ctx.createRadialGradient(W/2,0,0,W/2,0,600);
  gt.addColorStop(0, t.accentGlow.replace("0.5","0.18").replace("0.6","0.18").replace("0.55","0.18"));
  gt.addColorStop(1,"transparent");
  ctx.fillStyle = gt;
  ctx.fillRect(0,0,W,700);

  // Glow bottom
  const gb = ctx.createRadialGradient(W/2,H,0,W/2,H,500);
  gb.addColorStop(0, t.accentGlow.replace("0.5","0.12").replace("0.6","0.12").replace("0.55","0.12"));
  gb.addColorStop(1,"transparent");
  ctx.fillStyle = gb;
  ctx.fillRect(0,H-500,W,500);

  // Subtle grid lines
  ctx.strokeStyle = t.accent + "0a";
  ctx.lineWidth = 1;
  for (let x=0; x<W; x+=108) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<H; y+=108) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Watermark diagonal text
  const wm = (inpTiktok.value||"").trim().replace(/^@+/,"");
  if (wm) {
    ctx.save();
    ctx.translate(W/2,H/2);
    ctx.rotate(-Math.PI/6);
    ctx.font = "900 72px 'Oswald','Segoe UI',sans-serif";
    ctx.fillStyle = t.accent + "08";
    ctx.textAlign = "center";
    for (let dy=-500; dy<=500; dy+=200) ctx.fillText("@"+wm.toUpperCase(), 0, dy);
    ctx.restore();
  }
}

function roundRect(ctx, x,y,w,h,r, fill, stroke, sw) {
  const rad = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+rad,y); ctx.lineTo(x+w-rad,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+rad);
  ctx.lineTo(x+w,y+h-rad);
  ctx.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);
  ctx.lineTo(x+rad,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-rad);
  ctx.lineTo(x,y+rad);
  ctx.quadraticCurveTo(x,y,x+rad,y);
  ctx.closePath();
  if (fill) { ctx.fillStyle=fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=sw||2; ctx.stroke(); }
}

function drawCircleImg(ctx, img, cx,cy,r, borderColor) {
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.6)";
  ctx.shadowBlur = 20;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
  ctx.drawImage(img, cx-r, cy-r, r*2, r*2);
  ctx.restore();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle = borderColor; ctx.lineWidth = 3; ctx.stroke();
}

function wrapText(ctx, text, maxW, maxLines) {
  const words = text.split(/\s+/);
  const lines = []; let line = "";
  for (const w of words) {
    const test = line ? line+" "+w : w;
    if (ctx.measureText(test).width <= maxW) { line=test; }
    else { if (line) lines.push(line); line=w; }
  }
  if (line) lines.push(line);
  return lines.slice(0, maxLines);
}

// ═══════════════════════════════════════════════════════
//  CANVAS DRAWING — HEADER
// ═══════════════════════════════════════════════════════
async function loadBrandLogo() {
  for (const p of ["assets/branding/CORNERKIICK.png","CORNERKIICK.png"]) {
    const img = await tryLoad(p);
    if (img) return img;
  }
  return null;
}

function drawHeader(ctx, t, brandImg, pageNum, totalPages) {
  const pad = 32;
  const cx = W/2;
  let y = 28;

  // Header card
  const hh = brandImg ? 210 : 140;
  const hg = ctx.createLinearGradient(pad,y,pad+W-pad*2,y+hh);
  hg.addColorStop(0, t.card+"ee");
  hg.addColorStop(1, t.bg2+"cc");
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.5)";
  ctx.shadowBlur = 30; ctx.shadowOffsetY = 8;
  roundRect(ctx, pad, y, W-pad*2, hh, 28, hg, t.accent, 2);
  ctx.restore();

  // Accent top bar
  const barG = ctx.createLinearGradient(pad,y,pad+W-pad*2,y);
  barG.addColorStop(0,"transparent");
  barG.addColorStop(0.5,t.accent);
  barG.addColorStop(1,"transparent");
  ctx.fillStyle = barG;
  ctx.fillRect(pad+28, y, W-pad*2-56, 3);

  y += 18;

  // Brand logo
  if (brandImg) {
    drawCircleImg(ctx, brandImg, cx, y+44, 44, t.accent);
    y += 100;
  } else { y += 14; }

  // Title
  ctx.save();
  ctx.shadowColor = t.accentGlow;
  ctx.shadowBlur = 24;
  ctx.fillStyle = t.text;
  ctx.font = `900 52px 'Oswald','Segoe UI',sans-serif`;
  ctx.textAlign = "center";
  ctx.fillText((inpHeader.value||"JADWAL BOLA").toUpperCase(), cx, y);
  ctx.restore();
  y += 14;

  // Date pill
  const dateStr = formatDateID(selectedDate).toUpperCase();
  ctx.font = "700 30px 'Inter','Segoe UI',sans-serif";
  const dw = ctx.measureText(dateStr).width;
  const pw = dw+48, ph = 44;
  roundRect(ctx, cx-pw/2, y, pw, ph, 22, t.timeBg+"cc", t.accent+"88", 1.5);
  ctx.fillStyle = t.sub;
  ctx.textAlign = "center";
  ctx.fillText(dateStr, cx, y+30);
  y += ph;

  // Page indicator
  if (totalPages > 1) {
    y += 8;
    ctx.font = "600 22px 'Inter','Segoe UI',sans-serif";
    ctx.fillStyle = t.sub;
    ctx.fillText(`HALAMAN ${pageNum} / ${totalPages}`, cx, y+20);
    y += 28;
  }

  return 28 + hh + 16;
}

// ═══════════════════════════════════════════════════════
//  CANVAS DRAWING — MATCH CARD (multi-match per page)
// ═══════════════════════════════════════════════════════
function drawMatchCard(ctx, m, x, y, cardW, cardH, t, colorIdx) {
  const borderColor = t.borderLeft[colorIdx % t.borderLeft.length];
  const pad = 20;

  // Card shadow + bg
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.55)";
  ctx.shadowBlur = 24; ctx.shadowOffsetY = 10;
  const cg = ctx.createLinearGradient(x,y,x+cardW,y+cardH);
  cg.addColorStop(0, t.card+"f5");
  cg.addColorStop(1, t.bg2+"e0");
  roundRect(ctx, x, y, cardW, cardH, 22, cg, t.cardBorder, 1.5);
  ctx.restore();

  // Left accent bar
  ctx.fillStyle = borderColor;
  roundRect(ctx, x, y+12, 6, cardH-24, 3, borderColor);

  // League name
  let iy = y + 14;
  if (m.competition) {
    ctx.font = "700 20px 'Inter','Segoe UI',sans-serif";
    ctx.fillStyle = t.sub;
    ctx.textAlign = "center";
    ctx.fillText(m.competition.toUpperCase(), x+cardW/2, iy+16);
    iy += 28;
  }

  // Time box
  const timeW = 100, timeH = Math.min(90, cardH - (m.competition?60:40));
  const timeX = x+pad+8, timeY = iy + (cardH - (m.competition?28:0) - timeH - 52)/2;
  roundRect(ctx, timeX, timeY, timeW, timeH, 14, t.timeBg+"cc", borderColor, 2);
  ctx.save();
  ctx.shadowColor = borderColor; ctx.shadowBlur = 12;
  ctx.fillStyle = borderColor;
  ctx.font = `900 ${Math.min(36,timeH*0.42)}px 'Oswald','Segoe UI',sans-serif`;
  ctx.textAlign = "center";
  ctx.fillText(m.kickoff, timeX+timeW/2, timeY+timeH*0.52);
  ctx.restore();
  ctx.fillStyle = t.sub;
  ctx.font = "700 16px 'Inter','Segoe UI',sans-serif";
  ctx.fillText("WIB", timeX+timeW/2, timeY+timeH*0.78);

  // Teams area
  const teamsX = x+pad+timeW+18;
  const teamsW = cardW - pad - timeW - 28;
  const vsSlot = 60;
  const colW = (teamsW - vsSlot) / 2;
  const homeCx = teamsX + colW/2;
  const awayCx = teamsX + teamsW - colW/2;
  const midX   = teamsX + teamsW/2;
  const logoSz = Math.min(64, Math.max(48, Math.floor((cardH - (m.competition?40:20) - 60) * 0.55)));
  const teamTopY = iy + (cardH - (m.competition?28:0) - logoSz - 50) / 2;

  // Home logo + name
  const hImg = getCached(resolveTeamLogo(m.home));
  if (hImg) ctx.drawImage(hImg, homeCx-logoSz/2, teamTopY, logoSz, logoSz);
  else {
    roundRect(ctx, homeCx-logoSz/2, teamTopY, logoSz, logoSz, 8, t.card, t.cardBorder, 1);
    ctx.fillStyle = t.sub; ctx.font = "700 18px sans-serif"; ctx.textAlign="center";
    ctx.fillText("?", homeCx, teamTopY+logoSz/2+7);
  }
  ctx.fillStyle = t.text;
  ctx.font = `700 ${Math.max(18,Math.min(24,Math.floor(colW/5)))}px 'Inter','Segoe UI',sans-serif`;
  ctx.textAlign = "center";
  const hLines = wrapText(ctx, m.home, colW-8, 2);
  hLines.forEach((ln,i) => ctx.fillText(ln, homeCx, teamTopY+logoSz+22+i*24));

  // Away logo + name
  const aImg = getCached(resolveTeamLogo(m.away));
  if (aImg) ctx.drawImage(aImg, awayCx-logoSz/2, teamTopY, logoSz, logoSz);
  else {
    roundRect(ctx, awayCx-logoSz/2, teamTopY, logoSz, logoSz, 8, t.card, t.cardBorder, 1);
    ctx.fillStyle = t.sub; ctx.font = "700 18px sans-serif"; ctx.textAlign="center";
    ctx.fillText("?", awayCx, teamTopY+logoSz/2+7);
  }
  ctx.fillStyle = t.text;
  ctx.font = `700 ${Math.max(18,Math.min(24,Math.floor(colW/5)))}px 'Inter','Segoe UI',sans-serif`;
  ctx.textAlign = "center";
  const aLines = wrapText(ctx, m.away, colW-8, 2);
  aLines.forEach((ln,i) => ctx.fillText(ln, awayCx, teamTopY+logoSz+22+i*24));

  // VS badge
  const vsCy = teamTopY + logoSz/2;
  ctx.save();
  ctx.shadowColor = borderColor; ctx.shadowBlur = 18;
  ctx.beginPath(); ctx.arc(midX, vsCy, 28, 0, Math.PI*2);
  ctx.fillStyle = borderColor; ctx.fill();
  ctx.restore();
  ctx.fillStyle = t.bg;
  ctx.font = "900 20px 'Oswald','Segoe UI',sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("VS", midX, vsCy+1);
  ctx.textBaseline = "alphabetic";

  // TV bar
  const tvStr = shortTv(m);
  const tvY = y + cardH - 46;
  const tvX = x + pad + timeW + 14;
  const tvW = cardW - pad - timeW - 24;
  const tvColor = isFreeTV(m) ? t.tvFree : t.tv;
  roundRect(ctx, tvX, tvY, tvW, 36, 18, "rgba(0,0,0,0.4)", tvColor+"66", 1);
  ctx.fillStyle = tvColor;
  ctx.font = "700 22px 'Inter','Segoe UI',sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const tvLines = wrapText(ctx, "📺  "+tvStr, tvW-20, 1);
  ctx.fillText(tvLines[0]||tvStr, tvX+tvW/2, tvY+18);
  ctx.textBaseline = "alphabetic";
}

// ═══════════════════════════════════════════════════════
//  CANVAS DRAWING — FOOTER
// ═══════════════════════════════════════════════════════
function drawFooter(ctx, t, brandImg, footerY) {
  // Footer bg
  const fg = ctx.createLinearGradient(0,footerY,0,H);
  fg.addColorStop(0, t.footer+"ee");
  fg.addColorStop(1, "#000");
  ctx.fillStyle = fg;
  ctx.fillRect(0, footerY, W, H-footerY);

  // Accent line
  const al = ctx.createLinearGradient(0,footerY,W,footerY);
  al.addColorStop(0,"transparent"); al.addColorStop(0.5,t.accent); al.addColorStop(1,"transparent");
  ctx.strokeStyle = al; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(40,footerY); ctx.lineTo(W-40,footerY); ctx.stroke();

  let fy = footerY + 18;
  if (brandImg) {
    drawCircleImg(ctx, brandImg, W/2, fy+32, 32, t.accent);
    fy += 76;
  } else { fy += 20; }

  ctx.fillStyle = t.sub;
  ctx.font = "600 26px 'Inter','Segoe UI',sans-serif";
  ctx.textAlign = "center";
  const fLines = wrapText(ctx, inpFooter.value||"", W-80, 2);
  fLines.forEach((ln,i) => ctx.fillText(ln, W/2, fy+i*32));
}

// ═══════════════════════════════════════════════════════
//  RENDER PAGE (multi-match layout)
// ═══════════════════════════════════════════════════════
async function renderPage(targetCtx, pageMatches, pageNum, totalPages) {
  const t = getTheme();
  const n = pageMatches.length;
  const pad = 28;
  const gap = 14;
  const footerH = 110;

  targetCtx.clearRect(0,0,W,H);
  drawBg(targetCtx, t);

  const brandImg = await loadBrandLogo();
  const headerEnd = drawHeader(targetCtx, t, brandImg, pageNum, totalPages);

  const listTop = headerEnd;
  const listBottom = H - footerH;
  const avail = listBottom - listTop - gap*(n-1);
  let cardH = Math.floor(avail / n);
  cardH = Math.min(310, Math.max(160, cardH));

  // Recalculate to fit
  while (n > 0 && listTop + n*cardH + (n-1)*gap > listBottom) cardH--;

  const cardW = W - pad*2;
  for (let i=0; i<n; i++) {
    const cy = listTop + i*(cardH+gap);
    drawMatchCard(targetCtx, pageMatches[i], pad, cy, cardW, cardH, t, i);
  }

  drawFooter(targetCtx, t, brandImg, listBottom);
}

// ═══════════════════════════════════════════════════════
//  PREVIEW
// ═══════════════════════════════════════════════════════
function getPages() {
  const pp = perPage();
  const pages = [];
  for (let i=0; i<allMatches.length; i+=pp) pages.push(allMatches.slice(i,i+pp));
  return pages;
}

async function updatePreview() {
  const pages = getPages();
  if (!pages.length) {
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = "#0d1117";
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = "#30363d";
    ctx.font = "700 40px 'Inter',sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("Tidak ada jadwal", W/2, H/2);
    pageInfo.textContent = "— / —";
    navPrev.disabled = navNext.disabled = true;
    return;
  }
  if (previewPage >= pages.length) previewPage = pages.length-1;
  if (previewPage < 0) previewPage = 0;

  pageInfo.textContent = `${previewPage+1} / ${pages.length}`;
  navPrev.disabled = previewPage === 0;
  navNext.disabled = previewPage === pages.length-1;

  await renderPage(ctx, pages[previewPage], previewPage+1, pages.length);
}

// ═══════════════════════════════════════════════════════
//  MATCH LIST SIDEBAR
// ═══════════════════════════════════════════════════════
function renderMatchList() {
  if (!allMatches.length) {
    matchList.innerHTML = `<div style="color:var(--muted);font-size:0.82rem;padding:12px 0">Tidak ada jadwal untuk tanggal ini.</div>`;
    return;
  }
  matchList.innerHTML = allMatches.map((m,i) => {
    const hLogo = resolveTeamLogo(m.home);
    const aLogo = resolveTeamLogo(m.away);
    const hImg  = getCached(hLogo);
    const aImg  = getCached(aLogo);
    const pp = perPage();
    const pageIdx = Math.floor(i/pp);
    return `<div class="match-item ${pageIdx===previewPage?'active':''}" data-page="${pageIdx}" data-idx="${i}">
      <span class="mi-time">${esc(m.kickoff)}</span>
      ${hImg?`<img class="mi-logo" src="${hImg.src}" alt="${esc(m.home)}" />`:''}
      <span style="flex:1;min-width:0">
        <div class="mi-teams">${esc(m.home)} <span style="color:var(--muted)">vs</span> ${esc(m.away)}</div>
        <div class="mi-comp">${esc(m.competition||'')} · <span class="mi-tv">${esc(shortTv(m))}</span></div>
      </span>
      ${aImg?`<img class="mi-logo" src="${aImg.src}" alt="${esc(m.away)}" />`:''}
    </div>`;
  }).join("");

  matchList.querySelectorAll(".match-item").forEach(el => {
    el.addEventListener("click", () => {
      previewPage = parseInt(el.dataset.page);
      updatePreview();
      renderMatchList();
    });
  });
}

// ═══════════════════════════════════════════════════════
//  SCHEDULE LOADING
// ═══════════════════════════════════════════════════════
function getMatchesForDate(iso) {
  const raw = allSchedules[iso];
  if (Array.isArray(raw)) return raw;
  if (raw && typeof raw==="object") return [raw];
  return [];
}

async function applyDate(iso) {
  selectedDate = iso;
  datePicker.value = iso;
  $("#topbar-date").textContent = formatDateID(iso);
  allMatches = getMatchesForDate(iso);
  $("#match-badge").textContent = `${allMatches.length} pertandingan`;
  previewPage = 0;

  const pp = perPage();
  const totalPages = Math.ceil(allMatches.length/pp);
  if (totalPages > 1) {
    btnDlPng.textContent = `⚡ Download ${totalPages} PNG`;
  } else {
    btnDlPng.textContent = `⚡ Download PNG`;
  }
  btnDlPng.disabled = !allMatches.length;
  btnDlVideo.disabled = !allMatches.length;

  if (allMatches.length) {
    setStatus(`Memuat logo...`, "loading");
    await loadStaticLogos();
    await preloadMatchLogos(allMatches);
    setStatus(`✓ ${allMatches.length} pertandingan · ${formatDateID(iso)}`, "ok");
  } else {
    setStatus(`Tidak ada jadwal untuk ${formatDateID(iso)}`, "");
  }

  renderMatchList();
  await updatePreview();
}

async function fetchSchedule() {
  setStatus("Memuat jadwal...", "loading");
  try {
    const r = await fetch(asset("data/jadwal.json"));
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    allSchedules = data.schedules || {};
    await loadStaticLogos();
    setStatus(`✓ Data jadwal dimuat`, "ok");
    await applyDate(selectedDate);
  } catch(e) {
    setStatus(`Gagal memuat jadwal. Coba Import HTML.`, "err");
  }
}

function importHtmlFile(file) {
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const doc = new DOMParser().parseFromString(e.target.result, "text/html");
      const rows = doc.querySelectorAll("table tr");
      if (!rows.length) throw new Error("Tabel tidak ditemukan");
      let count = 0;
      if (!allSchedules[selectedDate]) allSchedules[selectedDate] = [];
      rows.forEach(tr => {
        const cells = [...tr.querySelectorAll("td")].map(td=>td.textContent.trim());
        if (cells.length<4) return;
        const [kickoff,matchup,competition,tv] = cells;
        if (/kick-off/i.test(kickoff)||!/vs/i.test(matchup)) return;
        const parts = matchup.split(/\s+vs\s+/i);
        allSchedules[selectedDate].push({ kickoff, matchup, home:(parts[0]||"").trim(), away:(parts[1]||"").trim(), competition, tv, tvFree:[], tvPaid:[] });
        count++;
      });
      setStatus(`✓ Import ${count} pertandingan`, "ok");
      await applyDate(selectedDate);
    } catch(err) { setStatus(`Gagal import: ${err.message}`, "err"); }
  };
  reader.readAsText(file, "UTF-8");
}

// ═══════════════════════════════════════════════════════
//  DOWNLOAD PNG (multi-page)
// ═══════════════════════════════════════════════════════
async function downloadPNG() {
  if (!allMatches.length) return;
  btnDlPng.disabled = true;
  const pages = getPages();
  setStatus(`Membuat ${pages.length} PNG...`, "loading");
  try {
    const offscreen = document.createElement("canvas");
    offscreen.width = W; offscreen.height = H;
    const octx = offscreen.getContext("2d");

    for (let p=0; p<pages.length; p++) {
      await renderPage(octx, pages[p], p+1, pages.length);
      await new Promise(r=>setTimeout(r,60));
      const suffix = pages.length>1 ? `-part${p+1}of${pages.length}` : "";
      const link = document.createElement("a");
      link.download = `jadwal-${currentTheme}-${selectedDate}${suffix}.png`;
      link.href = offscreen.toDataURL("image/png");
      link.click();
      if (p < pages.length-1) await new Promise(r=>setTimeout(r,350));
    }
    setStatus(`✓ ${pages.length} file PNG didownload`, "ok");
  } catch(e) {
    setStatus(`Gagal: ${e.message}`, "err");
  } finally {
    btnDlPng.disabled = false;
  }
}

// ═══════════════════════════════════════════════════════
//  DOWNLOAD VIDEO — slide per pertandingan
// ═══════════════════════════════════════════════════════

// Render 1 slide (1 pertandingan) — layout besar, full screen
async function renderSlide(targetCtx, m, t, brandImg, progress) {
  // progress 0..1 untuk animasi
  const anim = $("#sel-anim").value;
  targetCtx.clearRect(0,0,W,H);

  targetCtx.save();
  if (anim === "slide") {
    const offset = (1-progress) * W;
    targetCtx.translate(offset, 0);
  } else if (anim === "fade") {
    targetCtx.globalAlpha = progress;
  } else if (anim === "zoom") {
    const scale = 0.85 + 0.15*progress;
    targetCtx.translate(W/2, H/2);
    targetCtx.scale(scale, scale);
    targetCtx.translate(-W/2, -H/2);
    targetCtx.globalAlpha = progress;
  } else if (anim === "flip") {
    const scaleY = progress < 0.5 ? progress*2 : 1;
    targetCtx.translate(W/2, H/2);
    targetCtx.scale(1, scaleY);
    targetCtx.translate(-W/2, -H/2);
    targetCtx.globalAlpha = Math.min(1, progress*2);
  }

  drawBg(targetCtx, t);

  // Header compact
  const pad = 32, cx = W/2;
  const hh = brandImg ? 180 : 120;
  const hg = targetCtx.createLinearGradient(pad,28,pad+W-pad*2,28+hh);
  hg.addColorStop(0, t.card+"ee"); hg.addColorStop(1, t.bg2+"cc");
  targetCtx.save();
  targetCtx.shadowColor="rgba(0,0,0,0.5)"; targetCtx.shadowBlur=30; targetCtx.shadowOffsetY=8;
  roundRect(targetCtx, pad, 28, W-pad*2, hh, 28, hg, t.accent, 2);
  targetCtx.restore();

  let hy = 46;
  if (brandImg) { drawCircleImg(targetCtx, brandImg, cx, hy+36, 36, t.accent); hy += 84; }
  else { hy += 10; }

  targetCtx.fillStyle = t.text;
  targetCtx.font = "900 48px 'Oswald','Segoe UI',sans-serif";
  targetCtx.textAlign = "center";
  targetCtx.fillText((inpHeader.value||"JADWAL BOLA").toUpperCase(), cx, hy);
  hy += 12;
  targetCtx.fillStyle = t.sub;
  targetCtx.font = "700 26px 'Inter','Segoe UI',sans-serif";
  targetCtx.fillText(formatDateID(selectedDate).toUpperCase(), cx, hy+24);

  const headerEnd = 28 + hh + 20;

  // Big match card — takes most of the screen
  const cardPad = 28;
  const cardY = headerEnd;
  const cardH = H - headerEnd - 120;
  const cardW = W - cardPad*2;
  const colorIdx = allMatches.indexOf(m) % t.borderLeft.length;
  const borderColor = t.borderLeft[colorIdx < 0 ? 0 : colorIdx];

  // Card bg
  targetCtx.save();
  targetCtx.shadowColor="rgba(0,0,0,0.6)"; targetCtx.shadowBlur=40; targetCtx.shadowOffsetY=16;
  const cg = targetCtx.createLinearGradient(cardPad,cardY,cardPad+cardW,cardY+cardH);
  cg.addColorStop(0, t.card+"f8"); cg.addColorStop(1, t.bg2+"e8");
  roundRect(targetCtx, cardPad, cardY, cardW, cardH, 32, cg, borderColor, 3);
  targetCtx.restore();

  // Left accent bar
  roundRect(targetCtx, cardPad, cardY+16, 8, cardH-32, 4, borderColor);

  // League + competition
  let cy2 = cardY + 28;
  if (m.competition) {
    // League logo
    const lLogo = getCached(resolveLeagueLogo(m.competition));
    if (lLogo) {
      targetCtx.drawImage(lLogo, cx-16, cy2, 32, 32);
      cy2 += 40;
    }
    targetCtx.fillStyle = t.sub;
    targetCtx.font = "700 28px 'Inter','Segoe UI',sans-serif";
    targetCtx.textAlign = "center";
    targetCtx.fillText(m.competition.toUpperCase(), cx, cy2+20);
    cy2 += 36;
  }

  // Divider
  targetCtx.strokeStyle = t.cardBorder; targetCtx.lineWidth = 1;
  targetCtx.beginPath(); targetCtx.moveTo(cardPad+40, cy2); targetCtx.lineTo(cardPad+cardW-40, cy2); targetCtx.stroke();
  cy2 += 20;

  // Teams — big logos
  const logoSz = Math.min(220, Math.floor((cardH - cy2 + cardY - 180) * 0.7));
  const teamY = cy2;
  const homeCx = cardPad + cardW*0.25;
  const awayCx = cardPad + cardW*0.75;

  const hImg = getCached(resolveTeamLogo(m.home));
  const aImg = getCached(resolveTeamLogo(m.away));

  if (hImg) targetCtx.drawImage(hImg, homeCx-logoSz/2, teamY, logoSz, logoSz);
  else { roundRect(targetCtx, homeCx-logoSz/2, teamY, logoSz, logoSz, 12, t.card, t.cardBorder, 2); }

  if (aImg) targetCtx.drawImage(aImg, awayCx-logoSz/2, teamY, logoSz, logoSz);
  else { roundRect(targetCtx, awayCx-logoSz/2, teamY, logoSz, logoSz, 12, t.card, t.cardBorder, 2); }

  // VS badge big
  const vsCy = teamY + logoSz/2;
  targetCtx.save();
  targetCtx.shadowColor=borderColor; targetCtx.shadowBlur=30;
  targetCtx.beginPath(); targetCtx.arc(cx, vsCy, 44, 0, Math.PI*2);
  targetCtx.fillStyle = borderColor; targetCtx.fill();
  targetCtx.restore();
  targetCtx.fillStyle = t.bg;
  targetCtx.font = "900 32px 'Oswald','Segoe UI',sans-serif";
  targetCtx.textAlign="center"; targetCtx.textBaseline="middle";
  targetCtx.fillText("VS", cx, vsCy+1);
  targetCtx.textBaseline="alphabetic";

  // Team names
  const nameY = teamY + logoSz + 20;
  targetCtx.fillStyle = t.text;
  targetCtx.font = "800 38px 'Oswald','Segoe UI',sans-serif";
  targetCtx.textAlign = "center";
  wrapText(targetCtx, m.home, cardW*0.38, 2).forEach((ln,i) => targetCtx.fillText(ln, homeCx, nameY+i*44));
  wrapText(targetCtx, m.away, cardW*0.38, 2).forEach((ln,i) => targetCtx.fillText(ln, awayCx, nameY+i*44));

  // Kickoff time — big
  const timeY2 = nameY + 100;
  const timeBoxW = 200, timeBoxH = 80;
  roundRect(targetCtx, cx-timeBoxW/2, timeY2, timeBoxW, timeBoxH, 20, t.timeBg+"cc", borderColor, 2.5);
  targetCtx.save();
  targetCtx.shadowColor=borderColor; targetCtx.shadowBlur=16;
  targetCtx.fillStyle = borderColor;
  targetCtx.font = "900 52px 'Oswald','Segoe UI',sans-serif";
  targetCtx.textAlign="center"; targetCtx.textBaseline="middle";
  targetCtx.fillText(m.kickoff+" WIB", cx, timeY2+timeBoxH/2+2);
  targetCtx.restore();
  targetCtx.textBaseline="alphabetic";

  // TV bar
  const tvStr = shortTv(m);
  const tvY2 = timeY2 + timeBoxH + 20;
  const tvW = cardW - 60;
  const tvColor = isFreeTV(m) ? t.tvFree : t.tv;
  roundRect(targetCtx, cardPad+30, tvY2, tvW, 52, 26, "rgba(0,0,0,0.45)", tvColor+"88", 1.5);
  targetCtx.fillStyle = tvColor;
  targetCtx.font = "700 30px 'Inter','Segoe UI',sans-serif";
  targetCtx.textAlign="center"; targetCtx.textBaseline="middle";
  targetCtx.fillText("📺  "+tvStr, cardPad+30+tvW/2, tvY2+26);
  targetCtx.textBaseline="alphabetic";

  // Footer
  const footY = H - 100;
  const fg = targetCtx.createLinearGradient(0,footY,0,H);
  fg.addColorStop(0,t.footer+"ee"); fg.addColorStop(1,"#000");
  targetCtx.fillStyle=fg; targetCtx.fillRect(0,footY,W,H-footY);
  const al = targetCtx.createLinearGradient(0,footY,W,footY);
  al.addColorStop(0,"transparent"); al.addColorStop(0.5,t.accent); al.addColorStop(1,"transparent");
  targetCtx.strokeStyle=al; targetCtx.lineWidth=2;
  targetCtx.beginPath(); targetCtx.moveTo(40,footY); targetCtx.lineTo(W-40,footY); targetCtx.stroke();
  targetCtx.fillStyle=t.sub;
  targetCtx.font="600 26px 'Inter','Segoe UI',sans-serif";
  targetCtx.textAlign="center";
  targetCtx.fillText(inpFooter.value||"", cx, footY+52);

  targetCtx.restore();
}

// ═══════════════════════════════════════════════════════
//  VIDEO RENDER ENGINE
// ═══════════════════════════════════════════════════════
async function downloadVideo() {
  if (!allMatches.length) return;

  // Check MediaRecorder support
  if (!window.MediaRecorder) {
    setStatus("Browser tidak mendukung MediaRecorder. Gunakan Chrome/Edge.", "err");
    return;
  }

  const mimeTypes = ["video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm","video/mp4"];
  const mimeType = mimeTypes.find(m => MediaRecorder.isTypeSupported(m)) || "video/webm";

  btnDlVideo.disabled = true;
  setStatus("Merender video...", "loading");

  try {
    const t = getTheme();
    const brandImg = await loadBrandLogo();
    const FPS = 30;
    const slideDur = parseInt($("#sel-duration").value) || 4;
    const animDur = Math.min(0.6, slideDur * 0.25); // animasi masuk = 25% durasi slide
    const holdDur = slideDur - animDur;

    // Offscreen canvas untuk render
    const vc = document.createElement("canvas");
    vc.width = W; vc.height = H;
    const vctx = vc.getContext("2d");

    const stream = vc.captureStream(FPS);
    const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8_000_000 });
    const chunks = [];
    recorder.ondataavailable = e => { if (e.data.size>0) chunks.push(e.data); };

    recorder.start(100);

    const totalMatches = allMatches.length;
    const totalFrames = Math.round((slideDur * totalMatches + 0.5) * FPS); // +0.5s outro
    let frame = 0;

    // Render frame by frame
    for (let mi = 0; mi < totalMatches; mi++) {
      const m = allMatches[mi];
      const slideFrames = Math.round(slideDur * FPS);
      const animFrames  = Math.round(animDur * FPS);

      for (let f = 0; f < slideFrames; f++) {
        const progress = f < animFrames ? f/animFrames : 1;
        await renderSlide(vctx, m, t, brandImg, progress);
        frame++;

        // Update status setiap 10 frame
        if (frame % 10 === 0) {
          const pct = Math.round(frame/totalFrames*100);
          setStatus(`Merender video... ${pct}% (slide ${mi+1}/${totalMatches})`, "loading");
        }

        // Yield ke browser agar tidak freeze
        await new Promise(r => setTimeout(r, 0));
      }
    }

    // Outro frame (fade out)
    const outroFrames = Math.round(0.5 * FPS);
    for (let f=0; f<outroFrames; f++) {
      const alpha = 1 - f/outroFrames;
      await renderSlide(vctx, allMatches[allMatches.length-1], t, brandImg, 1);
      vctx.fillStyle = `rgba(0,0,0,${1-alpha})`;
      vctx.fillRect(0,0,W,H);
      await new Promise(r => setTimeout(r, 0));
    }

    recorder.stop();
    await new Promise(r => recorder.onstop = r);

    const blob = new Blob(chunks, { type: mimeType });
    const ext = mimeType.includes("mp4") ? "mp4" : "webm";
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.download = `jadwal-${currentTheme}-${selectedDate}.${ext}`;
    link.href = url;
    link.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);

    setStatus(`✓ Video ${ext.toUpperCase()} (${totalMatches} slide) didownload`, "ok");
  } catch(e) {
    setStatus(`Gagal render video: ${e.message}`, "err");
    console.error(e);
  } finally {
    btnDlVideo.disabled = false;
  }
}

// ═══════════════════════════════════════════════════════
//  THEME PICKER
// ═══════════════════════════════════════════════════════
function buildThemePicker() {
  const grid = $("#theme-grid");
  grid.innerHTML = Object.entries(THEMES).map(([id,t]) => `
    <div class="theme-btn ${id===currentTheme?'active':''}" data-id="${id}">
      <div class="theme-swatch" style="background:${t.swatch}"></div>
      <span>${t.name}</span>
    </div>
  `).join("");
  grid.querySelectorAll(".theme-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      currentTheme = btn.dataset.id;
      grid.querySelectorAll(".theme-btn").forEach(b => b.classList.toggle("active", b.dataset.id===currentTheme));
      saveSettings();
      updatePreview();
    });
  });
}

// ═══════════════════════════════════════════════════════
//  SETTINGS PERSISTENCE
// ═══════════════════════════════════════════════════════
const SK = "ck-jadwal-v2";
function saveSettings() {
  localStorage.setItem(SK, JSON.stringify({
    header: inpHeader.value, tiktok: inpTiktok.value, footer: inpFooter.value,
    theme: currentTheme, date: selectedDate,
  }));
}
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SK)||"{}");
    if (s.header) inpHeader.value = s.header;
    if (s.tiktok) inpTiktok.value = s.tiktok;
    if (s.footer) inpFooter.value = s.footer;
    if (s.theme && THEMES[s.theme]) currentTheme = s.theme;
    if (s.date && /^\d{4}-\d{2}-\d{2}$/.test(s.date)) selectedDate = s.date;
  } catch {}
}

function setStatus(msg, cls="") {
  statusEl.className = "status-bar" + (cls?" "+cls:"");
  statusEl.textContent = msg;
}

// ═══════════════════════════════════════════════════════
//  EVENT LISTENERS & INIT
// ═══════════════════════════════════════════════════════

// Export type tabs
$("#export-tabs").querySelectorAll(".export-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    exportType = tab.dataset.type;
    $("#export-tabs").querySelectorAll(".export-tab").forEach(t => t.classList.toggle("active", t.dataset.type===exportType));
    $("#opt-png").style.display   = exportType==="png"   ? "flex" : "none";
    $("#opt-video").style.display = exportType==="video" ? "flex" : "none";
  });
});

// Branding inputs
[inpHeader, inpTiktok, inpFooter].forEach(el => {
  el.addEventListener("input", () => { saveSettings(); updatePreview(); });
});

// Date
datePicker.addEventListener("change", e => { saveSettings(); applyDate(e.target.value); });
$("#btn-today").addEventListener("click", () => applyDate(todayISO()));
$("#btn-refresh").addEventListener("click", fetchSchedule);

// Per-page change → re-render
$("#sel-perpage").addEventListener("change", () => {
  previewPage = 0;
  const pp = perPage();
  const totalPages = Math.ceil(allMatches.length/pp);
  btnDlPng.textContent = totalPages>1 ? `⚡ Download ${totalPages} PNG` : `⚡ Download PNG`;
  renderMatchList();
  updatePreview();
});

// Navigation
navPrev.addEventListener("click", () => { previewPage--; renderMatchList(); updatePreview(); });
navNext.addEventListener("click", () => { previewPage++; renderMatchList(); updatePreview(); });

// Download buttons
btnDlPng.addEventListener("click", downloadPNG);
btnDlVideo.addEventListener("click", downloadVideo);

// Import
$("#file-import").addEventListener("change", e => {
  const f = e.target.files[0];
  if (f) importHtmlFile(f);
  e.target.value = "";
});

// ── INIT ──
loadSettings();
datePicker.value = selectedDate;
buildThemePicker();
fetchSchedule();
</script>
