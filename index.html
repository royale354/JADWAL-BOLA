<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CORNERKIICK — Jadwal Bola Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sb:#0a0c10;--sb2:#111318;--border:#1e2330;
  --acc:#e8b84b;--acc2:#4caf7d;--txt:#f0f2f5;--muted:#6b7280;
  --danger:#e05252;--info:#5b9cf6;
}
body{font-family:'Inter',system-ui,sans-serif;background:#070810;color:var(--txt);min-height:100vh;display:flex;flex-direction:column}
input[type=file]{display:none}
/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--sb);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-logo{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--acc)}
.topbar-brand{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;color:var(--acc)}
.topbar-brand span{color:#fff}
.topbar-sep{flex:1}
.topbar-date{font-size:0.78rem;font-weight:600;color:var(--muted)}
/* ── LAYOUT ── */
.workspace{display:grid;grid-template-columns:300px 1fr;flex:1;min-height:0;overflow:hidden}
@media(max-width:860px){.workspace{grid-template-columns:1fr;overflow:visible}}
/* ── SIDEBAR ── */
.sidebar{background:var(--sb);border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;max-height:calc(100vh - 58px)}
.sec-label{font-size:0.65rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:0.7rem;color:var(--muted);font-weight:600}
.field input,.field select{background:var(--sb2);border:1px solid var(--border);color:var(--txt);padding:7px 10px;border-radius:7px;font-size:0.82rem;font-family:inherit;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--acc)}
input[type=date]{color-scheme:dark}
/* ── THEME GRID ── */
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.t-card{cursor:pointer;border:2px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s,transform .15s}
.t-card:hover{transform:translateY(-2px);border-color:#2e3545}
.t-card.on{border-color:var(--acc)}
.t-swatch{height:36px}
.t-name{font-size:0.68rem;font-weight:700;color:var(--muted);padding:5px 7px;background:var(--sb2)}
/* ── BUTTONS ── */
.btn{cursor:pointer;border:none;border-radius:8px;padding:9px 14px;font-size:0.82rem;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .2s,transform .15s}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-gold{background:linear-gradient(135deg,#c8922a,#e8b84b);color:#0a0800}
.btn-green{background:linear-gradient(135deg,#2d7a4f,#4caf7d);color:#fff}
.btn-blue{background:linear-gradient(135deg,#2a4a8a,#5b9cf6);color:#fff}
.btn-ghost{background:var(--sb2);color:var(--txt);border:1px solid var(--border)}
.btn-sm{padding:7px 12px;font-size:0.78rem}
.btn-full{width:100%}
.btn-row{display:flex;gap:7px}
.btn-row .btn{flex:1}
/* ── EXPORT TABS ── */
.exp-tabs{display:flex;background:var(--sb2);border:1px solid var(--border);border-radius:9px;padding:3px;gap:3px}
.exp-tab{flex:1;cursor:pointer;border:none;border-radius:7px;padding:8px 6px;font-size:0.75rem;font-weight:700;font-family:inherit;background:transparent;color:var(--muted);transition:background .2s,color .2s}
.exp-tab.on{background:var(--acc);color:#0a0800}
/* ── STATUS ── */
.status{font-size:0.75rem;font-weight:600;padding:8px 10px;border-radius:7px;background:var(--sb2);border:1px solid var(--border);color:var(--muted);line-height:1.5;min-height:34px}
.status.ok{color:var(--acc2);border-color:#2d7a4f44}
.status.err{color:var(--danger);border-color:#e0525244}
.status.loading{color:var(--acc);border-color:#c8922a44}
/* ── MAIN AREA ── */
.main{display:flex;flex-direction:column;overflow:hidden;background:#070810}
/* ── PREVIEW TABS ── */
.prev-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--sb);flex-shrink:0}
.prev-tab{cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:0.8rem;font-weight:700;padding:11px 20px;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.prev-tab.on{color:var(--acc);border-bottom-color:var(--acc)}
/* ── PREVIEW BODY ── */
.prev-body{flex:1;display:flex;gap:20px;padding:20px;overflow:auto;align-items:flex-start;justify-content:center}
/* ── CANVAS WRAPPER ── */
.canvas-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0}
.canvas-shell{position:relative;width:240px;border-radius:16px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.7)}
.canvas-shell canvas{display:block;width:100%}
.canvas-nav{display:flex;align-items:center;gap:8px}
.nav-btn{cursor:pointer;background:var(--sb2);border:1px solid var(--border);color:var(--txt);border-radius:7px;padding:5px 14px;font-size:0.82rem;font-weight:700;font-family:inherit;transition:background .2s}
.nav-btn:hover{background:#1e2330}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.page-lbl{font-size:0.75rem;color:var(--muted);font-weight:600;min-width:52px;text-align:center}
/* ── VIDEO PREVIEW OVERLAY ── */
.vid-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);border-radius:16px;cursor:pointer;transition:opacity .2s}
.vid-overlay:hover{background:rgba(0,0,0,.4)}
.vid-play{width:52px;height:52px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center}
.vid-play svg{width:22px;height:22px;fill:#0a0800;margin-left:3px}
/* ── MATCH LIST PANEL ── */
.match-panel{flex:1;min-width:260px;max-width:440px;display:flex;flex-direction:column;gap:6px}
.mp-title{font-size:0.68rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.mi{background:var(--sb2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:border-color .2s}
.mi:hover{border-color:#2e3545}
.mi.on{border-color:var(--acc);background:#e8b84b0d}
.mi-time{font-weight:800;color:var(--acc);font-size:0.8rem;min-width:36px;text-align:center}
.mi-logo{width:20px;height:20px;object-fit:contain;flex-shrink:0}
.mi-info{flex:1;min-width:0}
.mi-teams{font-weight:700;font-size:0.8rem;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-meta{font-size:0.67rem;color:var(--muted);margin-top:1px}
.mi-tv{color:#e8b84b}
/* ── VIDEO PROGRESS ── */
.vid-progress{width:100%;background:var(--sb2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;display:none;flex-direction:column;gap:6px}
.vid-progress.show{display:flex}
.vp-bar-wrap{background:#1e2330;border-radius:99px;height:6px;overflow:hidden}
.vp-bar{height:100%;background:linear-gradient(90deg,#c8922a,#e8b84b);border-radius:99px;width:0%;transition:width .1s}
.vp-label{font-size:0.72rem;color:var(--muted);font-weight:600}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <img class="topbar-logo" id="brand-img" src="assets/branding/CORNERKIICK.png" onerror="this.src='CORNERKIICK.png'" alt="logo"/>

<div class="workspace">
<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">

  <!-- Branding -->
  <div>

    <div style="display:flex;flex-direction:column;gap:7px">
      <div class="field"><label>Judul Header</label><input id="inp-header" value="JADWAL BOLA HARI INI"/></div>
      <div class="field"><label>Username TikTok</label><input id="inp-tiktok" value="@CORNERKIICK" placeholder="@username"/></div>
      <div class="field"><label>Footer Sosmed</label><input id="inp-footer" value="🎵 CORNERKIICK  |  📸 CORNERKIICK"/></div>

  <div>
    <div class="sec-label">Tema</div>

  <div class="status" id="status">Memuat jadwal...</div>
</aside>

<!-- ══ MAIN ══ -->
<main class="main">
  <!-- Preview mode tabs -->
  <div class="prev-tabs">
    <button class="prev-tab on" data-m="png">🖼 Preview PNG</button>
    <button class="prev-tab" data-m="video">🎬 Preview Video</button>

    <!-- Canvas -->
    <div class="canvas-wrap">
      <div class="canvas-shell" id="canvas-shell">
        <canvas id="cv" width="1080" height="1920"></canvas>
        <!-- Video play overlay (hidden by default) -->
        <div class="vid-overlay" id="vid-overlay" style="display:none">
          <div class="vid-play">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>

      <div class="canvas-nav" id="canvas-nav">

      <div class="mp-title">Daftar Pertandingan</div>

    </div>

</main>

<script>
// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const W=1080,H=1920;
const BULAN=["","Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
const HARI=["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
const FREE_KW=["sctv","indosiar","rcti","mnctv","gtv","antv","tvone","tv one","kompas tv","inews","tvri","trans tv","trans7","trans 7","metro tv","net tv","net."];

// ═══════════════════════════════════════════════════
// THEMES — elegan, tidak neon
// ═══════════════════════════════════════════════════
const THEMES = {
  classic: {
    name:"⚽ Classic Dark",
    swatch:"linear-gradient(135deg,#0a0c10 50%,#e8b84b)",
    bg:"#0a0c10", bg2:"#111318", card:"#14181f", cardBorder:"#1e2a3a",
    accent:"#e8b84b", accentDim:"rgba(232,184,75,.15)",
    text:"#f0f2f5", sub:"#8892a0", tv:"#e8b84b", tvFree:"#4caf7d",
    timeBg:"#0a0c10", footer:"#060709",
    stripe:["#e8b84b","#4caf7d","#5b9cf6","#e05252","#a78bfa"],
  },
  slate: {
    name:"🌙 Midnight Slate",
    swatch:"linear-gradient(135deg,#0f1117 50%,#5b9cf6)",
    bg:"#0f1117", bg2:"#161b26", card:"#1a2030", cardBorder:"#243050",
    accent:"#5b9cf6", accentDim:"rgba(91,156,246,.15)",
    text:"#e8edf5", sub:"#7a8899", tv:"#f0c060", tvFree:"#56c87a",
    timeBg:"#0f1117", footer:"#080a10",
    stripe:["#5b9cf6","#56c87a","#f0c060","#e07070","#c084fc"],
  },
  carbon: {
    name:"🖤 Carbon",
    swatch:"linear-gradient(135deg,#111 50%,#888)",
    bg:"#111111", bg2:"#1a1a1a", card:"#1e1e1e", cardBorder:"#2e2e2e",
    accent:"#d4d4d4", accentDim:"rgba(212,212,212,.12)",
    text:"#f5f5f5", sub:"#888", tv:"#d4d4d4", tvFree:"#6dbf8a",
    timeBg:"#111", footer:"#0a0a0a",
    stripe:["#d4d4d4","#6dbf8a","#f0c060","#e07070","#a0a0ff"],
  },
  maroon: {
    name:"🏆 Maroon Gold",
    swatch:"linear-gradient(135deg,#1a0808 50%,#c8922a)",
    bg:"#100808", bg2:"#1a0e0e", card:"#1e1010", cardBorder:"#3a1818",
    accent:"#c8922a", accentDim:"rgba(200,146,42,.15)",
    text:"#f5ede0", sub:"#9a7a60", tv:"#f0c060", tvFree:"#6dbf8a",
    timeBg:"#100808", footer:"#080404",
    stripe:["#c8922a","#e05252","#f0c060","#6dbf8a","#c084fc"],
  },
};

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let allSchedules={}, allMatches=[], selectedDate=todayISO();
let staticLogos=null, logoCache={};
let currentTheme="classic", exportMode="png", previewMode="png";
let previewPage=0;
let vidAnimFrame=null, vidPlaying=false;

const $=s=>document.querySelector(s);
const cv=$("#cv"), ctx=cv.getContext("2d");
const inpHeader=$("#inp-header"), inpTiktok=$("#inp-tiktok"), inpFooter=$("#inp-footer");
const datePicker=$("#date-picker"), statusEl=$("#status");
const matchList=$("#match-list");
const btnDlPng=$("#btn-dl-png"), btnDlVideo=$("#btn-dl-video");
const navPrev=$("#nav-prev"), navNext=$("#nav-next"), pageLbl=$("#page-lbl");
const vidOverlay=$("#vid-overlay"), canvasNav=$("#canvas-nav");
const vidProgress=$("#vid-progress"), vpBar=$("#vp-bar"), vpLabel=$("#vp-label");

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function todayISO(){return new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Jakarta"})}
function fmtDate(iso){if(!iso)return"—";const[y,m,d]=iso.split("-").map(Number);return`${HARI[new Date(y,m-1,d).getDay()]}, ${d} ${BULAN[m]} ${y}`}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function slug(n){return n.toLowerCase().trim().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||"x"}
function normN(n){return n.toLowerCase().trim().replace(/[^a-z0-9]+/g," ").trim()}
function isRemote(p){return/^https?:\/\//i.test(p||"")}
function getBase(){const p=location.pathname;if(p.endsWith("/"))return p;const i=p.lastIndexOf("/");return i>0?p.slice(0,i+1):"/"}
const BASE=getBase();
function asset(p){return BASE+p.replace(/^\//,"")}
function shortTv(m){const r=(m.tv||"").trim();if(r&&r!=="-"&&r!=="TBC")return r;return[...(m.tvFree||[]),...(m.tvPaid||[])].join(" · ")||"-"}
function isFreeTV(m){if((m.tvFree||[]).length)return true;return FREE_KW.some(k=>shortTv(m).toLowerCase().includes(k))}
function getT(){return THEMES[currentTheme]||THEMES.classic}
function perPage(){return parseInt($("#sel-perpage").value)||5}
function setStatus(msg,cls=""){statusEl.className="status"+(cls?" "+cls:"");statusEl.textContent=msg}

// ═══════════════════════════════════════════════════
// LOGO LOADING
// ═══════════════════════════════════════════════════
async function loadStaticLogos(){
  if(staticLogos)return staticLogos;
  try{const r=await fetch(asset("logos.json?v=5"));if(!r.ok)throw 0;staticLogos=await r.json();}
  catch{staticLogos={teams:{},leagues:{}};}
  return staticLogos;
}
function findBadge(map,name){
  if(!map||!name)return null;
  if(map[name]&&!isRemote(map[name]))return map[name];
  const norm=normN(name);let best=null,bl=0;
  for(const[k,v]of Object.entries(map)){if(isRemote(v))continue;const kn=normN(k);if(norm===kn)return v;if((norm.includes(kn)||kn.includes(norm))&&k.length>bl){best=v;bl=k.length;}}
  return best;
}
function teamLogoBase(name){const m=staticLogos?findBadge(staticLogos.teams,name):null;return(m&&!isRemote(m))?m.replace(/\.(png|svg|jpg|webp)$/i,""):`assets/logos/teams/${slug(name)}`}
function leagueLogoBase(comp){const m=staticLogos?findBadge(staticLogos.leagues,comp):null;return(m&&!isRemote(m))?m.replace(/\.(png|svg|jpg|webp)$/i,""):`assets/logos/leagues/${slug(comp)}`}
function tryLoad(path){
  const src=asset(path);if(logoCache[src])return Promise.resolve(logoCache[src]);
  return new Promise(res=>{const img=new Image();img.onload=()=>{logoCache[src]=img;res(img);};img.onerror=()=>res(null);img.src=src;});
}
async function loadLogo(base){
  if(!base)return null;if(logoCache[base])return logoCache[base];
  for(const ext of[".png",".svg",".jpg",".webp"]){const img=await tryLoad(base+ext);if(img){logoCache[base]=img;return img;}}
  return null;
}
function getCached(base){
  if(!base)return null;if(logoCache[base])return logoCache[base];
  for(const ext of[".png",".svg",".jpg",".webp"]){const k=asset(base+ext);if(logoCache[k])return logoCache[k];}
  return null;
}
async function preloadAll(matches){
  const paths=[...new Set(matches.flatMap(m=>[teamLogoBase(m.home),teamLogoBase(m.away),leagueLogoBase(m.competition)]).filter(Boolean))];
  await Promise.all(paths.map(loadLogo));
}
async function loadBrand(){
  for(const p of["assets/branding/CORNERKIICK.png","CORNERKIICK.png"]){const img=await tryLoad(p);if(img)return img;}
  return null;
}

// ═══════════════════════════════════════════════════
// CANVAS UTILS
// ═══════════════════════════════════════════════════
function rr(c,x,y,w,h,r,fill,stroke,sw){
  const rad=Math.min(r,w/2,h/2);
  c.beginPath();c.moveTo(x+rad,y);c.lineTo(x+w-rad,y);c.quadraticCurveTo(x+w,y,x+w,y+rad);
  c.lineTo(x+w,y+h-rad);c.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);
  c.lineTo(x+rad,y+h);c.quadraticCurveTo(x,y+h,x,y+h-rad);c.lineTo(x,y+rad);c.quadraticCurveTo(x,y,x+rad,y);c.closePath();
  if(fill){c.fillStyle=fill;c.fill();}if(stroke){c.strokeStyle=stroke;c.lineWidth=sw||2;c.stroke();}
}
function wrapTxt(c,text,maxW,maxL){
  const words=text.split(/\s+/);const lines=[];let line="";
  for(const w of words){const t=line?line+" "+w:w;if(c.measureText(t).width<=maxW){line=t;}else{if(line)lines.push(line);line=w;}}
  if(line)lines.push(line);return lines.slice(0,maxL);
}
function circleImg(c,img,cx,cy,r,border){
  c.save();c.shadowColor="rgba(0,0,0,.6)";c.shadowBlur=20;
  c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.clip();c.drawImage(img,cx-r,cy-r,r*2,r*2);c.restore();
  c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.strokeStyle=border;c.lineWidth=3;c.stroke();
}

// ═══════════════════════════════════════════════════
// DRAW BACKGROUND (shared)
// ═══════════════════════════════════════════════════
function drawBg(c,t){
  const g=c.createLinearGradient(0,0,0,H);
  g.addColorStop(0,t.bg2);g.addColorStop(.5,t.bg);g.addColorStop(1,t.bg2);
  c.fillStyle=g;c.fillRect(0,0,W,H);
  // subtle dot grid
  c.fillStyle=t.accent+"12";
  for(let x=60;x<W;x+=90)for(let y=60;y<H;y+=90){c.beginPath();c.arc(x,y,1.5,0,Math.PI*2);c.fill();}
  // glow top
  const gt=c.createRadialGradient(W/2,0,0,W/2,0,550);
  gt.addColorStop(0,t.accent+"22");gt.addColorStop(1,"transparent");
  c.fillStyle=gt;c.fillRect(0,0,W,600);
  // watermark
  const wm=(inpTiktok.value||"").trim().replace(/^@+/,"");
  if(wm){
    c.save();c.translate(W/2,H/2);c.rotate(-Math.PI/7);
    c.font="900 80px 'Bebas Neue','Segoe UI',sans-serif";
    c.fillStyle=t.accent+"09";c.textAlign="center";
    for(let dy=-600;dy<=600;dy+=220)c.fillText("@"+wm.toUpperCase(),0,dy);
    c.restore();
  }
}

  // top accent line

  al.addColorStop(0,"transparent");al.addColorStop(.5,t.accent);al.addColorStop(1,"transparent");

  c.font="700 28px 'Inter','Segoe UI',sans-serif";

  rr(c,W/2-dw/2-20,hy,dw+40,42,21,t.timeBg+"cc",t.accent+"66",1.5);
  c.fillStyle=t.sub;c.textAlign="center";c.fillText(ds,W/2,hy+29);hy+=42;
  if(totalPages>1){hy+=6;c.font="600 22px 'Inter','Segoe UI',sans-serif";c.fillStyle=t.sub;c.fillText(`HALAMAN ${pageNum} / ${totalPages}`,W/2,hy+18);hy+=26;}

  const listTop=24+hh+14;

  let cardH=Math.floor((listBot-listTop-gap*(n-1))/n);

  while(n>0&&listTop+n*cardH+(n-1)*gap>listBot)cardH--;

// ═══════════════════════════════════════════════════
// VIDEO SLIDE — 1 pertandingan, full screen, animasi
// ═══════════════════════════════════════════════════
async function renderVideoSlide(c,m,t,brand,progress){
  // progress 0..1 = animasi masuk
  const anim=$("#sel-anim").value;
  c.clearRect(0,0,W,H);
  c.save();

  // Apply entrance animation transform
  if(anim==="slide"){
    const off=(1-easeOut(progress))*W;
    c.translate(off,0);
  } else if(anim==="fade"){
    c.globalAlpha=easeOut(progress);
  } else if(anim==="zoom"){
    const s=0.88+0.12*easeOut(progress);
    c.translate(W/2,H/2);c.scale(s,s);c.translate(-W/2,-H/2);
    c.globalAlpha=Math.min(1,progress*1.5);
  } else if(anim==="wipe"){
    // clip from bottom to top
    const clipH=H*easeOut(progress);
    c.beginPath();c.rect(0,H-clipH,W,clipH);c.clip();
  }

  drawBg(c,t);

  const stripe=t.stripe[allMatches.indexOf(m)%t.stripe.length]||t.accent;
  const pad=36,cx=W/2;

  // ── HEADER COMPACT ──

  c.fillStyle=al;c.fillRect(pad+30,28,W-pad*2-60,3);

  let hy=46;
  if(brand){circleImg(c,brand,cx,hy+32,32,t.accent);hy+=76;}else{hy+=12;}
  c.save();c.shadowColor=t.accent+"88";c.shadowBlur=18;
  c.fillStyle=t.text;c.font="900 50px 'Bebas Neue','Segoe UI',sans-serif";c.textAlign="center";
  c.fillText((inpHeader.value||"JADWAL BOLA").toUpperCase(),cx,hy);c.restore();

  const headerEnd=28+hh+20;

  rr(c,pad,cardY,cardW,cardH,32,cg,stripe,3);c.restore();
  rr(c,pad,cardY+18,8,cardH-36,4,stripe);

  let cy=cardY+28;

  // League row
  if(m.competition){
    const ll=getCached(leagueLogoBase(m.competition));
    if(ll){c.drawImage(ll,cx-16,cy,32,32);cy+=40;}
    c.fillStyle=t.sub;c.font="700 28px 'Inter','Segoe UI',sans-serif";c.textAlign="center";
    c.fillText(m.competition.toUpperCase(),cx,cy+20);cy+=36;
  }
  // divider
  c.strokeStyle=t.cardBorder;c.lineWidth=1;
  c.beginPath();c.moveTo(pad+50,cy);c.lineTo(pad+cardW-50,cy);c.stroke();cy+=24;

  // Team logos — BIG
  const lsz=Math.min(200,Math.floor((cardH-cy+cardY-200)*.65));

  const hImg=getCached(teamLogoBase(m.home));
  const aImg=getCached(teamLogoBase(m.away));
  if(hImg)c.drawImage(hImg,hcx-lsz/2,cy,lsz,lsz);
  else{rr(c,hcx-lsz/2,cy,lsz,lsz,14,t.card,t.cardBorder,2);}
  if(aImg)c.drawImage(aImg,acx-lsz/2,cy,lsz,lsz);
  else{rr(c,acx-lsz/2,cy,lsz,lsz,14,t.card,t.cardBorder,2);}

  // VS badge
  const vcy=cy+lsz/2;

  // ── FOOTER ──
  const footY=H-100;
  const fg=c.createLinearGradient(0,footY,0,H);
  fg.addColorStop(0,t.footer+"f0");fg.addColorStop(1,"#000");
  c.fillStyle=fg;c.fillRect(0,footY,W,H-footY);
  const fl=c.createLinearGradient(0,footY,W,footY);
  fl.addColorStop(0,"transparent");fl.addColorStop(.5,t.accent);fl.addColorStop(1,"transparent");
  c.strokeStyle=fl;c.lineWidth=2;c.beginPath();c.moveTo(40,footY);c.lineTo(W-40,footY);c.stroke();
  c.fillStyle=t.sub;c.font="600 24px 'Inter','Segoe UI',sans-serif";c.textAlign="center";
  c.fillText(inpFooter.value||"",cx,footY+52);

  c.restore();

function easeOut(t){return 1-Math.pow(1-t,3);}

// ═══════════════════════════════════════════════════
// PREVIEW — PNG mode
// ═══════════════════════════════════════════════════
function getPages(){
  const pp=perPage(),pages=[];
  for(let i=0;i<allMatches.length;i+=pp)pages.push(allMatches.slice(i,i+pp));
  return pages;
}

async function showPNGPreview(){
  const pages=getPages();
  if(!pages.length){
    ctx.clearRect(0,0,W,H);ctx.fillStyle=getT().bg;ctx.fillRect(0,0,W,H);
    ctx.fillStyle=getT().sub;ctx.font="700 38px 'Inter',sans-serif";ctx.textAlign="center";
    ctx.fillText("Tidak ada jadwal",W/2,H/2);
    pageLbl.textContent="— / —";navPrev.disabled=navNext.disabled=true;return;
  }
  if(previewPage>=pages.length)previewPage=pages.length-1;
  if(previewPage<0)previewPage=0;
  pageLbl.textContent=`${previewPage+1} / ${pages.length}`;
  navPrev.disabled=previewPage===0;navNext.disabled=previewPage===pages.length-1;
  await renderPNGPage(ctx,pages[previewPage],previewPage+1,pages.length);
}

// ═══════════════════════════════════════════════════
// PREVIEW — VIDEO mode (live animation loop)
// ═══════════════════════════════════════════════════
let vidSlideIdx=0,vidFrameStart=null,vidBrand=null;
const VID_ANIM_DUR=0.5; // detik animasi masuk

async function startVideoPreview(){
  if(vidAnimFrame)cancelAnimationFrame(vidAnimFrame);
  vidPlaying=true;
  vidSlideIdx=0;
  vidFrameStart=null;
  vidBrand=await loadBrand();
  const t=getT();
  const slideDur=parseInt($("#sel-dur").value)||4;

  function frame(ts){
    if(!vidPlaying)return;
    if(!vidFrameStart)vidFrameStart=ts;
    const elapsed=(ts-vidFrameStart)/1000; // detik
    const totalDur=slideDur*allMatches.length;
    const loopTime=elapsed%totalDur;
    const slideTime=loopTime%slideDur;
    const slideIdx=Math.floor(loopTime/slideDur)%allMatches.length;

    if(slideIdx!==vidSlideIdx){vidSlideIdx=slideIdx;}
    const progress=Math.min(1,slideTime/VID_ANIM_DUR);
    const m=allMatches[vidSlideIdx];
    renderVideoSlide(ctx,m,t,vidBrand,progress).then(()=>{
      vidAnimFrame=requestAnimationFrame(frame);
    });
  }
  vidAnimFrame=requestAnimationFrame(frame);
}

function stopVideoPreview(){
  vidPlaying=false;
  if(vidAnimFrame){cancelAnimationFrame(vidAnimFrame);vidAnimFrame=null;}
}

// ═══════════════════════════════════════════════════
// MATCH LIST
// ═══════════════════════════════════════════════════
function renderMatchList(){
  if(!allMatches.length){
    matchList.innerHTML=`<div style="color:var(--muted);font-size:.8rem;padding:10px 0">Tidak ada jadwal.</div>`;return;
  }
  const pp=perPage();
  matchList.innerHTML=allMatches.map((m,i)=>{
    const pg=Math.floor(i/pp);
    const hImg=getCached(teamLogoBase(m.home));
    const aImg=getCached(teamLogoBase(m.away));
    const active=previewMode==="png"?pg===previewPage:i===vidSlideIdx;
    return`<div class="mi${active?" on":""}" data-pg="${pg}" data-idx="${i}">
      <span class="mi-time">${esc(m.kickoff)}</span>
      ${hImg?`<img class="mi-logo" src="${hImg.src}" alt=""/>`:""}
      <span class="mi-info">
        <div class="mi-teams">${esc(m.home)} vs ${esc(m.away)}</div>
        <div class="mi-meta">${esc(m.competition||"")} · <span class="mi-tv">${esc(shortTv(m))}</span></div>
      </span>
      ${aImg?`<img class="mi-logo" src="${aImg.src}" alt=""/>`:""}
    </div>`;
  }).join("");

  matchList.querySelectorAll(".mi").forEach(el=>{
    el.addEventListener("click",()=>{
      if(previewMode==="png"){
        previewPage=parseInt(el.dataset.pg);
        showPNGPreview();renderMatchList();
      } else {
        // jump to slide in video preview
        vidSlideIdx=parseInt(el.dataset.idx);
        vidFrameStart=null;
        renderMatchList();
      }
    });
  });
}

// ═══════════════════════════════════════════════════
// SCHEDULE LOADING
// ═══════════════════════════════════════════════════
function getMatchesForDate(iso){
  const r=allSchedules[iso];
  if(Array.isArray(r))return r;if(r&&typeof r==="object")return[r];return[];
}

async function applyDate(iso){
  selectedDate=iso;datePicker.value=iso;
  $("#topbar-date").textContent=fmtDate(iso);
  allMatches=getMatchesForDate(iso);
  const n=allMatches.length;
  const pp=perPage(),tp=Math.ceil(n/pp);
  btnDlPng.textContent=tp>1?`⚡ Download ${tp} PNG`:"⚡ Download PNG";
  btnDlPng.disabled=!n;btnDlVideo.disabled=!n;
  previewPage=0;vidSlideIdx=0;

  if(n){
    setStatus("Memuat logo...","loading");
    await loadStaticLogos();await preloadAll(allMatches);
    setStatus(`✓ ${n} pertandingan · ${fmtDate(iso)}`,"ok");
  } else {
    setStatus(`Tidak ada jadwal untuk ${fmtDate(iso)}`);
  }
  renderMatchList();
  if(previewMode==="png")await showPNGPreview();
  else await startVideoPreview();
}

async function fetchSchedule(){
  setStatus("Memuat jadwal...","loading");
  try{
    const r=await fetch(asset("data/jadwal.json"));
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();allSchedules=d.schedules||{};
    await loadStaticLogos();
    setStatus("✓ Data jadwal dimuat","ok");
    await applyDate(selectedDate);
  }catch(e){setStatus("Gagal memuat jadwal. Coba Import HTML.","err");}
}

function importHtmlFile(file){
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const doc=new DOMParser().parseFromString(e.target.result,"text/html");
      const rows=doc.querySelectorAll("table tr");
      if(!rows.length)throw new Error("Tabel tidak ditemukan");
      let count=0;
      if(!allSchedules[selectedDate])allSchedules[selectedDate]=[];
      rows.forEach(tr=>{
        const cells=[...tr.querySelectorAll("td")].map(td=>td.textContent.trim());
        if(cells.length<4)return;
        const[kickoff,matchup,competition,tv]=cells;
        if(/kick-off/i.test(kickoff)||!/vs/i.test(matchup))return;
        const parts=matchup.split(/\s+vs\s+/i);
        allSchedules[selectedDate].push({kickoff,matchup,home:(parts[0]||"").trim(),away:(parts[1]||"").trim(),competition,tv,tvFree:[],tvPaid:[]});
        count++;
      });
      setStatus(`✓ Import ${count} pertandingan`,"ok");
      await applyDate(selectedDate);
    }catch(err){setStatus(`Gagal import: ${err.message}`,"err");}
  };
  reader.readAsText(file,"UTF-8");
}

// ═══════════════════════════════════════════════════
// DOWNLOAD PNG
// ═══════════════════════════════════════════════════
async function downloadPNG(){
  if(!allMatches.length)return;
  btnDlPng.disabled=true;
  const pages=getPages();
  setStatus(`Membuat ${pages.length} PNG...`,"loading");
  try{
    const oc=document.createElement("canvas");oc.width=W;oc.height=H;
    const octx=oc.getContext("2d");
    for(let p=0;p<pages.length;p++){
      await renderPNGPage(octx,pages[p],p+1,pages.length);
      await new Promise(r=>setTimeout(r,60));
      const suf=pages.length>1?`-part${p+1}of${pages.length}`:"";
      const a=document.createElement("a");
      a.download=`jadwal-${currentTheme}-${selectedDate}${suf}.png`;
      a.href=oc.toDataURL("image/png");a.click();
      if(p<pages.length-1)await new Promise(r=>setTimeout(r,350));
    }
    setStatus(`✓ ${pages.length} PNG didownload`,"ok");
  }catch(e){setStatus(`Gagal: ${e.message}`,"err");}
  finally{btnDlPng.disabled=false;}
}

// ═══════════════════════════════════════════════════
// DOWNLOAD VIDEO
// ═══════════════════════════════════════════════════
async function downloadVideo(){
  if(!allMatches.length)return;
  if(!window.MediaRecorder){setStatus("Browser tidak support MediaRecorder. Gunakan Chrome/Edge.","err");return;}
  const mimes=["video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm","video/mp4"];
  const mime=mimes.find(m=>MediaRecorder.isTypeSupported(m))||"video/webm";

  stopVideoPreview();
  btnDlVideo.disabled=true;btnDlPng.disabled=true;
  vidProgress.classList.add("show");
  setStatus("Merender video...","loading");

  try{
    const t=getT();
    const brand=await loadBrand();
    const FPS=30,slideDur=parseInt($("#sel-dur").value)||4;
    const animDur=Math.min(0.5,slideDur*0.2);
    const animFrames=Math.round(animDur*FPS);
    const slideFrames=Math.round(slideDur*FPS);
    const total=allMatches.length*slideFrames+Math.round(0.4*FPS);

    const vc=document.createElement("canvas");vc.width=W;vc.height=H;
    const vctx=vc.getContext("2d");
    const stream=vc.captureStream(FPS);
    const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:8_000_000});
    const chunks=[];
    rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    rec.start(100);

    let frame=0;
    for(let mi=0;mi<allMatches.length;mi++){
      const m=allMatches[mi];
      for(let f=0;f<slideFrames;f++){
        const prog=f<animFrames?f/animFrames:1;
        await renderVideoSlide(vctx,m,t,brand,prog);
        frame++;
        if(frame%8===0){
          const pct=Math.round(frame/total*100);
          vpBar.style.width=pct+"%";
          vpLabel.textContent=`Slide ${mi+1}/${allMatches.length} · ${pct}%`;
          setStatus(`Merender video... ${pct}%`,"loading");
        }
        await new Promise(r=>setTimeout(r,0));
      }
    }
    // fade out
    for(let f=0;f<Math.round(0.4*FPS);f++){
      await renderVideoSlide(vctx,allMatches[allMatches.length-1],t,brand,1);
      vctx.fillStyle=`rgba(0,0,0,${f/Math.round(0.4*FPS)})`;vctx.fillRect(0,0,W,H);
      await new Promise(r=>setTimeout(r,0));
    }

    rec.stop();
    await new Promise(r=>rec.onstop=r);
    const blob=new Blob(chunks,{type:mime});
    const ext=mime.includes("mp4")?"mp4":"webm";
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.download=`jadwal-${currentTheme}-${selectedDate}.${ext}`;
    a.href=url;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    setStatus(`✓ Video ${ext.toUpperCase()} (${allMatches.length} slide) didownload`,"ok");
  }catch(e){setStatus(`Gagal render video: ${e.message}`,"err");console.error(e);}
  finally{
    btnDlVideo.disabled=false;btnDlPng.disabled=!allMatches.length;
    vidProgress.classList.remove("show");vpBar.style.width="0%";
    // restart preview
    if(previewMode==="video")startVideoPreview();
  }
}

// ═══════════════════════════════════════════════════
// THEME PICKER
// ═══════════════════════════════════════════════════
function buildThemePicker(){
  const grid=$("#theme-grid");
  grid.innerHTML=Object.entries(THEMES).map(([id,t])=>`
    <div class="t-card${id===currentTheme?" on":""}" data-id="${id}">
      <div class="t-swatch" style="background:${t.swatch}"></div>
      <div class="t-name">${t.name}</div>
    </div>`).join("");
  grid.querySelectorAll(".t-card").forEach(c=>{
    c.addEventListener("click",()=>{
      currentTheme=c.dataset.id;
      grid.querySelectorAll(".t-card").forEach(x=>x.classList.toggle("on",x.dataset.id===currentTheme));
      saveSettings();
      if(previewMode==="png")showPNGPreview();else startVideoPreview();
    });
  });
}

// ═══════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════
const SK="ck-v3";
function saveSettings(){
  localStorage.setItem(SK,JSON.stringify({header:inpHeader.value,tiktok:inpTiktok.value,footer:inpFooter.value,theme:currentTheme,date:selectedDate}));
}
function loadSettings(){
  try{
    const s=JSON.parse(localStorage.getItem(SK)||"{}");
    if(s.header)inpHeader.value=s.header;if(s.tiktok)inpTiktok.value=s.tiktok;
    if(s.footer)inpFooter.value=s.footer;if(s.theme&&THEMES[s.theme])currentTheme=s.theme;
    if(s.date&&/^\d{4}-\d{2}-\d{2}$/.test(s.date))selectedDate=s.date;
  }catch{}
}

// ═══════════════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════════════

// Export type tabs
$("#exp-tabs").querySelectorAll(".exp-tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    exportMode=tab.dataset.t;
    $("#exp-tabs").querySelectorAll(".exp-tab").forEach(t=>t.classList.toggle("on",t.dataset.t===exportMode));
    $("#opt-png").style.display=exportMode==="png"?"flex":"none";
    $("#opt-video").style.display=exportMode==="video"?"flex":"none";
  });
});

// Preview mode tabs
$(".prev-tabs").querySelectorAll(".prev-tab").forEach(tab=>{
  tab.addEventListener("click",async()=>{
    previewMode=tab.dataset.m;
    $(".prev-tabs").querySelectorAll(".prev-tab").forEach(t=>t.classList.toggle("on",t.dataset.m===previewMode));
    canvasNav.style.display=previewMode==="png"?"flex":"none";
    vidOverlay.style.display=previewMode==="video"?"flex":"none";
    if(previewMode==="png"){stopVideoPreview();await showPNGPreview();}
    else{await startVideoPreview();}
    renderMatchList();
  });
});

// Video play/pause overlay
vidOverlay.addEventListener("click",()=>{
  if(vidPlaying){stopVideoPreview();vidOverlay.querySelector(".vid-play svg").innerHTML='<path d="M8 5v14l11-7z"/>';}
  else{startVideoPreview();vidOverlay.querySelector(".vid-play svg").innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';}
});

// Branding inputs
[inpHeader,inpTiktok,inpFooter].forEach(el=>{
  el.addEventListener("input",()=>{saveSettings();if(previewMode==="png")showPNGPreview();});
});

// Date
datePicker.addEventListener("change",e=>{saveSettings();applyDate(e.target.value);});
$("#btn-today").addEventListener("click",()=>applyDate(todayISO()));
$("#btn-refresh").addEventListener("click",fetchSchedule);

// Per-page
$("#sel-perpage").addEventListener("change",()=>{
  previewPage=0;
  const tp=Math.ceil(allMatches.length/perPage());
  btnDlPng.textContent=tp>1?`⚡ Download ${tp} PNG`:"⚡ Download PNG";
  renderMatchList();showPNGPreview();
});

// Nav
navPrev.addEventListener("click",()=>{previewPage--;renderMatchList();showPNGPreview();});
navNext.addEventListener("click",()=>{previewPage++;renderMatchList();showPNGPreview();});

// Download
btnDlPng.addEventListener("click",downloadPNG);
btnDlVideo.addEventListener("click",downloadVideo);

// Preview video button
$("#btn-preview-vid").addEventListener("click",async()=>{
  // Switch to video preview tab
  previewMode="video";
  $(".prev-tabs").querySelectorAll(".prev-tab").forEach(t=>t.classList.toggle("on",t.dataset.m==="video"));
  canvasNav.style.display="none";vidOverlay.style.display="flex";
  await startVideoPreview();renderMatchList();
});

// Import
$("#file-import").addEventListener("change",e=>{const f=e.target.files[0];if(f)importHtmlFile(f);e.target.value="";});

// ── INIT ──
loadSettings();
datePicker.value=selectedDate;
buildThemePicker();
canvasNav.style.display="flex";
vidOverlay.style.display="none";
fetchSchedule();
</script>
