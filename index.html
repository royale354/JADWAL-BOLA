<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jadwal Bola — Generator PNG TikTok</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #060913;
      color: #f1f5f9;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }

    .app-layout {
      display: grid;
      grid-template-columns: minmax(300px, 380px) 1fr;
      gap: 28px;
      max-width: 1280px;
      margin: 0 auto;
      align-items: start;
    }

    @media (max-width: 960px) {
      .app-layout { grid-template-columns: 1fr; }
      .preview-panel { justify-content: center; }
    }

    .sidebar {
      background: #111625;
      padding: 22px;
      border-radius: 14px;
      border: 1px solid #1e293b;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
      position: sticky;
      top: 16px;
    }

    .sidebar h1 { font-size: 1.35rem; font-weight: 800; color: #22c55e; }
    .sidebar > p { font-size: 0.82rem; color: #94a3b8; margin: 6px 0 16px; }

    .branding-inputs {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 14px;
      background: #0b0f19;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #1e2942;
    }
    .branding-inputs label {
      display: flex;
      flex-direction: column;
      font-size: 0.72rem;
      color: #64748b;
      font-weight: 700;
      gap: 4px;
    }
    .branding-inputs input {
      background: #111625;
      border: 1px solid #334155;
      color: #fff;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      outline: none;
    }
    .branding-inputs input:focus { border-color: #22c55e; }

    .section-label {
      font-size: 0.72rem;
      font-weight: 800;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 14px 0 8px;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .theme-card {
      cursor: pointer;
      border: 2px solid #334155;
      border-radius: 10px;
      padding: 10px;
      background: #0b0f19;
      transition: border-color 0.2s, transform 0.15s;
    }
    .theme-card:hover { transform: translateY(-1px); }
    .theme-card.active { border-color: #22c55e; box-shadow: 0 0 0 1px #22c55e44; }
    .theme-card input { display: none; }
    .theme-swatch {
      height: 28px;
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .theme-card span {
      font-size: 0.75rem;
      font-weight: 700;
      color: #cbd5e1;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    input[type="date"] {
      background: #1e293b;
      color: #fff;
      border: 1px solid #334155;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.88rem;
      outline: none;
      color-scheme: dark;
      width: 100%;
    }
    input[type="file"] { display: none; }

    button, .file-label {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 0.85rem;
      font-weight: 700;
      transition: opacity 0.2s, transform 0.2s;
    }
    button:hover, .file-label:hover { opacity: 0.92; transform: translateY(-1px); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      box-shadow: 0 4px 14px rgba(34, 197, 94, 0.35);
      width: 100%;
      margin-top: 10px;
      padding: 13px;
      font-size: 0.92rem;
    }
    .btn-secondary { background: #2563eb; color: #fff; flex: 1; }
    .btn-ghost { background: #334155; color: #e2e8f0; flex: 1; }
    .btn-warn { background: #475569; color: #fff; font-size: 0.8rem; }

    .status {
      margin-top: 12px;
      font-size: 0.82rem;
      color: #eab308;
      font-weight: 600;
      line-height: 1.4;
    }
    .status.success { color: #22c55e; }
    .status.error { color: #f87171; }

    .preview-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .preview-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    #export-area {
      width: 100%;
      max-width: 430px;
      aspect-ratio: 9 / 16;
      max-height: min(82vh, 780px);
      background-color: var(--t-bg, #070a13);
      background-image: var(--t-preview-bg, none);
      background-size: cover;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.65), 0 0 40px var(--t-glow, transparent);
      border: 2px solid var(--t-border, #1e2942);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #export-area::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--t-deco-overlay, none);
      background-size: var(--t-deco-size, auto);
      pointer-events: none;
      z-index: 0;
    }

    .bg-watermark {
      position: absolute;
      inset: -20%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      justify-content: center;
      gap: 28px 36px;
      transform: rotate(-24deg);
      opacity: 1;
    }
    .bg-watermark span {
      font-size: clamp(0.85rem, 3.2vw, 1.15rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--t-wm-fg, rgba(255, 255, 255, 0.045));
      white-space: nowrap;
      user-select: none;
    }

    #export-area .banner,
    #export-area .match-container,
    #export-area .watermark-footer {
      position: relative;
      z-index: 1;
    }

    .preview-msg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.03);
      font-size: 1.8rem;
      font-weight: 900;
      text-align: center;
      pointer-events: none;
      letter-spacing: 2px;
    }

    .banner {
      padding: 16px 16px 10px;
      text-align: center;
      flex-shrink: 0;
      background: linear-gradient(180deg, var(--t-glow-top, rgba(34, 197, 94, 0.12)) 0%, transparent 100%);
    }
    .brand-logo {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 10px;
      border: 2px solid var(--t-accent, #22c55e);
      box-shadow: 0 4px 24px var(--t-accent-glow, rgba(34, 197, 94, 0.4));
    }
    .brand-logo-footer {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 6px;
      border: 1px solid var(--t-border, #334155);
    }
    .banner h2 {
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--t-text, #fff);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.2;
      text-shadow: 0 0 20px var(--t-accent-glow, transparent);
    }
    .banner .title-bar {
      width: 56px;
      height: 3px;
      margin: 8px auto 0;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, var(--t-accent, #22c55e), transparent);
    }
    .banner .date-label {
      font-size: 0.72rem;
      color: var(--t-sub, #94a3b8);
      margin-top: 6px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .match-container {
      padding: 8px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .sim-card {
      background: var(--t-card, #111625);
      border-radius: 14px;
      border: 1px solid var(--t-border, #1e2942);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      padding: 8px 10px;
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto;
      gap: 6px 10px;
      align-items: center;
      font-size: 0.7rem;
    }
    .sim-time {
      grid-row: 1 / 3;
      align-self: center;
      font-weight: 800;
      color: var(--t-accent, #22c55e);
      background: var(--t-time-bg, #070a13);
      border: 1px solid var(--t-border, #1e2942);
      padding: 6px 8px;
      border-radius: 10px;
      box-shadow: 0 0 12px var(--t-accent-glow, transparent);
      font-size: 0.72rem;
      line-height: 1.2;
      text-align: center;
      min-width: 44px;
    }
    .sim-time small {
      display: block;
      font-size: 0.55rem;
      color: var(--t-sub, #64748b);
      font-weight: 700;
    }
    .sim-teams {
      grid-column: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--t-text, #fff);
      min-width: 0;
    }
    .team-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      flex: 1 1 0;
      min-width: 0;
    }
    .team-block img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .team-name {
      font-weight: 700;
      font-size: 0.68rem;
      line-height: 1.2;
      text-align: center;
      word-break: break-word;
      hyphens: auto;
      max-width: 100%;
      margin-top: 7px;
    }
    .vs-label {
      color: var(--t-sub, #64748b);
      font-size: 0.58rem;
      font-weight: 800;
      flex-shrink: 0;
      padding: 0 2px;
    }
    .sim-tv {
      grid-column: 2;
      grid-row: 2;
      color: var(--t-tv, #fbbf24);
      font-weight: 700;
      font-size: 0.58rem;
      line-height: 1.25;
      text-align: center;
      word-break: break-word;
      padding-top: 2px;
      border-top: 1px solid var(--t-border, #1e2942);
    }

    .watermark-footer {
      background: var(--t-footer-bg, #000);
      padding: 10px 12px;
      text-align: center;
      font-size: 0.62rem;
      color: var(--t-sub, #94a3b8);
      font-weight: 700;
      border-top: 1px solid var(--t-border, #111625);
      flex-shrink: 0;
      line-height: 1.3;
    }
  </style>
</head>
<body>

  <div class="app-layout">
    <aside class="sidebar">
      <h1>⚽ Generator Jadwal Bola</h1>
      <p>Input kiri · Preview kanan · Pilih tema PNG</p>

      <div class="branding-inputs">
        <label>JUDUL ATAS (HEADER)
          <input type="text" id="input-header" value="KREATOR JADWAL BOLA" />
        </label>
        <label>NAMA TIKTOK (watermark background)
          <input type="text" id="input-tiktok" value="@CORNERKIICK" placeholder="@username" />
        </label>
        <label>BAR SOSIAL MEDIA (FOOTER)
          <input type="text" id="input-footer" value="🎵 CORNERKIICK  |  📸 CORNERKIICK  |  📺 CORNERKIICK" />
        </label>
      </div>

      <p class="section-label">Tema PNG TikTok</p>
      <div class="theme-grid" id="theme-grid"></div>

      <p class="section-label">Jadwal</p>
      <input type="date" id="date-picker" />
      <div class="controls" style="margin-top:10px">
        <button class="btn-ghost" id="btn-today" type="button">Hari Ini</button>
        <button class="btn-secondary" id="btn-refresh" type="button">↻ Muat</button>
      </div>
      <input type="file" id="file-import" accept=".html,.htm,text/html" />
      <label class="file-label btn-warn" for="file-import" style="display:block;text-align:center;margin-top:8px">📂 Import HTML</label>

      <button class="btn-primary" id="btn-download" type="button" disabled>⚡ DOWNLOAD PNG 9:16</button>
      <div class="status" id="status">Memuat data...</div>
    </aside>

    <main class="preview-panel">
      <span class="preview-label">Preview live</span>
      <div id="export-area" data-theme="stadium">
        <div class="bg-watermark" id="bg-watermark" aria-hidden="true"></div>
        <div class="preview-msg">PREVIEW</div>
        <div class="banner">
          <img class="brand-logo" id="brand-logo" src="" alt="CORNERKIICK" />
          <h2 id="view-header">KREATOR JADWAL BOLA</h2>
          <div class="title-bar"></div>
          <div class="date-label" id="display-date">—</div>
        </div>
        <div id="match-list" class="match-container"></div>
        <div class="watermark-footer">
          <img class="brand-logo-footer" id="brand-logo-footer" src="" alt="CORNERKIICK" />
          <div id="view-footer">🎵 CORNERKIICK  |  📸 CORNERKIICK  |  📺 CORNERKIICK</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const BULAN_ID = ["", "Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    const HARI_ID = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];

    const THEME_ALIASES = {
      neon: "stadium", midnight: "cyber", fire: "inferno", royal: "goldcup", clean: "studio",
    };

    const THEMES = {
      stadium: {
        name: "⚽ Lapangan",
        deco: "stadium",
        swatch: "linear-gradient(145deg,#061208 30%,#4ade80 100%)",
        previewBg: "radial-gradient(ellipse 80% 50% at 50% 0%, rgba(74,222,128,0.2), transparent 70%), linear-gradient(180deg, #0a1a10 0%, #061208 100%)",
        decoOverlay: "repeating-linear-gradient(0deg, transparent, transparent 18px, rgba(255,255,255,0.02) 18px, rgba(255,255,255,0.02) 36px)",
        bg: "#061208", bg2: "#0f2918",
        card: "rgba(14,26,18,0.94)", cardHi: "rgba(22,40,28,0.98)",
        timeBg: "#0a1810", border: "#2d6b45",
        text: "#f0fdf4", sub: "#86efac",
        accent: "#4ade80", accentGlow: "rgba(74,222,128,0.55)",
        tv: "#fde047", tvFree: "#4ade80",
        footerBg: "#040a06", glow: "rgba(74,222,128,0.35)",
        glowTop: "rgba(74,222,128,0.28)", glowBottom: "rgba(34,197,94,0.12)",
        borders: ["#4ade80", "#22d3ee", "#facc15", "#34d399"],
        wm: "rgba(255,255,255,0.03)",
      },
      cyber: {
        name: "🌐 Neon Cyber",
        deco: "cyber",
        swatch: "linear-gradient(145deg,#0a0a1a 30%,#22d3ee 50%,#e879f9 100%)",
        previewBg: "radial-gradient(circle at 20% 20%, rgba(34,211,238,0.25), transparent 45%), radial-gradient(circle at 80% 80%, rgba(232,121,249,0.2), transparent 45%), linear-gradient(180deg, #0a0a1a, #050510)",
        decoOverlay: "linear-gradient(rgba(34,211,238,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(34,211,238,0.04) 1px, transparent 1px)",
        bg: "#050510", bg2: "#0f1030",
        card: "rgba(12,14,40,0.92)", cardHi: "rgba(18,22,55,0.98)",
        timeBg: "#0a0c28", border: "#312e81",
        text: "#f0f9ff", sub: "#a5b4fc",
        accent: "#22d3ee", accentGlow: "rgba(34,211,238,0.6)",
        tv: "#f0abfc", tvFree: "#34d399",
        footerBg: "#030308", glow: "rgba(34,211,238,0.4)",
        glowTop: "rgba(34,211,238,0.3)", glowBottom: "rgba(232,121,249,0.2)",
        borders: ["#22d3ee", "#e879f9", "#818cf8", "#38bdf8"],
        wm: "rgba(255,255,255,0.035)",
      },
      goldcup: {
        name: "🏆 Trofi Emas",
        deco: "gold",
        swatch: "linear-gradient(145deg,#1a1208 30%,#fbbf24 100%)",
        previewBg: "radial-gradient(ellipse at 50% 0%, rgba(251,191,36,0.25), transparent 55%), linear-gradient(160deg, #1a1208, #0c0804)",
        decoOverlay: "repeating-linear-gradient(45deg, transparent, transparent 12px, rgba(251,191,36,0.03) 12px, rgba(251,191,36,0.03) 24px)",
        bg: "#0c0804", bg2: "#1f1608",
        card: "rgba(28,20,8,0.94)", cardHi: "rgba(40,30,12,0.98)",
        timeBg: "#141008", border: "#78590a",
        text: "#fffbeb", sub: "#fcd34d",
        accent: "#fbbf24", accentGlow: "rgba(251,191,36,0.55)",
        tv: "#fde68a", tvFree: "#86efac",
        footerBg: "#060402", glow: "rgba(251,191,36,0.35)",
        glowTop: "rgba(251,191,36,0.22)", glowBottom: "rgba(180,83,9,0.18)",
        borders: ["#fbbf24", "#f59e0b", "#fcd34d", "#d97706"],
        wm: "rgba(255,255,255,0.03)",
      },
      inferno: {
        name: "🔥 Champions",
        deco: "inferno",
        swatch: "linear-gradient(145deg,#1a0505 30%,#ef4444 60%,#f97316 100%)",
        previewBg: "radial-gradient(ellipse at 50% 100%, rgba(239,68,68,0.35), transparent 55%), radial-gradient(ellipse at 30% 0%, rgba(249,115,22,0.2), transparent 50%), linear-gradient(180deg, #1a0505, #0a0202)",
        decoOverlay: "radial-gradient(circle at 50% 120%, rgba(239,68,68,0.12), transparent 50%)",
        bg: "#0a0202", bg2: "#1f0808",
        card: "rgba(30,10,10,0.94)", cardHi: "rgba(45,15,15,0.98)",
        timeBg: "#180606", border: "#7f1d1d",
        text: "#fff5f5", sub: "#fca5a5",
        accent: "#f87171", accentGlow: "rgba(248,113,113,0.55)",
        tv: "#fde047", tvFree: "#4ade80",
        footerBg: "#050101", glow: "rgba(239,68,68,0.4)",
        glowTop: "rgba(239,68,68,0.28)", glowBottom: "rgba(249,115,22,0.22)",
        borders: ["#ef4444", "#f97316", "#fbbf24", "#dc2626"],
        wm: "rgba(255,255,255,0.035)",
      },
      studio: {
        name: "📺 Studio TV",
        deco: "studio",
        swatch: "linear-gradient(145deg,#0f172a 30%,#3b82f6 100%)",
        previewBg: "radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.2), transparent 60%), linear-gradient(180deg, #0f172a, #020617)",
        decoOverlay: "linear-gradient(90deg, rgba(59,130,246,0.06) 1px, transparent 1px)",
        bg: "#020617", bg2: "#0f172a",
        card: "rgba(15,23,42,0.94)", cardHi: "rgba(30,41,59,0.98)",
        timeBg: "#0f172a", border: "#334155",
        text: "#f8fafc", sub: "#94a3b8",
        accent: "#60a5fa", accentGlow: "rgba(96,165,250,0.5)",
        tv: "#fbbf24", tvFree: "#34d399",
        footerBg: "#010409", glow: "rgba(59,130,246,0.35)",
        glowTop: "rgba(59,130,246,0.25)", glowBottom: "rgba(99,102,241,0.15)",
        borders: ["#3b82f6", "#60a5fa", "#fbbf24", "#6366f1"],
        wm: "rgba(255,255,255,0.03)",
      },
    };

    let currentTheme = "stadium";

    const BASE = (() => {
      const path = location.pathname;
      if (path.endsWith("/")) return path;
      const slash = path.lastIndexOf("/");
      return slash > 0 ? path.slice(0, slash + 1) : "/";
    })();
    const asset = (p) => BASE + p.replace(/^\//, "");

    const BRAND_LOGO_PATHS = [
      "assets/branding/CORNERKIICK.png",
      "CORNERKIICK.png",
    ];
    let brandLogoImg = null;

    let allSchedules = {};
    let selectedDate = todayISO();
    let staticLogos = null;
    const logoCache = {};

    const $ = (s) => document.querySelector(s);
    const datePicker = $("#date-picker");
    const statusEl = $("#status");
    const matchList = $("#match-list");
    const displayDate = $("#display-date");
    const btnDownload = $("#btn-download");
    const inputHeader = $("#input-header");
    const inputTiktok = $("#input-tiktok");
    const inputFooter = $("#input-footer");
    const exportArea = $("#export-area");
    const SETTINGS_KEY = "jadwal-bola-settings";

    function getTiktokWmText() {
      let v = (inputTiktok.value || "").trim();
      if (!v) return "";
      v = v.replace(/^@+/, "");
      return "@" + v.toUpperCase();
    }

    function updateBgWatermark() {
      const el = $("#bg-watermark");
      const text = getTiktokWmText();
      if (!text) {
        el.innerHTML = "";
        return;
      }
      el.innerHTML = Array(16).fill(`<span>${escapeHtml(text)}</span>`).join("");
    }

    function loadSettings() {
      try {
        const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
        if (s.header) inputHeader.value = s.header;
        if (s.tiktok) inputTiktok.value = s.tiktok;
        if (s.footer) inputFooter.value = s.footer;
        if (s.theme) {
          const id = THEME_ALIASES[s.theme] || s.theme;
          if (THEMES[id]) currentTheme = id;
        }
        if (s.lastDate && /^\d{4}-\d{2}-\d{2}$/.test(s.lastDate)) selectedDate = s.lastDate;
      } catch (_) { /* ignore */ }
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        header: inputHeader.value,
        tiktok: inputTiktok.value,
        footer: inputFooter.value,
        theme: currentTheme,
        lastDate: selectedDate,
      }));
    }

    function setSelectedDate(iso) {

    async function loadStaticLogos() {
      if (staticLogos) return staticLogos;
      try {
        const res = await fetch(asset("logos.json?v=3"));
        if (!res.ok) throw new Error(`logos.json HTTP ${res.status}`);
        staticLogos = await res.json();
      } catch (e) {
        console.warn("Gagal muat logos.json:", e);
        staticLogos = { teams: {}, leagues: {} };
      }
      return staticLogos;
    }

    function slugifyName(name) {
      return name.toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "unknown";
    }

    function isRemotePath(p) {
      return /^https?:\/\//i.test(p || "");
    }

    function logoBasePath(mapped, folder, name) {
      if (mapped && !isRemotePath(mapped)) {
        return mapped.replace(/\.(png|svg|jpg|jpeg|webp)$/i, "");
      }
      return `assets/logos/${folder}/${slugifyName(name)}`;
    }

    function findBadge(map, name) {
      if (!map || !name) return null;
      if (map[name] && !isRemotePath(map[name])) return map[name];
      const norm = normalizeName(name);
      let best = null;
      let bestLen = 0;
      for (const [key, url] of Object.entries(map)) {
        if (isRemotePath(url)) continue;
        const kn = normalizeName(key);
        if (norm === kn) return url;
        if (norm.includes(kn) || kn.includes(norm)) {
          if (key.length > bestLen) {
            best = url;
            bestLen = key.length;
          }
        }
      }
      return best;
    }

    function resolveTeamLogo(name) {
      const mapped = staticLogos ? findBadge(staticLogos.teams, name) : null;
      return logoBasePath(mapped, "teams", name);
    }

    function resolveLeagueLogo(comp) {
      const mapped = staticLogos ? findBadge(staticLogos.leagues, comp) : null;
      return logoBasePath(mapped, "leagues", comp);
    }

    function resolveLogoPath(pathOrUrl) {
      if (!pathOrUrl || isRemotePath(pathOrUrl)) return null;
      return asset(pathOrUrl);
    }

    function logoTag(basePath, alt) {
      const urls = localPathCandidates(basePath).map((c) => resolveLogoPath(c)).filter(Boolean);
      if (!urls.length) return "";
      const list = JSON.stringify(urls);
      return `<img src="${escapeHtml(urls[0])}" alt="${escapeHtml(alt)}" loading="lazy" data-logos='${list.replace(/'/g, "&#39;")}' onerror="(function(el){var u=JSON.parse(el.dataset.logos);var n=+(el.dataset.i||0)+1;el.dataset.i=n;if(n<u.length)el.src=u[n];else el.style.visibility='hidden'})(this)">`;
    }

    function cacheLogo(img, pathOrUrl, resolvedSrc) {
      logoCache[pathOrUrl] = img;
      if (resolvedSrc) logoCache[resolvedSrc] = img;
    }

    function logoKey(pathOrUrl) {
      return (pathOrUrl || "").replace(/\.(png|svg|jpg|jpeg|webp)$/i, "");
    }

    function getCachedLogo(pathOrUrl) {
      if (!pathOrUrl) return null;
      const key = logoKey(pathOrUrl);
      return logoCache[pathOrUrl] || logoCache[key] || logoCache[resolveLogoPath(pathOrUrl)] || logoCache[resolveLogoPath(key)] || null;
    }

    function localPathCandidates(pathOrUrl) {
      if (!pathOrUrl || isRemotePath(pathOrUrl)) return [];
      const base = pathOrUrl.replace(/\.(png|svg|jpg|jpeg|webp)$/i, "");
      const exts = [".png", ".svg", ".jpg", ".webp"];
      return exts.map((ext) => base + ext).filter((p, i, a) => a.indexOf(p) === i);
    }

    function tryLoadOne(pathOrUrl) {
      const src = resolveLogoPath(pathOrUrl);
      if (!src) return Promise.resolve(null);
      const cached = getCachedLogo(pathOrUrl);
      if (cached) return Promise.resolve(cached);

      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          cacheLogo(img, pathOrUrl, src);
          cacheLogo(img, logoKey(pathOrUrl), src);
          resolve(img);
        };
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    async function loadImage(pathOrUrl) {
      if (!pathOrUrl) return null;
      const cached = getCachedLogo(pathOrUrl);
      if (cached) return cached;
      for (const c of localPathCandidates(pathOrUrl)) {
        const img = await tryLoadOne(c);
        if (img) {
          cacheLogo(img, logoKey(pathOrUrl), resolveLogoPath(c));
          return img;
        }
      }
      return null;
    }

    function setupBrandLogoPreview() {
      const url = asset(BRAND_LOGO_PATHS[0]);
      const header = $("#brand-logo");

      if (header) {

    async function loadBrandLogo() {
      if (brandLogoImg) return brandLogoImg;
      for (const p of BRAND_LOGO_PATHS) {
        for (const c of localPathCandidates(p)) {
          const img = await tryLoadOne(c);
          if (img) {
            brandLogoImg = img;

      return null;
    }

    function drawBrandLogoCircle(ctx, cx, cy, size, t, img) {
      if (!img) return;
      const r = size / 2;
      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.55)";
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(img, cx - r, cy - r, size, size);
      ctx.restore();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = t.accent;
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.9;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    function shortTv(m) {
      const parts = (m.tvFree || []).concat(m.tvPaid || []);
      return parts.length ? parts.join(" · ") : (m.tv || "-");

    function importHtmlFile(file) {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const doc = new DOMParser().parseFromString(e.target.result, "text/html");
          const rows = doc.querySelectorAll("table tr");
          if (!rows.length) throw new Error("Tabel jadwal tidak ditemukan.");
          let count = 0;
          const fileDate = selectedDate;
          rows.forEach((tr) => {
            const cells = [...tr.querySelectorAll("td")].map((td) => td.textContent.trim());
            if (cells.length < 4) return;
            const [kickoff, matchup, competition, tv] = cells;
            if (/kick-off/i.test(kickoff) || !/vs/i.test(matchup)) return;
            const parts = matchup.split(/\s+vs\s+/i);
            if (!allSchedules[fileDate]) allSchedules[fileDate] = [];
            allSchedules[fileDate].push({
              kickoff,
              matchup,
              home: (parts[0] || "").trim(),
              away: (parts[1] || "").trim(),
              competition,
              tv,
              tvFree: [],
              tvPaid: [],
            });
            count++;
          });
          await loadStaticLogos();
          setStatus(`✓ Import ${count} pertandingan.`, "success");
          renderMatches(selectedDate);
        } catch (err) {
          setStatus(`Gagal import: ${err.message}`, "error");
        }
      };
      reader.readAsText(file, "UTF-8");
    }

    const PNG_W = 1080;
    const PNG_H = 1920;

    function drawRoundRect(ctx, x, y, w, h, r, fill, stroke, sw) {
      const rad = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rad, y);
      ctx.lineTo(x + w - rad, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + rad);
      ctx.lineTo(x + w, y + h - rad);
      ctx.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
      ctx.lineTo(x + rad, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - rad);
      ctx.lineTo(x, y + rad);
      ctx.quadraticCurveTo(x, y, x + rad, y);
      ctx.closePath();
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw || 2; ctx.stroke(); }
    }

    function drawDecoStadium(ctx, W, H, t) {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, t.bg2); g.addColorStop(0.45, t.bg); g.addColorStop(1, t.bg2);
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "rgba(74,222,128,0.04)";
      for (let i = 0; i < 14; i++) ctx.fillRect(0, i * (H / 14), W, H / 28);
      ctx.strokeStyle = "rgba(255,255,255,0.07)"; ctx.lineWidth = 3;
      const cy = H * 0.42;
      ctx.beginPath(); ctx.arc(W / 2, cy, 200, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(50, cy); ctx.lineTo(W - 50, cy); ctx.stroke();
      ctx.strokeRect(50, cy - 140, W - 100, 280);
    }

    function drawDecoCyber(ctx, W, H, t) {
      const g = ctx.createLinearGradient(0, 0, W, H);
      g.addColorStop(0, t.bg2); g.addColorStop(1, t.bg);
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = "rgba(34,211,238,0.07)"; ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 48) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
      for (let y = 0; y < H; y += 48) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
      const spots = [[0.15, 0.12, "rgba(34,211,238,0.35)"], [0.85, 0.88, "rgba(232,121,249,0.3)"]];
      spots.forEach(([px, py, col]) => {
        const rg = ctx.createRadialGradient(px * W, py * H, 0, px * W, py * H, 320);
        rg.addColorStop(0, col); rg.addColorStop(1, "transparent");
        ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
      });
    }

    function drawDecoGold(ctx, W, H, t) {
      ctx.fillStyle = t.bg; ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = "rgba(251,191,36,0.08)"; ctx.lineWidth = 2;
      for (let i = -H; i < W + H; i += 56) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke();
      }
      const rg = ctx.createRadialGradient(W / 2, 0, 0, W / 2, 0, 500);
      rg.addColorStop(0, "rgba(251,191,36,0.2)"); rg.addColorStop(1, "transparent");
      ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
    }

    function drawDecoInferno(ctx, W, H, t) {
      const g = ctx.createLinearGradient(0, H, 0, 0);
      g.addColorStop(0, "rgba(239,68,68,0.35)"); g.addColorStop(0.4, t.bg); g.addColorStop(1, t.bg2);
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      const rg = ctx.createRadialGradient(W * 0.3, H * 0.15, 0, W * 0.3, H * 0.15, 400);
      rg.addColorStop(0, "rgba(249,115,22,0.25)"); rg.addColorStop(1, "transparent");
      ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
    }

    function drawDecoStudio(ctx, W, H, t) {
      ctx.fillStyle = t.bg; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "rgba(59,130,246,0.06)";
      for (let i = 0; i < 8; i++) ctx.fillRect(0, i * 120, W, 60);
      const rg = ctx.createRadialGradient(W / 2, 0, 0, W / 2, 0, 450);
      rg.addColorStop(0, "rgba(59,130,246,0.22)"); rg.addColorStop(1, "transparent");
      ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
    }

    function drawThemeBackground(ctx, W, H, t) {
      switch (t.deco) {
        case "cyber": drawDecoCyber(ctx, W, H, t); break;
        case "gold": drawDecoGold(ctx, W, H, t); break;
        case "inferno": drawDecoInferno(ctx, W, H, t); break;
        case "studio": drawDecoStudio(ctx, W, H, t); break;
        default: drawDecoStadium(ctx, W, H, t);
      }
      const gr1 = ctx.createRadialGradient(W / 2, 0, 80, W / 2, 0, 700);
      gr1.addColorStop(0, t.glowTop); gr1.addColorStop(1, "transparent");
      ctx.fillStyle = gr1; ctx.fillRect(0, 0, W, 700);
      const gr2 = ctx.createRadialGradient(W / 2, H, 80, W / 2, H, 600);
      gr2.addColorStop(0, t.glowBottom); gr2.addColorStop(1, "transparent");
      ctx.fillStyle = gr2; ctx.fillRect(0, H - 600, W, 600);
    }

    function pngLogoSize(rowH) {
      const tvZone = 56;
      const teamsH = rowH - tvZone - 14;
      const nameBlock = 2 * 28;
      const gap = 22;
      return Math.round(Math.min(78, Math.max(56, teamsH - nameBlock - gap)));
    }

    function pngNameGap(logoSize) {
      return Math.max(20, Math.round(logoSize * 0.34));
    }

    function drawLogoRing(ctx, x, y, size, t) {
      const r = size / 2 + 10;
      const g = ctx.createRadialGradient(x, y, r * 0.3, x, y, r);
      g.addColorStop(0, t.cardHi || t.card); g.addColorStop(1, t.border);
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();
      ctx.strokeStyle = t.accent; ctx.globalAlpha = 0.35; ctx.lineWidth = 2; ctx.stroke();
      ctx.globalAlpha = 1;
    }

    function wrapTeamName(ctx, text, maxW, maxLines) {
      const words = text.split(/\s+/);
      const lines = [];
      let line = "";
      for (const w of words) {
        const test = line ? line + " " + w : w;
        if (ctx.measureText(test).width <= maxW) {
          line = test;
        } else {
          if (line) lines.push(line);
          line = w;
          if (ctx.measureText(line).width > maxW) {
            let chunk = "";
            for (const ch of w) {
              if (ctx.measureText(chunk + ch).width <= maxW) chunk += ch;
              else {
                if (chunk) lines.push(chunk);
                chunk = ch;
              }
            }
            line = chunk;
          }
        }
      }
      if (line) lines.push(line);
      return lines.slice(0, maxLines);
    }

    function drawTeamBlock(ctx, name, logo, xCenter, logoY, maxW, logoSize, t) {
      const sz = logoSize || 64;
      const gap = pngNameGap(sz);
      const fontPx = Math.round(sz * 0.42);
      const lineH = Math.round(fontPx * 1.2);
      drawLogoRing(ctx, xCenter, logoY + sz / 2, sz, t);
      if (logo) ctx.drawImage(logo, xCenter - sz / 2, logoY, sz, sz);
      const textY = logoY + sz + gap;
      ctx.fillStyle = t.text;
      ctx.font = `bold ${fontPx}px 'Segoe UI', system-ui, sans-serif`;
      ctx.textAlign = "center";
      const lines = wrapTeamName(ctx, name, maxW, 2);
      lines.forEach((ln, i) => ctx.fillText(ln, xCenter, textY + i * lineH));
      return textY + lines.length * lineH;
    }

    function drawBackgroundWatermark(ctx, W, H, t) {
      const wmText = getTiktokWmText();
      if (!wmText) return;
      ctx.save();
      ctx.translate(W / 2, H / 2);
      ctx.rotate(-Math.PI / 6);
      ctx.fillStyle = t.wm;
      ctx.font = "900 68px 'Segoe UI', Impact, sans-serif";
      ctx.textAlign = "center";
      [-440, -300, -160, -20, 120, 260, 400].forEach((dy) => ctx.fillText(wmText, 0, dy));
      ctx.restore();
    }

    function drawHeaderPNG(ctx, W, t, brandImg) {
      const title = (inputHeader.value || "KREATOR JADWAL BOLA").toUpperCase();
      const dateStr = formatDateID(selectedDate).toUpperCase();

      let titleY = 108;
      if (brandImg) {
        const sz = 104;
        drawBrandLogoCircle(ctx, W / 2, 14 + sz / 2, sz, t, brandImg);
        titleY = 14 + sz + 32;
      }

      const barW = 220;
      const barG = ctx.createLinearGradient(W / 2 - barW, 0, W / 2 + barW, 0);
      barG.addColorStop(0, "transparent");
      barG.addColorStop(0.5, t.accent);
      barG.addColorStop(1, "transparent");
      ctx.fillStyle = barG;
      ctx.fillRect(W / 2 - barW, titleY + 42, barW * 2, 4);

      ctx.save();
      ctx.shadowColor = t.accentGlow || t.accent;
      ctx.shadowBlur = 24;
      ctx.fillStyle = t.text;
      ctx.font = "900 46px 'Segoe UI', 'Arial Black', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(title, W / 2, titleY);
      ctx.restore();

      const pillW = Math.min(ctx.measureText(dateStr).width + 48, W - 100);
      const dateY = titleY + 52;
      drawRoundRect(ctx, W / 2 - pillW / 2, dateY, pillW, 40, 20, t.cardHi || t.card, t.border, 1.5);
      ctx.fillStyle = t.sub;
      ctx.font = "bold 21px 'Segoe UI', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(dateStr, W / 2, dateY + 27);

      const lineY = dateY + 58;
      ctx.strokeStyle = t.border;
      ctx.globalAlpha = 0.4;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(48, lineY);
      ctx.lineTo(W - 48, lineY);
      ctx.stroke();
      ctx.globalAlpha = 1;
      return lineY + 16;
    }

    function getMatchesForDate(iso) {
      const raw = allSchedules[iso];
      if (Array.isArray(raw)) return raw;
      if (raw && typeof raw === "object") return [raw];
      return [];
    }

    function computePngLayout(matchCount, headerEnd, footerH) {
      const gap = 10;
      const n = Math.max(1, Math.min(Number(matchCount) || 0, 10));
      const listTop = Math.max(200, headerEnd);
      const listBottom = PNG_H - footerH;
      const avail = listBottom - listTop;
      let rowH = Math.floor((avail - gap * (n - 1)) / n);
      rowH = Math.min(185, Math.max(96, rowH));
      while (n > 0 && listTop + n * rowH + (n - 1) * gap > listBottom) {
        rowH--;
      }
      return { footerH, headerEnd: listTop, gap, rowH, n, listBottom };
    }

    function drawMatchRowPNG(ctx, m, y, rowH, t, borderCol) {
      const W = PNG_W;
      const cardX = 24;
      const cardW = W - 48;

      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.5)";
      ctx.shadowBlur = 20;
      ctx.shadowOffsetY = 8;
      drawRoundRect(ctx, cardX, y, cardW, rowH, 26, t.card, null);
      ctx.restore();

      ctx.fillStyle = borderCol;
      ctx.fillRect(cardX, y + 10, 7, rowH - 20);

      const timeX = cardX + 14;
      const timeW = 94;
      const timeH = rowH - 16;
      drawRoundRect(ctx, timeX, y + 8, timeW, timeH, 18, t.timeBg || t.bg, borderCol, 2.5);
      ctx.fillStyle = t.accent;
      ctx.font = "900 34px 'Segoe UI', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(m.kickoff, timeX + timeW / 2, y + rowH * 0.4);
      ctx.fillStyle = t.sub;
      ctx.font = "bold 15px 'Segoe UI', sans-serif";
      ctx.fillText("WIB", timeX + timeW / 2, y + rowH * 0.57);

      const contentX = cardX + 116;
      const contentW = cardW - 124;
      const cx = contentX + contentW / 2;
      const homeCx = contentX + contentW * 0.24;
      const awayCx = contentX + contentW * 0.76;
      const nameW = Math.floor(contentW * 0.46);
      const teamsTop = y + 10;
      const logoSize = pngLogoSize(rowH);

      const hImg = getCachedLogo(resolveTeamLogo(m.home));
      const aImg = getCachedLogo(resolveTeamLogo(m.away));
      drawTeamBlock(ctx, m.home, hImg, homeCx, teamsTop, nameW, logoSize, t);
      drawTeamBlock(ctx, m.away, aImg, awayCx, teamsTop, nameW, logoSize, t);

      const vsY = teamsTop + logoSize / 2 + 4;
      const vsPadW = 44;
      const vsG = ctx.createLinearGradient(cx - vsPadW, vsY, cx + vsPadW, vsY);
      vsG.addColorStop(0, "transparent");
      vsG.addColorStop(0.5, t.accent);
      vsG.addColorStop(1, "transparent");
      ctx.fillStyle = vsG;
      ctx.fillRect(cx - vsPadW - 4, vsY - 16, vsPadW * 2 + 8, 32);
      ctx.fillStyle = t.text;
      ctx.font = "900 20px 'Segoe UI', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("VS", cx, vsY + 7);

      const divY = y + rowH - 50;
      const divG = ctx.createLinearGradient(contentX, 0, contentX + contentW, 0);
      divG.addColorStop(0, "transparent");
      divG.addColorStop(0.5, t.border);
      divG.addColorStop(1, "transparent");
      ctx.strokeStyle = divG;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(contentX + 4, divY);
      ctx.lineTo(contentX + contentW - 4, divY);
      ctx.stroke();

      const tvStr = shortTv(m);
      ctx.fillStyle = (m.tvFree || []).length ? t.tvFree : t.tv;
      ctx.font = "900 24px 'Segoe UI', sans-serif";
      ctx.textAlign = "center";
      const tvLines = wrapTeamName(ctx, tvStr, contentW - 8, 2);
      tvLines.forEach((ln, j) => ctx.fillText(ln, cx, divY + 28 + j * 28));
    }

    async function downloadPNG() {
      const matches = getMatchesForDate(selectedDate);
      if (!matches.length) return;

      btnDownload.disabled = true;
      setStatus("Memuat logo untuk PNG...");

      try {
        await loadStaticLogos();
        const t = getTheme();
        const dataMatches = matches.slice(0, 10);
        const urls = [...new Set(
          dataMatches.flatMap((m) => [resolveTeamLogo(m.home), resolveTeamLogo(m.away), resolveLeagueLogo(m.competition)]).filter(Boolean)
        )];
        await Promise.all(urls.map(loadImage));
        const brandImg = await loadBrandLogo();

        const W = PNG_W;
        const H = PNG_H;
        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext("2d");
        ctx.textBaseline = "alphabetic";

        drawThemeBackground(ctx, W, H, t);
        drawBackgroundWatermark(ctx, W, H, t);
        const headerEnd = drawHeaderPNG(ctx, W, t, brandImg);
        const footerH = brandImg ? 100 : 82;
        const layout = computePngLayout(dataMatches.length, headerEnd, footerH);

        dataMatches.forEach((m, i) => {
          const y = layout.headerEnd + i * (layout.rowH + layout.gap);
          drawMatchRowPNG(ctx, m, y, layout.rowH, t, t.borders[i % t.borders.length]);
        });

        const footY = layout.listBottom;
        const footG = ctx.createLinearGradient(0, footY, 0, H);
        footG.addColorStop(0, t.footerBg);
        footG.addColorStop(1, "#000");
        ctx.fillStyle = footG;
        ctx.fillRect(0, footY, W, H - footY);
        const accentLine = ctx.createLinearGradient(0, footY, W, footY);
        accentLine.addColorStop(0, "transparent");
        accentLine.addColorStop(0.5, t.accent);
        accentLine.addColorStop(1, "transparent");
        ctx.strokeStyle = accentLine;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(40, footY);
        ctx.lineTo(W - 40, footY);
        ctx.stroke();
        if (brandImg) {
          drawBrandLogoCircle(ctx, W / 2, footY + 38, 56, t, brandImg);
        }
        ctx.fillStyle = t.sub;
        ctx.font = "bold 24px 'Segoe UI', sans-serif";
        ctx.textAlign = "center";
        const footerLines = wrapTeamName(ctx, inputFooter.value || "", W - 80, 2);
        const footerTextY = brandImg ? footY + 72 : footY + 50;
        footerLines.forEach((ln, i) => ctx.fillText(ln, W / 2, footerTextY + i * 30));

        const link = document.createElement("a");
        link.download = `jadwal-tiktok-${currentTheme}-${selectedDate}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();

        const loaded = urls.filter((u) => getCachedLogo(u)).length;
        const extra = matches.length > 10 ? ` (maks. 10 dari ${matches.length})` : "";
        setStatus(`✓ PNG "${t.name}": ${dataMatches.length} pertandingan${extra} · logo ${loaded}/${urls.length}`, "success");
      } catch (err) {
        setStatus(`Gagal ekspor: ${err.message}`, "error");
        console.error(err);
      } finally {
        btnDownload.disabled = false;
      }
    }

    function setStatus(msg, cls = "") {
      statusEl.className = "status" + (cls ? " " + cls : "");
      statusEl.textContent = msg;
    }

    $("#btn-refresh").addEventListener("click", fetchSchedule);
    $("#btn-download").addEventListener("click", downloadPNG);
    $("#btn-today").addEventListener("click", () => setSelectedDate(todayISO()));
    datePicker.addEventListener("change", (e) => setSelectedDate(e.target.value));
    $("#file-import").addEventListener("change", (e) => {
      const f = e.target.files[0];
      if (f) importHtmlFile(f);
      e.target.value = "";
    });

    loadSettings();
    setupBrandLogoPreview();
    datePicker.value = selectedDate;
    $("#view-header").textContent = inputHeader.value.toUpperCase();
    $("#view-footer").textContent = inputFooter.value;
    buildThemePicker();
    applyThemePreview(currentTheme);
    updateBgWatermark();
    fetchSchedule();
  </script>
</body>
</html>
