<head>
<meta charset="UTF-8"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sb:#0d0f14;--sb2:#13161e;--border:#1e2230;
  --acc:#a855f7;--acc2:#7c3aed;--gold:#f59e0b;
  --txt:#f1f5f9;--muted:#64748b;--danger:#ef4444;--ok:#22c55e;
}
body{font-family:'Inter',system-ui,sans-serif;background:#080a10;color:var(--txt);min-height:100vh;display:flex;flex-direction:column}
input[type=file]{display:none}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:10px 18px;background:var(--sb);border-bottom:1px solid var(--border);flex-shrink:0}
.tb-logo{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--acc)}
.tb-brand{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;color:var(--acc)}
.tb-brand b{color:#fff;font-family:'Bebas Neue',sans-serif}
.tb-sep{flex:1}
.tb-date{font-size:0.75rem;font-weight:600;color:var(--muted)}

/* ── WORKSPACE ── */
.workspace{display:grid;grid-template-columns:290px 1fr;flex:1;min-height:0;overflow:hidden}
@media(max-width:820px){.workspace{grid-template-columns:1fr;overflow:visible}}

/* ── SIDEBAR ── */
.sidebar{background:var(--sb);border-right:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:calc(100vh - 52px)}
.slabel{font-size:0.62rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:0.68rem;color:var(--muted);font-weight:600}
.field input,.field select{background:var(--sb2);border:1px solid var(--border);color:var(--txt);padding:7px 9px;border-radius:7px;font-size:0.8rem;font-family:inherit;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--acc)}
input[type=date]{color-scheme:dark}

/* ── THEME GRID ── */
.tgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
.tcard{cursor:pointer;border:2px solid var(--border);border-radius:9px;overflow:hidden;transition:border-color .2s,transform .15s}
.tcard:hover{transform:translateY(-2px)}
.tcard.on{border-color:var(--acc)}
.tswatch{height:32px}
.tname{font-size:0.64rem;font-weight:700;color:var(--muted);padding:4px 6px;background:var(--sb2)}

/* ── BUTTONS ── */
.btn{cursor:pointer;border:none;border-radius:7px;padding:8px 12px;font-size:0.8rem;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity .2s,transform .15s;white-space:nowrap}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff}
.btn-green{background:linear-gradient(135deg,#15803d,#22c55e);color:#fff}
.btn-blue{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff}
.btn-ghost{background:var(--sb2);color:var(--txt);border:1px solid var(--border)}
.btn-sm{padding:6px 10px;font-size:0.75rem}
.btn-full{width:100%}
.brow{display:flex;gap:6px}
.brow .btn{flex:1}

/* ── EXPORT TABS ── */
.etabs{display:flex;background:var(--sb2);border:1px solid var(--border);border-radius:8px;padding:3px;gap:3px}
.etab{flex:1;cursor:pointer;border:none;border-radius:6px;padding:7px 5px;font-size:0.72rem;font-weight:700;font-family:inherit;background:transparent;color:var(--muted);transition:background .2s,color .2s}
.etab.on{background:var(--acc);color:#fff}

/* ── STATUS ── */
.sbar{font-size:0.72rem;font-weight:600;padding:7px 9px;border-radius:7px;background:var(--sb2);border:1px solid var(--border);color:var(--muted);line-height:1.5;min-height:32px}
.sbar.ok{color:var(--ok);border-color:#15803d44}
.sbar.err{color:var(--danger);border-color:#ef444444}
.sbar.loading{color:var(--gold);border-color:#f59e0b44}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;overflow:hidden;background:#080a10}

/* ── PREVIEW TABS ── */
.ptabs{display:flex;border-bottom:1px solid var(--border);background:var(--sb);flex-shrink:0}
.ptab{cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:0.78rem;font-weight:700;padding:10px 18px;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.ptab.on{color:var(--acc);border-bottom-color:var(--acc)}

/* ── PREVIEW BODY ── */
.pbody{flex:1;display:flex;gap:18px;padding:18px;overflow:auto;align-items:flex-start;justify-content:center}

/* ── PHONE FRAME ── */
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0}
.phone-shell{position:relative;width:230px;border-radius:20px;overflow:hidden;box-shadow:0 0 0 2px #1e2230,0 20px 60px rgba(0,0,0,.8)}
.phone-shell canvas{display:block;width:100%}
.vid-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);cursor:pointer;transition:background .2s}
.vid-overlay:hover{background:rgba(0,0,0,.35)}
.play-btn{width:48px;height:48px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--acc)}
.play-btn svg{width:20px;height:20px;fill:#fff;margin-left:3px}
.cnav{display:flex;align-items:center;gap:7px}
.cnav-btn{cursor:pointer;background:var(--sb2);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:4px 12px;font-size:0.8rem;font-weight:700;font-family:inherit}
.cnav-btn:disabled{opacity:.3;cursor:not-allowed}
.plbl{font-size:0.72rem;color:var(--muted);font-weight:600;min-width:48px;text-align:center}

/* ── MATCH LIST ── */
.mpanel{flex:1;min-width:240px;max-width:420px;display:flex;flex-direction:column;gap:5px}
.mptitle{font-size:0.65rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.mitem{background:var(--sb2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:border-color .2s}
.mitem:hover{border-color:#2e3545}
.mitem.on{border-color:var(--acc);background:#a855f70d}
.mtime{font-weight:800;color:var(--acc);font-size:0.78rem;min-width:34px;text-align:center}
.mlogo{width:18px;height:18px;object-fit:contain;flex-shrink:0}
.minfo{flex:1;min-width:0}
.mteams{font-weight:700;font-size:0.78rem;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mmeta{font-size:0.64rem;color:var(--muted);margin-top:1px}
.mtv{color:var(--gold)}
.mtv.free{color:#4ade80}

/* ── VIDEO PROGRESS ── */
.vprog{background:var(--sb2);border:1px solid var(--border);border-radius:7px;padding:9px 11px;display:none;flex-direction:column;gap:5px}
.vprog.show{display:flex}
.vpbar-wrap{background:#1e2230;border-radius:99px;height:5px;overflow:hidden}
.vpbar{height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7);border-radius:99px;width:0%;transition:width .1s}
.vplbl{font-size:0.7rem;color:var(--muted);font-weight:600}
</style>
</head>

<script>
// ═══════════════════════════════════════════
// CONSTANTS & STATE
// ═══════════════════════════════════════════
const W=1080,H=1920;
const BULAN=["","Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
const HARI=["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
const FREE_KW=["sctv","indosiar","rcti","mnctv","gtv","antv","tvone","tv one","kompas tv","inews","inews tv","tvri","trans tv","trans7","trans 7","metro tv","net tv","net."];
const PAID_KW=["vidio","bein","bein sports","vision+","vision plus","mola","spotv","apple tv","disney","netflix","prime video","hbo","espn","dazn"];

function classifyTv(stations){
  if(!stations||stations==="-"||stations==="TBC")return{tvFree:[],tvPaid:[],tv:stations||""};
  const parts=stations.split("/").map(p=>p.trim()).filter(Boolean);
  const tvFree=[],tvPaid=[];
  for(const part of parts){
    const lower=part.toLowerCase();
    if(PAID_KW.some(k=>lower.includes(k)))tvPaid.push(part);
    else if(FREE_KW.some(k=>lower.includes(k)||k===lower))tvFree.push(part);
    else if(/sport/i.test(lower)||/\d/.test(lower))tvPaid.push(part);
    else tvFree.push(part);
  }
  return{tvFree,tvPaid,tv:stations};
}

function getTvDisplay(m){
  const raw=(m.tv||"").trim();
  if(raw&&raw!=="-"&&raw!=="TBC"){
    const c=classifyTv(raw);
    return{...c,tv:raw};
  }
  const free=m.tvFree||[],paid=m.tvPaid||[];
  const tv=[...free,...paid].join(" / ")||"-";
  return{tvFree:free,tvPaid:paid,tv};
}

// ── THEMES ──
// Semua berbasis purple/dark seperti referensi, dengan variasi warna aksen
const THEMES = {
  purple: {
    name:"💜 Purple",
    swatch:"linear-gradient(135deg,#2d1b69,#7c3aed,#a855f7)",
    // background gradient

    // accent
    accent:"#a855f7", accentGlow:"rgba(168,85,247,0.4)",
    // watermark
    wmColor:"rgba(255,255,255,0.04)",
  },
  royal: {
    name:"👑 Royal Blue",
    swatch:"linear-gradient(135deg,#0a1628,#1e3a8a,#3b82f6)",
    bgTop:"#060e1f", bgMid:"#0f2044", bgBot:"#060e1f",
    headerBg1:"#0f2044", headerBg2:"#1e3a8a",
    headerText:"#ffffff", headerSub:"#93c5fd",
    rowBg:"rgba(255,255,255,0.07)", rowBorder:"rgba(59,130,246,0.2)",
    rowHover:"rgba(59,130,246,0.15)",
    timeBg:"#3b82f6", timeText:"#ffffff", timeBorder:"#60a5fa",

    leagueBg:"rgba(59,130,246,0.2)",
    tvBg:"rgba(59,130,246,0.15)",
    dateBg:"rgba(59,130,246,0.15)", dateBorder:"rgba(96,165,250,0.4)", dateText:"#bfdbfe",
    footerBg:"rgba(0,0,0,0.35)", footerText:"#93c5fd",
    accent:"#3b82f6", accentGlow:"rgba(59,130,246,0.4)",
    wmColor:"rgba(255,255,255,0.035)",
  },

    bgTop:"#021a0e", bgMid:"#052e16", bgBot:"#021a0e",
    headerBg1:"#052e16", headerBg2:"#065f46",
    headerText:"#ffffff", headerSub:"#6ee7b7",
    rowBg:"rgba(255,255,255,0.07)", rowBorder:"rgba(16,185,129,0.2)",
    rowHover:"rgba(16,185,129,0.15)",
    timeBg:"#10b981", timeText:"#ffffff", timeBorder:"#34d399",
    teamText:"#f0fdf4",
    leagueBg:"rgba(16,185,129,0.2)",
    tvBg:"rgba(16,185,129,0.15)",
    dateBg:"rgba(16,185,129,0.15)", dateBorder:"rgba(52,211,153,0.4)", dateText:"#a7f3d0",
    footerBg:"rgba(0,0,0,0.35)", footerText:"#6ee7b7",
    accent:"#10b981", accentGlow:"rgba(16,185,129,0.4)",
    wmColor:"rgba(255,255,255,0.035)",
  },
  crimson: {
    name:"❤️ Crimson",
    swatch:"linear-gradient(135deg,#1c0505,#7f1d1d,#dc2626)",

    rowBg:"rgba(255,255,255,0.07)", rowBorder:"rgba(220,38,38,0.2)",
    rowHover:"rgba(220,38,38,0.15)",
    timeBg:"#dc2626", timeText:"#ffffff", timeBorder:"#f87171",
    teamText:"#fff5f5",
    leagueBg:"rgba(220,38,38,0.2)",
    tvBg:"rgba(220,38,38,0.15)",
    dateBg:"rgba(220,38,38,0.15)", dateBorder:"rgba(248,113,113,0.4)", dateText:"#fecaca",
    footerBg:"rgba(0,0,0,0.35)", footerText:"#fca5a5",

    wmColor:"rgba(255,255,255,0.035)",
  },
};

let allSchedules={}, allMatches=[], selectedDate=todayISO();
let staticLogos=null, logoCache={};
let currentTheme="purple", exportMode="png", previewMode="png";
let previewPage=0;
let vidAF=null, vidPlaying=false, vidSlideIdx=0, vidFrameStart=null, vidBrand=null;

const $=s=>document.querySelector(s);
const cv=$("#cv"), ctx=cv.getContext("2d");
const inpHeader=$("#inp-header"), inpTiktok=$("#inp-tiktok"), inpFooter=$("#inp-footer");
const datePicker=$("#date-picker"), statusEl=$("#status");
const matchList=$("#match-list");
const btnDlPng=$("#btn-dl-png"), btnDlVideo=$("#btn-dl-video");
const navPrev=$("#nav-prev"), navNext=$("#nav-next"), plbl=$("#plbl");
const vidOverlay=$("#vid-overlay"), cnav=$("#cnav");
const vprog=$("#vprog"), vpbar=$("#vpbar"), vplbl=$("#vplbl");

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function todayISO(){return new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Jakarta"})}
function fmtDate(iso){if(!iso)return"—";const[y,m,d]=iso.split("-").map(Number);return`${HARI[new Date(y,m-1,d).getDay()]}, ${d} ${BULAN[m]} ${y}`}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function slug(n){return n.toLowerCase().trim().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||"x"}
function normN(n){return n.toLowerCase().trim().replace(/[^a-z0-9]+/g," ").trim()}
function isRemote(p){return/^https?:\/\//i.test(p||"")}
function getBase(){const p=location.pathname;if(p.endsWith("/"))return p;const i=p.lastIndexOf("/");return i>0?p.slice(0,i+1):"/"}
const BASE=getBase();
function asset(p){return BASE+p.replace(/^\//,"")}
function shortTv(m){return getTvDisplay(m).tv}
function isFreeTV(m){const d=getTvDisplay(m);return d.tvFree.length>0||FREE_KW.some(k=>d.tv.toLowerCase().includes(k))}
function getT(){return THEMES[currentTheme]||THEMES.purple}
function perPage(){return parseInt($("#sel-perpage").value)||7}
function setStatus(msg,cls=""){statusEl.className="sbar"+(cls?" "+cls:"");statusEl.textContent=msg}
function easeOut(t){return 1-Math.pow(1-t,3)}

// ═══════════════════════════════════════════
// LOGO LOADING
// ═══════════════════════════════════════════
async function loadStaticLogos(){
  if(staticLogos)return staticLogos;
  try{const r=await fetch(asset("logos.json?v=6"));if(!r.ok)throw 0;staticLogos=await r.json();}
  catch{staticLogos={teams:{},leagues:{}};}
  return staticLogos;
}
function findBadge(map,name){
  if(!map||!name)return null;
  if(map[name]&&!isRemote(map[name]))return map[name];
  const norm=normN(name);let best=null,bl=0;
  for(const[k,v]of Object.entries(map)){
    if(isRemote(v))continue;const kn=normN(k);
    if(norm===kn)return v;
    if((norm.includes(kn)||kn.includes(norm))&&k.length>bl){best=v;bl=k.length;}
  }
  return best;
}
function teamBase(name){const m=staticLogos?findBadge(staticLogos.teams,name):null;return(m&&!isRemote(m))?m.replace(/\.(png|svg|jpg|webp)$/i,""):`assets/logos/teams/${slug(name)}`}
function leagueBase(comp){const m=staticLogos?findBadge(staticLogos.leagues,comp):null;return(m&&!isRemote(m))?m.replace(/\.(png|svg|jpg|webp)$/i,""):`assets/logos/leagues/${slug(comp)}`}
function tryLoad(path){
  const src=asset(path);if(logoCache[src])return Promise.resolve(logoCache[src]);
  return new Promise(res=>{const img=new Image();img.onload=()=>{logoCache[src]=img;res(img);};img.onerror=()=>res(null);img.src=src;});
}
async function loadLogo(base){
  if(!base)return null;if(logoCache[base])return logoCache[base];
  for(const ext of[".png",".svg",".jpg",".webp"]){const img=await tryLoad(base+ext);if(img){logoCache[base]=img;return img;}}
  return null;
}
function getCached(base){
  if(!base)return null;if(logoCache[base])return logoCache[base];
  for(const ext of[".png",".svg",".jpg",".webp"]){const k=asset(base+ext);if(logoCache[k])return logoCache[k];}
  return null;
}
async function preloadAll(matches){
  const paths=[...new Set(matches.flatMap(m=>[teamBase(m.home),teamBase(m.away),leagueBase(m.competition)]).filter(Boolean))];
  await Promise.all(paths.map(loadLogo));
}
async function loadBrand(){
  for(const p of["assets/branding/CORNERKIICK.png","CORNERKIICK.png"]){const img=await tryLoad(p);if(img)return img;}
  return null;
}

// ═══════════════════════════════════════════
// CANVAS UTILS
// ═══════════════════════════════════════════
function rr(c,x,y,w,h,r,fill,stroke,sw){
  if(w<=0||h<=0)return;
  const rad=Math.min(r,w/2,h/2);
  c.beginPath();c.moveTo(x+rad,y);c.lineTo(x+w-rad,y);c.quadraticCurveTo(x+w,y,x+w,y+rad);
  c.lineTo(x+w,y+h-rad);c.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);
  c.lineTo(x+rad,y+h);c.quadraticCurveTo(x,y+h,x,y+h-rad);c.lineTo(x,y+rad);c.quadraticCurveTo(x,y,x+rad,y);c.closePath();
  if(fill){c.fillStyle=fill;c.fill();}
  if(stroke){c.strokeStyle=stroke;c.lineWidth=sw||2;c.stroke();}
}
function wrapTxt(c,text,maxW,maxL){
  const words=String(text||"").split(/\s+/);const lines=[];let line="";
  for(const w of words){const t=line?line+" "+w:w;if(c.measureText(t).width<=maxW){line=t;}else{if(line)lines.push(line);line=w;}}
  if(line)lines.push(line);return lines.slice(0,maxL);
}
function drawImg(c,img,x,y,w,h,radius=0){
  if(!img)return;
  if(radius>0){c.save();rr(c,x,y,w,h,radius,null);c.clip();}
  c.drawImage(img,x,y,w,h);
  if(radius>0)c.restore();
}
function circleImg(c,img,cx,cy,r,border,borderW=3){
  if(!img)return;
  c.save();c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.clip();c.drawImage(img,cx-r,cy-r,r*2,r*2);c.restore();
  if(border){c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.strokeStyle=border;c.lineWidth=borderW;c.stroke();}
}

// DRAW BACKGROUND
// ═══════════════════════════════════════════
function drawBg(c,t){
  // Main gradient
  const g=c.createLinearGradient(0,0,0,H);
  g.addColorStop(0,t.bgTop);g.addColorStop(0.5,t.bgMid);g.addColorStop(1,t.bgBot);
  c.fillStyle=g;c.fillRect(0,0,W,H);

  // Diagonal light sweep (like the reference image)
  c.save();
  const sweep=c.createLinearGradient(0,0,W,H*0.6);
  sweep.addColorStop(0,"rgba(255,255,255,0)");
  sweep.addColorStop(0.4,"rgba(255,255,255,0.04)");
  sweep.addColorStop(0.6,"rgba(255,255,255,0.07)");
  sweep.addColorStop(1,"rgba(255,255,255,0)");
  c.fillStyle=sweep;c.fillRect(0,0,W,H);
  c.restore();

  // Radial glow top-right (like reference)
  const gr=c.createRadialGradient(W*0.85,H*0.08,0,W*0.85,H*0.08,W*0.7);
  gr.addColorStop(0,t.accentGlow);gr.addColorStop(1,"transparent");
  c.fillStyle=gr;c.fillRect(0,0,W,H);

  // Radial glow bottom-left
  const gl=c.createRadialGradient(W*0.15,H*0.92,0,W*0.15,H*0.92,W*0.6);
  gl.addColorStop(0,t.accentGlow.replace("0.4","0.25"));gl.addColorStop(1,"transparent");
  c.fillStyle=gl;c.fillRect(0,0,W,H);

  // Watermark
  const wm=(inpTiktok.value||"").trim().replace(/^@+/,"");
  if(wm){
    c.save();c.translate(W/2,H/2);c.rotate(-Math.PI/8);
    c.font="900 90px 'Bebas Neue','Arial Black',sans-serif";
    c.fillStyle=t.wmColor;c.textAlign="center";
    for(let dy=-700;dy<=700;dy+=240)c.fillText("@"+wm.toUpperCase(),0,dy);
    c.restore();
  }
}

// PNG LAYOUT — referensi style
// Row layout: [liga logo] [tim home + logo] [WAKTU] [logo tim away + nama] [TV logo]
// ═══════════════════════════════════════════
const ROW_GAP = 12;
const PAD_X = 28;
const HEADER_H = 220;
const DATE_ROW_H = 58;
const FOOTER_H = 92;

function rowAreaHeight(matchCount){
  return H-HEADER_H-16-DATE_ROW_H-6-FOOTER_H;
}

function rowHeightForCount(n){
  if(!n)return 120;
  const avail=rowAreaHeight(n);
  return Math.max(100,Math.min(138,Math.floor((avail-ROW_GAP*(n-1))/n)));
}

function getPages(){
  const pp=perPage();
  const pages=[];
  for(let i=0;i<allMatches.length;i+=pp)pages.push(allMatches.slice(i,i+pp));
  return pages.length?pages:[[]];
}

async function showPNGPreview(){
  const pages=getPages();
  const tp=Math.max(1,pages.length);
  previewPage=Math.max(0,Math.min(previewPage,tp-1));
  navPrev.disabled=previewPage<=0;
  navNext.disabled=previewPage>=tp-1;
  plbl.textContent=`${previewPage+1} / ${tp}`;
  const chunk=pages[previewPage]||[];
  if(!chunk.length){
    ctx.clearRect(0,0,W,H);
    drawBg(ctx,getT());
    return;
  }
  await renderPNGPage(ctx,chunk,previewPage+1,tp);
}

async function renderPNGPage(c,matches,pageNum,totalPages){
  const t=getT();
  c.clearRect(0,0,W,H);
  drawBg(c,t);

  const brand=await loadBrand();
  const rowH=rowHeightForCount(matches.length);
  const rowW=W-PAD_X*2;

  await drawHeader(c,t,brand,pageNum,totalPages);

  let curY=HEADER_H+16;
  drawDateRow(c,t,fmtDate(selectedDate),curY);
  curY+=DATE_ROW_H+8;

  for(let i=0;i<matches.length;i++){
    await drawMatchRow(c,t,matches[i],PAD_X,curY,rowW,rowH);
    curY+=rowH+ROW_GAP;
  }

  drawFooter(c,t,brand);
}

async function drawHeader(c,t,brand,pageNum,totalPages){
  const cx=W/2;
  // Header background card
  c.save();
  c.shadowColor="rgba(0,0,0,0.5)";c.shadowBlur=30;c.shadowOffsetY=10;
  const hg=c.createLinearGradient(PAD_X,20,W-PAD_X,HEADER_H);
  hg.addColorStop(0,t.headerBg1);hg.addColorStop(1,t.headerBg2);
  rr(c,PAD_X,20,W-PAD_X*2,HEADER_H-20,24,hg,t.accent+"66",2);
  c.restore();

  // Shine line on top of header card
  const shine=c.createLinearGradient(PAD_X,20,W-PAD_X,20);
  shine.addColorStop(0,"transparent");shine.addColorStop(0.5,"rgba(255,255,255,0.35)");shine.addColorStop(1,"transparent");
  c.strokeStyle=shine;c.lineWidth=2;
  c.beginPath();c.moveTo(PAD_X+24,22);c.lineTo(W-PAD_X-24,22);c.stroke();

  // Brand logo LEFT
  if(brand){
    circleImg(c,brand,PAD_X+70,20+HEADER_H/2-10,52,t.accent,3);
  }

  // Brand logo RIGHT (second logo or same)
  if(brand){
    circleImg(c,brand,W-PAD_X-70,20+HEADER_H/2-10,52,t.accent,3);
  }

  // Title — BIG center
  c.save();
  c.shadowColor=t.accentGlow;c.shadowBlur=30;
  c.fillStyle=t.headerText;
  c.font="900 96px 'Bebas Neue','Arial Black',sans-serif";
  c.textAlign="center";c.textBaseline="middle";
  c.fillText((inpHeader.value||"TODAY MATCH").toUpperCase(),cx,20+HEADER_H/2-28);
  c.restore();

  // Date pill below title
  const ds=fmtDate(selectedDate);
  c.font="700 34px 'Inter','Segoe UI',sans-serif";
  const dw=c.measureText(ds).width;
  const pillW=dw+60,pillH=52,pillX=cx-pillW/2,pillY=20+HEADER_H/2+14;
  rr(c,pillX,pillY,pillW,pillH,pillH/2,"rgba(255,255,255,0.12)","rgba(255,255,255,0.3)",1.5);
  c.fillStyle=t.headerText;c.textAlign="center";c.textBaseline="middle";
  c.fillText(ds,cx,pillY+pillH/2);
  c.textBaseline="alphabetic";

  // Page indicator
  if(totalPages>1){
    c.font="600 24px 'Inter','Segoe UI',sans-serif";
    c.fillStyle=t.headerSub;c.textAlign="center";
    c.fillText(`Halaman ${pageNum} / ${totalPages}`,cx,20+HEADER_H-8);
  }
}

function drawDateRow(c,t,dateStr,y){
  const cx=W/2;
  const tw=c.measureText(dateStr).width;
  c.font="700 30px 'Inter','Segoe UI',sans-serif";
  const pillW=Math.min(tw+80,W-PAD_X*2),pillH=DATE_ROW_H-10;
  rr(c,cx-pillW/2,y,pillW,pillH,pillH/2,t.dateBg,t.dateBorder,1.5);
  c.fillStyle=t.dateText;c.textAlign="center";c.textBaseline="middle";
  c.fillText(dateStr,cx,y+pillH/2);
  c.textBaseline="alphabetic";
}

async function drawMatchRow(c,t,m,x,y,rowW,rowH){
  const cy=y+rowH/2;
  const LIGA_W=72;
  const TIME_W=108;
  const TV_W=156;
  const LOGO_SZ=Math.min(58,Math.max(48,rowH-28));
  const LIGA_SZ=52;
  const TEAM_W=(rowW-LIGA_W-TIME_W-TV_W)/2;

  const xLiga=x;
  const xHome=x+LIGA_W;
  const xTime=xHome+TEAM_W;
  const xAway=xTime+TIME_W;
  const xTV=xAway+TEAM_W;
  const tvInfo=getTvDisplay(m);

  // ── ROW BACKGROUND ──
  rr(c, x, y, rowW, rowH, rowH/2, t.rowBg, t.rowBorder, 1);

  // ── LIGA LOGO ──
  const lcx = xLiga + LIGA_W/2;
  rr(c, lcx-LIGA_SZ/2, cy-LIGA_SZ/2, LIGA_SZ, LIGA_SZ, LIGA_SZ/2, t.leagueBg, null);
  const lImg = getCached(leagueBase(m.competition));
  if(lImg){ drawImg(c, lImg, lcx-LIGA_SZ/2+4, cy-LIGA_SZ/2+4, LIGA_SZ-8, LIGA_SZ-8, 4); }
  else{
    c.fillStyle="rgba(255,255,255,0.5)"; c.font="700 22px sans-serif";
    c.textAlign="center"; c.textBaseline="middle"; c.fillText("⚽",lcx,cy); c.textBaseline="alphabetic";
  }

  const hImg=getCached(teamBase(m.home));
  const hLogoX=xTime-LOGO_SZ-10;
  const hNameMaxW=TEAM_W-LOGO_SZ-16;
  const hNameCX=xHome+(TEAM_W-LOGO_SZ)/2;

  if(hImg)drawImg(c,hImg,hLogoX,cy-LOGO_SZ/2,LOGO_SZ,LOGO_SZ,6);

  c.fillStyle=t.teamText;
  c.font="700 24px 'Inter','Segoe UI',sans-serif";
  c.textAlign="center";
  const hLines=wrapTxt(c,m.home,hNameMaxW,2);
  const hLineH=26;
  const hStart=cy-((hLines.length*hLineH)-8)/2+20;
  hLines.forEach((ln,i)=>c.fillText(ln,hNameCX,hStart+i*hLineH));

  const tcx=xTime+TIME_W/2;
  const tbW=100,tbH=54;
  rr(c,tcx-tbW/2,cy-tbH/2,tbW,tbH,12,t.timeBg,t.timeBorder,2);
  c.fillStyle=t.timeText;
  c.font="900 34px 'Bebas Neue','Arial Black',sans-serif";
  c.textAlign="center";c.textBaseline="middle";
  c.fillText(m.kickoff,tcx,cy-5);
  c.font="600 16px 'Inter','Segoe UI',sans-serif";
  c.fillText("WIB",tcx,cy+16);
  c.textBaseline="alphabetic";

  const aImg=getCached(teamBase(m.away));
  const aLogoX=xAway+8;
  const aNameMaxW=TEAM_W-LOGO_SZ-16;
  const aNameCX=xAway+LOGO_SZ+(TEAM_W-LOGO_SZ)/2;

  if(aImg)drawImg(c,aImg,aLogoX,cy-LOGO_SZ/2,LOGO_SZ,LOGO_SZ,6);

  c.fillStyle=t.teamText;
  c.font="700 24px 'Inter','Segoe UI',sans-serif";
  c.textAlign="center";
  const aLines=wrapTxt(c,m.away,aNameMaxW,2);
  const aLineH=26;
  const aStart=cy-((aLines.length*aLineH)-8)/2+20;
  aLines.forEach((ln,i)=>c.fillText(ln,aNameCX,aStart+i*aLineH));

  const tvcx=xTV+TV_W/2;
  const boxH=Math.min(rowH-12,78);
  const boxY=cy-boxH/2;
  const hasFree=tvInfo.tvFree.length>0;

  if(hasFree){
    rr(c,xTV+6,boxY,TV_W-12,boxH,12,"rgba(34,197,94,0.18)","#22c55e",1.5);
    rr(c,tvcx-36,boxY+4,72,22,11,"#22c55e",null);
    c.fillStyle="#fff";
    c.font="800 12px 'Inter',sans-serif";
    c.textAlign="center";c.textBaseline="middle";
    c.fillText("GRATIS",tvcx,boxY+15);
    c.textBaseline="alphabetic";
    c.fillStyle="#4ade80";
    c.font="700 16px 'Inter',sans-serif";
    c.textAlign="center";
    const freeTxt=tvInfo.tvFree.join(" · ");
    wrapTxt(c,freeTxt,TV_W-16,3).forEach((ln,i)=>{
      c.fillText(ln,tvcx,boxY+28+i*18);
    });
    if(tvInfo.tvPaid.length){
      c.fillStyle="#fbbf24";
      c.font="600 14px 'Inter',sans-serif";
      const paidTxt=tvInfo.tvPaid.join(" · ");
      wrapTxt(c,paidTxt,TV_W-14,2).forEach((ln,i)=>{

      });

  }else{
    rr(c,xTV+6,boxY,TV_W-12,boxH,12,t.tvBg,null);
    c.fillStyle="#fbbf24";
    c.font="700 17px 'Inter',sans-serif";
    c.textAlign="center";c.textBaseline="middle";
    const tvLines=wrapTxt(c,tvInfo.tv||"-",TV_W-16,3);
    tvLines.forEach((ln,i)=>c.fillText(ln,tvcx,boxY+boxH/2-((tvLines.length-1)*18)/2+i*18));
    c.textBaseline="alphabetic";

}

function drawFooter(c,t,brand){
  const footY=H-FOOTER_H;

  c.strokeStyle=fl;c.lineWidth=1;
  c.beginPath();c.moveTo(PAD_X,footY);c.lineTo(W-PAD_X,footY);c.stroke();

// VIDEO SLIDE — 1 pertandingan full screen
// ═══════════════════════════════════════════
// VIDEO — BUILD-UP REVEAL
// Pertandingan muncul 1 per 1 dari atas ke bawah.
// Yang sudah muncul TETAP di layar.
// ═══════════════════════════════════════════

// Render frame video build-up.
// visibleCount = berapa baris yang sudah fully visible
// animIdx      = indeks baris yang sedang animasi masuk (visibleCount)
// animProg     = 0..1 progress animasi baris animIdx
async function renderBuildUp(c, t, brand, visibleCount, animIdx, animProg) {
  c.clearRect(0,0,W,H);
  drawBg(c,t);

  // ── HEADER ──
  await drawHeader(c, t, brand, 1, 1);

  // ── DATE ROW ──
  let curY = HEADER_H + 16;
  drawDateRow(c, t, fmtDate(selectedDate), curY);
  curY += DATE_ROW_H + 6;

  const anim = $("#sel-anim").value;
  const rowW = W - PAD_X*2;
  const rowH = rowHeightForCount(allMatches.length);

  for (let i = 0; i < visibleCount; i++) {
    await drawMatchRow(c, t, allMatches[i], PAD_X, curY, rowW, rowH);
    curY += rowH + ROW_GAP;
  }

  if (animIdx < allMatches.length && animProg > 0) {
    const p = easeOut(animProg);
    c.save();

    if (anim === "slide") {
      c.translate((1-p) * W, 0);
    } else if (anim === "fade") {
      c.globalAlpha = p;
    } else if (anim === "wipe") {
      c.beginPath();
      c.rect(PAD_X, curY, rowW * p, rowH);
      c.clip();
    } else if (anim === "drop") {
      c.translate(0, -(1-p) * (rowH + 40));
      c.globalAlpha = Math.min(1, p * 1.5);
    }

    await drawMatchRow(c, t, allMatches[animIdx], PAD_X, curY, rowW, rowH);
    c.restore();
  }

  drawFooter(c, t, brand);
}

// ═══════════════════════════════════════════
// PREVIEW — VIDEO (live build-up loop)
// ═══════════════════════════════════════════
const ANIM_DUR = 0.4; // detik animasi masuk per baris

async function startVideoPreview() {
  if (vidAF) cancelAnimationFrame(vidAF);
  vidPlaying = true;
  vidFrameStart = null;
  vidBrand = await loadBrand();
  const t = getT();
  const holdDur = parseInt($("#sel-dur").value) || 3; // detik tiap baris ditahan
  const n = allMatches.length;
  if (!n) return;

  // Total durasi: setiap baris = ANIM_DUR + holdDur, lalu hold akhir 2 detik, lalu loop
  const totalDur = n * (ANIM_DUR + holdDur) + 2.0;

  function frame(ts) {
    if (!vidPlaying) return;
    if (!vidFrameStart) vidFrameStart = ts;
    const elapsed = ((ts - vidFrameStart) / 1000) % totalDur;

    // Hitung state: berapa baris visible, baris mana animasi, progress
    let t2 = elapsed;
    let visibleCount = 0;
    let animIdx = 0;
    let animProg = 0;

    for (let i = 0; i < n; i++) {
      const slotDur = ANIM_DUR + holdDur;
      if (t2 <= 0) break;
      if (t2 < ANIM_DUR) {
        // Baris i sedang animasi masuk
        animIdx = i;
        animProg = t2 / ANIM_DUR;
        break;
      }
      t2 -= ANIM_DUR;
      if (t2 < holdDur) {
        // Baris i sudah visible, hold
        visibleCount = i + 1;
        animIdx = i + 1;
        animProg = 0;
        break;
      }
      t2 -= holdDur;
      visibleCount = i + 1;
      animIdx = i + 1;
      animProg = 0;
    }

    // Jika semua sudah muncul, hold semua
    if (visibleCount >= n) { visibleCount = n; animIdx = n; animProg = 0; }

    vidSlideIdx = Math.max(0, visibleCount - 1);

    renderBuildUp(ctx, t, vidBrand, visibleCount, animIdx, animProg).then(() => {
      vidAF = requestAnimationFrame(frame);
    });
  }
  vidAF = requestAnimationFrame(frame);
}

function stopVideoPreview(){
  vidPlaying=false;
  if(vidAF){cancelAnimationFrame(vidAF);vidAF=null;}
}

function renderMatchList(){
  if(!allMatches.length){
    matchList.innerHTML=`<div style="color:var(--muted);font-size:.78rem;padding:8px 0">Tidak ada jadwal.</div>`;return;
  }
  const pp=perPage();
  matchList.innerHTML=allMatches.map((m,i)=>{
    const pg=Math.floor(i/pp);
    const hImg=getCached(teamBase(m.home));
    const aImg=getCached(teamBase(m.away));
    const active=previewMode==="png"?pg===previewPage:i===vidSlideIdx;
    return`<div class="mitem${active?" on":""}" data-pg="${pg}" data-idx="${i}">
      <span class="mtime">${esc(m.kickoff)}</span>
      ${hImg?`<img class="mlogo" src="${hImg.src}" alt=""/>`:""}
      <span class="minfo">
        <div class="mteams">${esc(m.home)} vs ${esc(m.away)}</div>
        <div class="mmeta">${esc(m.competition||"")} · <span class="mtv${isFreeTV(m)?" free":""}">${esc(shortTv(m))}</span></div>
      </span>
      ${aImg?`<img class="mlogo" src="${aImg.src}" alt=""/>`:""}
    </div>`;
  }).join("");
  matchList.querySelectorAll(".mitem").forEach(el=>{
    el.addEventListener("click",()=>{
      if(previewMode==="png"){previewPage=parseInt(el.dataset.pg);showPNGPreview();renderMatchList();}
      else{vidSlideIdx=parseInt(el.dataset.idx);vidFrameStart=null;renderMatchList();}
    });
  });
}

// ═══════════════════════════════════════════
// SCHEDULE
// ═══════════════════════════════════════════
function getMatchesForDate(iso){
  const r=allSchedules[iso];if(Array.isArray(r))return r;if(r&&typeof r==="object")return[r];return[];
}

async function applyDate(iso){
  selectedDate=iso;datePicker.value=iso;
  $("#tb-date").textContent=fmtDate(iso);
  allMatches=getMatchesForDate(iso);
  const n=allMatches.length,pp=perPage(),tp=Math.ceil(n/pp);
  btnDlPng.textContent=tp>1?`⚡ Download ${tp} PNG`:"⚡ Download PNG";
  btnDlPng.disabled=!n;btnDlVideo.disabled=!n;
  previewPage=0;vidSlideIdx=0;
  if(n){
    setStatus("Memuat logo...","loading");
    await loadStaticLogos();await preloadAll(allMatches);
    setStatus(`✓ ${n} pertandingan · ${fmtDate(iso)}`,"ok");
  } else {
    setStatus(`Tidak ada jadwal untuk ${fmtDate(iso)}`);
  }
  renderMatchList();
  if(previewMode==="png")await showPNGPreview();
  else await startVideoPreview();
}

async function fetchSchedule(){
  setStatus("Memuat jadwal...","loading");
  try{
    const r=await fetch(asset("data/jadwal.json"));
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();allSchedules=d.schedules||{};
    await loadStaticLogos();
    setStatus("✓ Data jadwal dimuat","ok");
    await applyDate(selectedDate);
  }catch(e){setStatus("Gagal memuat jadwal. Coba Import HTML.","err");}
}

function importHtmlFile(file){
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const doc=new DOMParser().parseFromString(e.target.result,"text/html");
      const rows=doc.querySelectorAll("table tr");
      if(!rows.length)throw new Error("Tabel tidak ditemukan");
      let count=0;
      if(!allSchedules[selectedDate])allSchedules[selectedDate]=[];
      rows.forEach(tr=>{
        const cells=[...tr.querySelectorAll("td")].map(td=>td.textContent.trim());
        if(cells.length<4)return;
        const[kickoff,matchup,competition,tv]=cells;
        if(/kick-off/i.test(kickoff)||!/vs/i.test(matchup))return;
        const parts=matchup.split(/\s+vs\s+/i);
        const tvData=classifyTv(tv);
        allSchedules[selectedDate].push({
          kickoff,matchup,
          home:(parts[0]||"").trim(),
          away:(parts[1]||"").trim(),
          competition,
          tv:tvData.tv,
          tvFree:tvData.tvFree,
          tvPaid:tvData.tvPaid,
        });
        count++;
      });
      setStatus(`✓ Import ${count} pertandingan`,"ok");
      await applyDate(selectedDate);
    }catch(err){setStatus(`Gagal import: ${err.message}`,"err");}
  };
  reader.readAsText(file,"UTF-8");
}

// ═══════════════════════════════════════════
// DOWNLOAD PNG
// ═══════════════════════════════════════════
async function downloadPNG(){
  if(!allMatches.length)return;
  btnDlPng.disabled=true;
  const pages=getPages();
  setStatus(`Membuat ${pages.length} PNG...`,"loading");
  try{
    const oc=document.createElement("canvas");oc.width=W;oc.height=H;
    const octx=oc.getContext("2d");
    for(let p=0;p<pages.length;p++){
      await renderPNGPage(octx,pages[p],p+1,pages.length);
      await new Promise(r=>setTimeout(r,60));
      const suf=pages.length>1?`-part${p+1}of${pages.length}`:"";
      const a=document.createElement("a");
      a.download=`jadwal-${currentTheme}-${selectedDate}${suf}.png`;
      a.href=oc.toDataURL("image/png");a.click();
      if(p<pages.length-1)await new Promise(r=>setTimeout(r,350));
    }
    setStatus(`✓ ${pages.length} PNG didownload`,"ok");
  }catch(e){setStatus(`Gagal: ${e.message}`,"err");}
  finally{btnDlPng.disabled=false;}
}

// ═══════════════════════════════════════════
// DOWNLOAD VIDEO — build-up reveal
// ═══════════════════════════════════════════
async function downloadVideo(){
  if(!allMatches.length)return;
  if(!window.MediaRecorder){setStatus("Browser tidak support MediaRecorder. Gunakan Chrome/Edge.","err");return;}

  // Pilih mime type terbaik yang tersedia
  const fmtPref = $("#sel-fmt").value;
  let mimes;
  if(fmtPref==="mp4try"){
    mimes=["video/mp4","video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm"];
  } else {
    mimes=["video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm"];
  }
  const mime = mimes.find(m=>MediaRecorder.isTypeSupported(m)) || "video/webm";

  stopVideoPreview();
  btnDlVideo.disabled=true; btnDlPng.disabled=true;
  vprog.classList.add("show");
  setStatus("Merender video build-up...","loading");

  try{
    const t=getT(), brand=await loadBrand();
    const FPS=30;
    const holdDur=parseInt($("#sel-dur").value)||3;  // detik tiap baris ditahan
    const animFrames=Math.round(ANIM_DUR*FPS);
    const holdFrames=Math.round(holdDur*FPS);
    const holdEndFrames=Math.round(2.5*FPS);  // hold semua baris di akhir
    const n=allMatches.length;

    // Total frame: setiap baris = animFrames + holdFrames, lalu hold akhir
    const totalFrames = n*(animFrames+holdFrames) + holdEndFrames;

    const vc=document.createElement("canvas"); vc.width=W; vc.height=H;
    const vctx=vc.getContext("2d");
    const stream=vc.captureStream(FPS);
    const rec=new MediaRecorder(stream,{mimeType:mime, videoBitsPerSecond:10_000_000});
    const chunks=[];
    rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    rec.start(100);

    let frame=0;

    // Render setiap baris: animasi masuk + hold
    for(let i=0; i<n; i++){
      // Fase animasi masuk baris ke-i
      for(let f=0; f<animFrames; f++){
        const prog=f/animFrames;
        await renderBuildUp(vctx, t, brand, i, i, prog);
        frame++;
        if(frame%6===0){
          const pct=Math.round(frame/totalFrames*100);
          vpbar.style.width=pct+"%";
          vplbl.textContent=`Baris ${i+1}/${n} masuk · ${pct}%`;
          setStatus(`Merender... ${pct}%`,"loading");
        }
        await new Promise(r=>setTimeout(r,0));
      }
      // Fase hold — baris ke-i sudah fully visible
      for(let f=0; f<holdFrames; f++){
        await renderBuildUp(vctx, t, brand, i+1, i+1, 0);
        frame++;
        if(frame%6===0){
          const pct=Math.round(frame/totalFrames*100);
          vpbar.style.width=pct+"%";
          vplbl.textContent=`Baris ${i+1}/${n} · ${pct}%`;
        }
        await new Promise(r=>setTimeout(r,0));
      }
    }

    // Hold akhir — semua baris visible
    for(let f=0; f<holdEndFrames; f++){
      await renderBuildUp(vctx, t, brand, n, n, 0);
      frame++;
      await new Promise(r=>setTimeout(r,0));
    }

    rec.stop();
    await new Promise(r=>rec.onstop=r);

    const blob=new Blob(chunks,{type:mime});
    const ext=mime.startsWith("video/mp4")?"mp4":"webm";
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.download=`jadwal-buildup-${currentTheme}-${selectedDate}.${ext}`;
    a.href=url; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),8000);

    const durSec=((n*(ANIM_DUR+holdDur)+2.5)).toFixed(1);
    setStatus(`✓ Video ${ext.toUpperCase()} · ${n} pertandingan · ~${durSec}s didownload`,"ok");
  }catch(e){
    setStatus(`Gagal render video: ${e.message}`,"err"); console.error(e);
  }finally{
    btnDlVideo.disabled=false; btnDlPng.disabled=!allMatches.length;
    vprog.classList.remove("show"); vpbar.style.width="0%";
    if(previewMode==="video") startVideoPreview();
  }
}

// ═══════════════════════════════════════════
// THEME PICKER
// ═══════════════════════════════════════════
function buildThemePicker(){
  const grid=$("#theme-grid");
  grid.innerHTML=Object.entries(THEMES).map(([id,t])=>`
    <div class="tcard${id===currentTheme?" on":""}" data-id="${id}">
      <div class="tswatch" style="background:${t.swatch}"></div>
      <div class="tname">${t.name}</div>
    </div>`).join("");
  grid.querySelectorAll(".tcard").forEach(card=>{
    card.addEventListener("click",()=>{
      currentTheme=card.dataset.id;
      grid.querySelectorAll(".tcard").forEach(x=>x.classList.toggle("on",x.dataset.id===currentTheme));
      saveSettings();
      if(previewMode==="png")showPNGPreview();else startVideoPreview();
    });
  });
}

// ═══════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════
const SK="ck-v4";
function saveSettings(){
  localStorage.setItem(SK,JSON.stringify({header:inpHeader.value,tiktok:inpTiktok.value,footer:inpFooter.value,theme:currentTheme,date:selectedDate}));
}
function loadSettings(){
  try{
    const s=JSON.parse(localStorage.getItem(SK)||"{}");
    if(s.header)inpHeader.value=s.header;if(s.tiktok)inpTiktok.value=s.tiktok;
    if(s.footer)inpFooter.value=s.footer;if(s.theme&&THEMES[s.theme])currentTheme=s.theme;
    if(s.date&&/^\d{4}-\d{2}-\d{2}$/.test(s.date))selectedDate=s.date;
  }catch{}
}

// ═══════════════════════════════════════════
// EVENTS & INIT
// ═══════════════════════════════════════════
// Export tabs
$("#etabs").querySelectorAll(".etab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    exportMode=tab.dataset.t;
    $("#etabs").querySelectorAll(".etab").forEach(t=>t.classList.toggle("on",t.dataset.t===exportMode));
    $("#opt-png").style.display=exportMode==="png"?"flex":"none";
    $("#opt-video").style.display=exportMode==="video"?"flex":"none";
  });
});

// Preview tabs
$(".ptabs").querySelectorAll(".ptab").forEach(tab=>{
  tab.addEventListener("click",async()=>{
    previewMode=tab.dataset.m;
    $(".ptabs").querySelectorAll(".ptab").forEach(t=>t.classList.toggle("on",t.dataset.m===previewMode));
    cnav.style.display=previewMode==="png"?"flex":"none";
    vidOverlay.style.display=previewMode==="video"?"flex":"none";
    if(previewMode==="png"){stopVideoPreview();await showPNGPreview();}
    else{await startVideoPreview();}
    renderMatchList();
  });
});

// Video overlay play/pause
vidOverlay.addEventListener("click",()=>{
  const svg=$("#play-btn svg");
  if(vidPlaying){stopVideoPreview();svg.innerHTML='<path d="M8 5v14l11-7z"/>';}
  else{startVideoPreview();svg.innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';}
});

// Branding
[inpHeader,inpTiktok,inpFooter].forEach(el=>{
  el.addEventListener("input",()=>{saveSettings();if(previewMode==="png")showPNGPreview();});
});

datePicker.addEventListener("change",e=>{saveSettings();applyDate(e.target.value);});
$("#btn-today").addEventListener("click",()=>applyDate(todayISO()));
$("#btn-refresh").addEventListener("click",fetchSchedule);

$("#sel-perpage").addEventListener("change",()=>{
  previewPage=0;
  const tp=Math.ceil(allMatches.length/perPage());
  btnDlPng.textContent=tp>1?`⚡ Download ${tp} PNG`:"⚡ Download PNG";
  renderMatchList();showPNGPreview();
});

navPrev.addEventListener("click",()=>{previewPage--;renderMatchList();showPNGPreview();});
navNext.addEventListener("click",()=>{previewPage++;renderMatchList();showPNGPreview();});

btnDlPng.addEventListener("click",downloadPNG);
btnDlVideo.addEventListener("click",downloadVideo);

$("#btn-prev-vid").addEventListener("click",async()=>{
  previewMode="video";
  $(".ptabs").querySelectorAll(".ptab").forEach(t=>t.classList.toggle("on",t.dataset.m==="video"));
  cnav.style.display="none";vidOverlay.style.display="flex";
  await startVideoPreview();renderMatchList();
});

$("#file-import").addEventListener("change",e=>{const f=e.target.files[0];if(f)importHtmlFile(f);e.target.value="";});

// ── INIT ──
loadSettings();
datePicker.value=selectedDate;
buildThemePicker();
cnav.style.display="flex";
vidOverlay.style.display="none";
fetchSchedule();
</script>
