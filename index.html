<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jadwal Bola — Generator PNG TikTok</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #060913; color: #f1f5f9;
      min-height: 100vh; padding: 24px 16px 48px;
    }

    .toolbar {
      max-width: 600px; margin: 0 auto 20px;
      background: #111625; padding: 20px;
      border-radius: 14px; border: 1px solid #1e293b;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .toolbar h1 { font-size: 1.4rem; font-weight: 800; color: #22c55e; }
    .toolbar p  { font-size: 0.85rem; color: #94a3b8; margin-bottom: 16px; }

    .branding-inputs {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      margin-bottom: 14px; background: #0b0f19;
      padding: 12px; border-radius: 8px; border: 1px solid #1e2942;
    }
    .branding-inputs label {
      display: flex; flex-direction: column;
      font-size: 0.75rem; color: #64748b; font-weight: 700; gap: 4px;
    }
    .branding-inputs input {
      background: #111625; border: 1px solid #334155; color: #fff;
      padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; outline: none;
    }
    .branding-inputs label.wide { grid-column: span 2; }

    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    input[type="date"] {
      background: #1e293b; color: #fff; border: 1px solid #334155;
      padding: 8px 12px; border-radius: 8px; font-size: 0.9rem;
      outline: none; color-scheme: dark;
    }
    input[type="file"] { display: none; }

    button, .file-label {
      cursor: pointer; border: none; border-radius: 8px;
      padding: 9px 16px; font-size: 0.88rem; font-weight: 700;
      transition: opacity 0.2s, transform 0.2s;
    }
    button:hover, .file-label:hover { opacity: 0.9; transform: translateY(-1px); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff;
      box-shadow: 0 4px 14px rgba(34,197,94,0.3);
      width: 100%; margin-top: 6px; padding: 12px; font-size: 0.95rem;
    }
    .btn-secondary { background: #2563eb; color: #fff; }
    .btn-ghost     { background: #334155; color: #e2e8f0; }
    .btn-warn      { background: #475569; color: #fff; }

    .status {
      max-width: 430px; margin: 0 auto 12px;
      font-size: 0.85rem; color: #eab308; text-align: center; font-weight: 600;
    }
    .status.success { color: #22c55e; }
    .status.error   { color: #f87171; }

    #export-area {
      max-width: 430px; height: 764px; margin: 0 auto;
      background: #070a13; border-radius: 24px; overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.7); border: 2px solid #1e2942;
      display: flex; flex-direction: column; position: relative;
    }

    .preview-msg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: rgba(255,255,255,0.03); font-size: 2.2rem; font-weight: 900;
      text-align: center; pointer-events: none; width: 90%; letter-spacing: 2px;
    }

    .banner { padding: 24px 20px 10px; text-align: center; flex-shrink: 0; }
    .banner h2 {
      font-size: 1.4rem; font-weight: 900; color: #fff;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .banner .date-label {
      font-size: 0.85rem; color: #94a3b8; margin-top: 4px;
      font-weight: 700; text-transform: uppercase;
    }

    .match-container {
      padding: 10px 16px; display: flex; flex-direction: column;
      gap: 8px; flex: 1; overflow-y: auto;
    }

    .sim-card {
      background: #111625; border-radius: 50px; border: 1px solid #1e2942;
      padding: 8px 12px; display: flex; align-items: center;
      justify-content: space-between; font-size: 0.72rem; gap: 6px;
    }
    .sim-time {
      font-weight: 800; color: #22c55e; background: #070a13;
      padding: 2px 8px; border-radius: 20px; flex-shrink: 0;
    }
    .sim-teams {
      font-weight: 700; display: flex; gap: 4px; align-items: center;
      color: #fff; flex: 1; justify-content: center; min-width: 0;
    }
    .sim-teams .team-name {
      max-width: 58px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sim-teams .vs-label { color: #64748b; font-size: 0.6rem; font-weight: 800; flex-shrink: 0; }
    .sim-teams img {
      width: 22px; height: 22px; object-fit: contain; flex-shrink: 0;
    }
    .sim-tv {
      color: #fbbf24; font-weight: 600; font-size: 0.65rem;
      max-width: 72px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; text-align: right; flex-shrink: 0;
    }

    .watermark-footer {
      background: #000; padding: 12px; text-align: center;
      font-size: 0.75rem; color: #94a3b8; font-weight: 700;
      border-top: 1px solid #111625; flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <h1>⚽ Generator Jadwal Bola TikTok</h1>
    <p>Desain Premium Kapsul Glow &amp; logo klub otomatis</p>

    <div class="branding-inputs">
      <label>JUDUL ATAS (HEADER)
        <input type="text" id="input-header" value="KREATOR JADWAL BOLA" />
      </label>
      <label>NAMA WATERMARK (ANTI-MALING)
        <input type="text" id="input-wm" value="CORNERKIICK" />
      </label>
      <label class="wide">BAR SOSIAL MEDIA (FOOTER)
        <input type="text" id="input-footer" value="🎵 CORNERKIICK  |  📸 CORNERKIICK  |  📺 CORNERKIICK" />
      </label>
    </div>

    <div class="controls">
      <input type="date" id="date-picker" />
      <input type="file" id="file-import" accept=".html,.htm,text/html" />
      <button class="btn-ghost" id="btn-today">Hari Ini</button>
      <button class="btn-secondary" id="btn-refresh">↻ Muat Online</button>
      <label class="file-label btn-warn" for="file-import">📂 Import HTML</label>
      <button class="btn-primary" id="btn-download" disabled>⚡ DOWNLOAD PNG TIKTOK 9:16</button>
    </div>
  </div>

  <div class="status" id="status">Memuat data...</div>

  <div id="export-area">
    <div class="preview-msg">PREVIEW LIVE</div>
    <div class="banner">
      <h2 id="view-header">KREATOR JADWAL BOLA</h2>
      <div class="date-label" id="display-date">—</div>
    </div>
    <div id="match-list" class="match-container"></div>
    <div class="watermark-footer" id="view-footer">🎵 CORNERKIICK  |  📸 CORNERKIICK  |  📺 CORNERKIICK</div>
  </div>

  <script>
    const BULAN_ID = ["","Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
    const HARI_ID  = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
    const BORDER_COLORS = ["#22c55e","#3b82f6","#eab308","#ca8a04"];

    // Path benar untuk GitHub Pages (mis. /jadwal-bola/)
    const BASE = (() => {
      const path = location.pathname;
      if (path.endsWith("/")) return path;
      const slash = path.lastIndexOf("/");
      return slash > 0 ? path.slice(0, slash + 1) : "/";
    })();
    const asset = (p) => BASE + p.replace(/^\//, "");

    let allSchedules = {};
    let selectedDate = todayISO();
    let staticLogos = null;
    const logoCache = {};

    const $ = (s) => document.querySelector(s);
    const datePicker  = $("#date-picker");
    const statusEl    = $("#status");
    const matchList   = $("#match-list");
    const displayDate = $("#display-date");
    const btnDownload = $("#btn-download");
    const inputHeader = $("#input-header");
    const inputWM     = $("#input-wm");
    const inputFooter = $("#input-footer");

    datePicker.value = selectedDate;
    inputHeader.addEventListener("input", () => { $("#view-header").textContent = inputHeader.value.toUpperCase(); });
    inputFooter.addEventListener("input", () => { $("#view-footer").textContent = inputFooter.value; });

    function todayISO() {
      return new Date().toLocaleDateString("en-CA", { timeZone: "Asia/Jakarta" });
    }

    function formatDateID(iso) {
      if (!iso) return "—";
      const [y, m, d] = iso.split("-").map(Number);
      return `${HARI_ID[new Date(y, m - 1, d).getDay()]}, ${d} ${BULAN_ID[m]} ${y}`;
    }

    function normalizeName(n) {
      return n
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, " ")
        .replace(/\s+/g, " ");
    }

    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    async function loadStaticLogos() {
      if (staticLogos) return staticLogos;
      try {
        const res = await fetch(asset("logos.json"));
        if (!res.ok) throw new Error(`logos.json HTTP ${res.status}`);
        staticLogos = await res.json();
        console.log("Logo DB:", Object.keys(staticLogos.teams || {}).length, "klub");
      } catch (e) {
        console.warn("Gagal muat logos.json:", e);
        staticLogos = { teams: {}, leagues: {} };
      }
      return staticLogos;
    }

    function findBadge(map, name) {
      if (!map || !name) return null;
      if (map[name]) return map[name];
      const norm = normalizeName(name);
      let best = null;
      let bestLen = 0;
      for (const [key, url] of Object.entries(map)) {
        const kn = normalizeName(key);
        if (norm === kn) return url;
        if (norm.includes(kn) || kn.includes(norm)) {
          if (key.length > bestLen) {
            best = url;
            bestLen = key.length;
          }
        }
      }
      return best;
    }

    function resolveTeamLogo(name) {
      return staticLogos ? findBadge(staticLogos.teams, name) : null;
    }

    function resolveLeagueLogo(comp) {
      return staticLogos ? findBadge(staticLogos.leagues, comp) : null;
    }

    function resolveLogoPath(pathOrUrl) {
      if (!pathOrUrl) return null;
      if (pathOrUrl.startsWith("http://") || pathOrUrl.startsWith("https://")) return pathOrUrl;
      return asset(pathOrUrl);
    }

    function logoTag(pathOrUrl, alt) {
      const src = resolveLogoPath(pathOrUrl);
      if (!src) return "";
      return `<img src="${escapeHtml(src)}" alt="${escapeHtml(alt)}" crossorigin="anonymous" loading="lazy" onerror="this.style.visibility='hidden'">`;
    }

    function getCachedLogo(pathOrUrl) {
      if (!pathOrUrl) return null;
      return logoCache[pathOrUrl] || logoCache[resolveLogoPath(pathOrUrl)] || null;
    }

    function loadImage(pathOrUrl) {
      if (!pathOrUrl) return Promise.resolve(null);
      const src = resolveLogoPath(pathOrUrl);
      const cached = getCachedLogo(pathOrUrl);
      if (cached) return Promise.resolve(cached);

      const isRemote = pathOrUrl.startsWith("http://") || pathOrUrl.startsWith("https://");

      return new Promise((resolve) => {
        const img = new Image();
        // crossOrigin hanya untuk URL luar — logo lokal (assets/) tanpa ini agar tidak kena CORS
        if (isRemote) img.crossOrigin = "anonymous";

        img.onload = () => {
          logoCache[src] = img;
          logoCache[pathOrUrl] = img;
          resolve(img);
        };

        img.onerror = () => {
          if (isRemote && !img._proxied) {
            img._proxied = true;
            img.crossOrigin = "anonymous";
            img.src = "https://corsproxy.io/?" + encodeURIComponent(src);
            return;
          }
          console.warn("Logo gagal dimuat:", pathOrUrl, src);
          resolve(null);
        };

        img.src = src;
      });
    }

    async function renderMatches(iso) {
      selectedDate = iso;
      const matches = allSchedules[iso] || [];
      displayDate.textContent = formatDateID(iso);

      if (!matches.length) {
        matchList.innerHTML = `<div style="text-align:center;padding-top:40px;color:#475569;font-size:0.85rem;">Tidak ada jadwal untuk tanggal ini.</div>`;
        btnDownload.disabled = true;
        return;
      }

      btnDownload.disabled = false;
      await loadStaticLogos();

      matchList.innerHTML = matches.map((m) => {
        const tvStr = (m.tvFree || []).concat(m.tvPaid || []).join(" · ") || m.tv || "-";
        const homeUrl = resolveTeamLogo(m.home);
        const awayUrl = resolveTeamLogo(m.away);
        return `<div class="sim-card">
          <span class="sim-time">${escapeHtml(m.kickoff)}</span>
          <span class="sim-teams">
            <span class="team-name">${escapeHtml(m.home)}</span>
            ${logoTag(homeUrl, m.home)}
            <span class="vs-label">VS</span>
            ${logoTag(awayUrl, m.away)}
            <span class="team-name">${escapeHtml(m.away)}</span>
          </span>
          <span class="sim-tv">${escapeHtml(tvStr)}</span>
        </div>`;
      }).join("");

      const urls = [...new Set(
        matches.flatMap((m) => [
          resolveTeamLogo(m.home),
          resolveTeamLogo(m.away),
          resolveLeagueLogo(m.competition),
        ]).filter(Boolean)
      )];
      Promise.all(urls.map(loadImage)).then((loaded) => {
        const ok = loaded.filter(Boolean).length;
        if (ok < urls.length) {
          console.warn(`Logo: ${ok}/${urls.length} berhasil dimuat untuk canvas`);
        }
      });
    }

    async function fetchSchedule() {
      setStatus("Memuat jadwal...");
      try {
        const res = await fetch(asset("data/jadwal.json"));
        if (!res.ok) throw new Error(`jadwal.json HTTP ${res.status}`);
        const data = await res.json();
        allSchedules = data.schedules || {};
        await loadStaticLogos();
        setStatus(`✓ ${Object.values(allSchedules).flat().length} pertandingan dimuat.`, "success");
        renderMatches(selectedDate);
      } catch (e) {
        setStatus("Gagal memuat jadwal. Pastikan data/jadwal.json ada di repo, atau Import HTML.", "error");
        console.error(e);
      }
    }

    function importHtmlFile(file) {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const doc = new DOMParser().parseFromString(e.target.result, "text/html");
          const rows = doc.querySelectorAll("table tr");
          if (!rows.length) throw new Error("Tabel jadwal tidak ditemukan.");

          let count = 0;
          const fileDate = selectedDate;

          rows.forEach((tr) => {
            const cells = [...tr.querySelectorAll("td")].map((td) => td.textContent.trim());
            if (cells.length < 4) return;
            const [kickoff, matchup, competition, tv] = cells;
            if (/kick-off/i.test(kickoff) || !/vs/i.test(matchup)) return;

            const parts = matchup.split(/\s+vs\s+/i);
            const home = (parts[0] || "").trim();
            const away = (parts[1] || "").trim();
            if (!allSchedules[fileDate]) allSchedules[fileDate] = [];
            allSchedules[fileDate].push({
              kickoff, matchup, home, away, competition, tv,
              tvFree: [], tvPaid: [],
            });
            count++;
          });

          await loadStaticLogos();
          setStatus(`✓ Import ${count} pertandingan.`, "success");
          renderMatches(selectedDate);
        } catch (err) {
          setStatus(`Gagal import: ${err.message}`, "error");
        }
      };
      reader.readAsText(file, "UTF-8");
    }

    async function downloadPNG() {
      const matches = allSchedules[selectedDate] || [];
      if (!matches.length) return;

      btnDownload.disabled = true;
      setStatus("Memuat logo untuk PNG...");

      try {
        await loadStaticLogos();

        const urls = [...new Set(
          matches.flatMap((m) => [
            resolveTeamLogo(m.home),
            resolveTeamLogo(m.away),
            resolveLeagueLogo(m.competition),
          ]).filter(Boolean)
        )];
        await Promise.all(urls.map(loadImage));

        const W = 1080;
        const H = 1920;
        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext("2d");

        ctx.fillStyle = "#070a13";
        ctx.fillRect(0, 0, W, H);

        const gr1 = ctx.createRadialGradient(W / 2, 0, 100, W / 2, 0, 800);
        gr1.addColorStop(0, "rgba(34,197,94,0.18)");
        gr1.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = gr1;
        ctx.fillRect(0, 0, W, 800);

        const gr2 = ctx.createRadialGradient(W / 2, H, 100, W / 2, H, 700);
        gr2.addColorStop(0, "rgba(234,179,8,0.12)");
        gr2.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = gr2;
        ctx.fillRect(0, 0, W, H);

        const wmText = (inputWM.value || "CORNERKIICK").toUpperCase();
        ctx.save();
        ctx.translate(W / 2, H / 2);
        ctx.rotate(-Math.PI / 6);
        ctx.fillStyle = "rgba(255,255,255,0.025)";
        ctx.font = "black 84px Segoe UI, Impact";
        ctx.textAlign = "center";
        [-400, -150, 100, 350].forEach((dy) => ctx.fillText(wmText, 0, dy));
        ctx.restore();

        ctx.fillStyle = "#ffffff";
        ctx.font = "900 54px Segoe UI, Arial Black";
        ctx.textAlign = "center";
        ctx.fillText((inputHeader.value || "KREATOR JADWAL BOLA").toUpperCase(), W / 2, 140);
        ctx.fillStyle = "#94a3b8";
        ctx.font = "bold 32px Segoe UI";
        ctx.fillText(formatDateID(selectedDate).toUpperCase(), W / 2, 205);

        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(100, 245);
        ctx.lineTo(W - 100, 245);
        ctx.stroke();

        const dataMatches = matches.slice(0, 10);
        const rowW = W - 100;
        const rowH = 114;
        const gap = 20;
        let startY = 290;

        dataMatches.forEach((m, i) => {
          const y = startY + i * (rowH + gap);
          const cx = W / 2;

          drawRoundRect(ctx, 50, y, rowW, rowH, 57, "#111625", BORDER_COLORS[i % 4], 3);

          ctx.fillStyle = "#ffffff";
          ctx.font = "900 30px Segoe UI";
          ctx.textAlign = "left";
          ctx.fillText(m.kickoff, 95, y + 68);
          ctx.fillStyle = "rgba(255,255,255,0.4)";
          ctx.font = "700 14px Segoe UI";
          ctx.fillText("WIB", 185, y + 66);

          const compUrl = resolveLeagueLogo(m.competition);
          const compImg = getCachedLogo(compUrl);
          if (compImg) {
            ctx.drawImage(compImg, cx - 28, y + 29, 56, 56);
          } else {
            ctx.beginPath();
            ctx.arc(cx, y + 57, 26, 0, 2 * Math.PI);
            ctx.fillStyle = "#070a13";
            ctx.fill();
            ctx.fillStyle = "#475569";
            ctx.font = "900 13px Segoe UI";
            ctx.textAlign = "center";
            ctx.fillText((m.competition || "").slice(0, 3).toUpperCase(), cx, y + 62);
          }

          const hx = cx - 80;
          const homeUrl = resolveTeamLogo(m.home);
          const hImg = getCachedLogo(homeUrl);
          if (hImg) ctx.drawImage(hImg, hx - 60, y + 27, 60, 60);
          else drawCircle(ctx, hx - 50, y + 32, 50);
          ctx.fillStyle = "#ffffff";
          ctx.font = "700 28px Segoe UI";
          ctx.textAlign = "right";
          ctx.fillText(clampText(ctx, m.home, 200), hx - 75, y + 67);

          const ax = cx + 80;
          const awayUrl = resolveTeamLogo(m.away);
          const aImg = getCachedLogo(awayUrl);
          if (aImg) ctx.drawImage(aImg, ax, y + 27, 60, 60);
          else drawCircle(ctx, ax, y + 32, 50);
          ctx.fillStyle = "#ffffff";
          ctx.font = "700 28px Segoe UI";
          ctx.textAlign = "left";
          ctx.fillText(clampText(ctx, m.away, 200), ax + 75, y + 67);

          const tvStr = (m.tvFree || []).concat(m.tvPaid || []).join(" · ") || m.tv || "-";
          ctx.fillStyle = (m.tvFree || []).length ? "#22c55e" : "#fbbf24";
          ctx.font = "900 22px Segoe UI";
          ctx.textAlign = "right";
          ctx.fillText(clampText(ctx, tvStr, 160), W - 95, y + 67);
        });

        ctx.fillStyle = "#000000";
        ctx.fillRect(0, H - 100, W, 100);
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, H - 100);
        ctx.lineTo(W, H - 100);
        ctx.stroke();
        ctx.fillStyle = "#94a3b8";
        ctx.font = "bold 24px Segoe UI";
        ctx.textAlign = "center";
        ctx.fillText(inputFooter.value || "FOLLOW UNTUK JADWAL BOLA TERUPDATE", W / 2, H - 42);

        const link = document.createElement("a");
        link.download = `jadwal-tiktok-${selectedDate}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();

        const loaded = urls.filter((u) => getCachedLogo(u)).length;
        setStatus(`✓ PNG diunduh (${loaded}/${urls.length} logo termuat).`, "success");
      } catch (err) {
        setStatus(`Gagal ekspor: ${err.message}`, "error");
        console.error(err);
      } finally {
        btnDownload.disabled = false;
      }
    }

    function drawRoundRect(ctx, x, y, w, h, r, fill, stroke, sw) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw || 2; ctx.stroke(); }
    }

    function drawCircle(ctx, x, y, size) {
      ctx.beginPath();
      ctx.arc(x + size / 2, y + size / 2, size / 2, 0, 2 * Math.PI);
      ctx.fillStyle = "#1e293b";
      ctx.fill();
    }

    function clampText(ctx, text, maxW) {
      if (ctx.measureText(text).width <= maxW) return text;
      let t = text;
      while (t.length > 1 && ctx.measureText(t + "…").width > maxW) t = t.slice(0, -1);
      return t + "…";
    }

    function setStatus(msg, cls = "") {
      statusEl.className = "status" + (cls ? " " + cls : "");
      statusEl.textContent = msg;
    }

    $("#btn-refresh").addEventListener("click", fetchSchedule);
    $("#btn-download").addEventListener("click", downloadPNG);
    $("#btn-today").addEventListener("click", () => {
      selectedDate = todayISO();
      datePicker.value = selectedDate;
      renderMatches(selectedDate);
    });
    datePicker.addEventListener("change", (e) => renderMatches(e.target.value));
    $("#file-import").addEventListener("change", (e) => {
      const f = e.target.files[0];
      if (f) importHtmlFile(f);
      e.target.value = "";
    });

    fetchSchedule();
  </script>
</body>
</html>
