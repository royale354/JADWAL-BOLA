name: Update Jadwal Bola

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch jadwal from Goal.com
        run: python scripts/update_jadwal.py

      - name: Commit jadwal.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update jadwal bola"
          file_pattern: data/jadwal.json
